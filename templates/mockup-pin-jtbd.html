<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>JTBD Pin</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;0,700;1,300&family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{width:100%;height:100%;overflow:hidden;font-family:'DM Sans',sans-serif}
body{background:#0a0e1a}

.film{position:relative;width:100vw;height:100vh;overflow:hidden;display:flex;align-items:center;justify-content:center}

/* === The Orb — the companion === */
.orb-wrap{position:absolute;z-index:1}
.orb{width:80px;height:80px;border-radius:50%;background:radial-gradient(circle at 35% 35%, #14b8a6, #0e7a7e 50%, #065f63);box-shadow:0 0 60px rgba(14,122,126,0.3), 0 0 120px rgba(14,122,126,0.1);animation:breathe 3s ease-in-out infinite;transition:all 1.2s cubic-bezier(0.34,1.56,0.64,1)}
@keyframes breathe{0%,100%{transform:scale(1);box-shadow:0 0 60px rgba(14,122,126,0.3),0 0 120px rgba(14,122,126,0.1)}50%{transform:scale(1.08);box-shadow:0 0 80px rgba(14,122,126,0.4),0 0 160px rgba(14,122,126,0.15)}}
.orb.thinking{animation:think 0.6s ease-in-out infinite;background:radial-gradient(circle at 35% 35%, #5eead4, #14b8a6 50%, #0e7a7e)}
@keyframes think{0%,100%{transform:scale(1) rotate(0deg)}25%{transform:scale(1.12) rotate(2deg)}50%{transform:scale(0.95) rotate(-1deg)}75%{transform:scale(1.06) rotate(1deg)}}
.orb.big{width:120px;height:120px}
.orb.small{width:48px;height:48px}
.orb.gone{width:0;height:0;opacity:0}

/* Orb ring pulse */
.orb-ring{position:absolute;inset:-12px;border-radius:50%;border:1px solid rgba(14,122,126,0.15);opacity:0;animation:ring-pulse 3s ease-out infinite}
@keyframes ring-pulse{0%{transform:scale(0.8);opacity:0.6}100%{transform:scale(1.8);opacity:0}}
.orb-ring:nth-child(2){animation-delay:1s}

/* === Chat bubbles === */
.chat{position:absolute;display:flex;flex-direction:column;gap:10px;width:340px;left:50%;transform:translateX(-50%)}
.bubble{padding:14px 20px;border-radius:20px;font-size:0.88rem;line-height:1.5;opacity:0;transform:translateY(20px) scale(0.9);transition:all 0.5s cubic-bezier(0.34,1.56,0.64,1);max-width:90%}
.bubble.in{opacity:1;transform:translateY(0) scale(1)}
.bubble.user{background:rgba(255,255,255,0.06);color:rgba(255,255,255,0.8);border:1px solid rgba(255,255,255,0.06);align-self:flex-end;border-bottom-right-radius:6px}
.bubble.ai{background:linear-gradient(135deg,rgba(14,122,126,0.15),rgba(20,184,166,0.08));color:#e4e6ea;border:1px solid rgba(14,122,126,0.15);align-self:flex-start;border-bottom-left-radius:6px}
.bubble em{color:#5eead4;font-style:normal;font-weight:600}
.bubble .typing{display:inline-flex;gap:4px}
.bubble .typing span{width:6px;height:6px;border-radius:50%;background:rgba(94,234,212,0.5);animation:dot-bounce 1.2s ease-in-out infinite}
.bubble .typing span:nth-child(2){animation-delay:0.15s}
.bubble .typing span:nth-child(3){animation-delay:0.3s}
@keyframes dot-bounce{0%,60%,100%{transform:translateY(0)}30%{transform:translateY(-6px)}}

/* === Connection lines (canvas-like with CSS) === */
.connections{position:absolute;inset:0;pointer-events:none;z-index:0}
.node{position:absolute;width:8px;height:8px;border-radius:50%;background:#14b8a6;opacity:0;transition:all 0.6s cubic-bezier(0.34,1.56,0.64,1);box-shadow:0 0 12px rgba(20,184,166,0.4)}
.node.on{opacity:1}
.line{position:absolute;height:1px;background:linear-gradient(90deg,rgba(20,184,166,0.4),rgba(20,184,166,0.05));transform-origin:left center;opacity:0;transition:opacity 0.5s}
.line.on{opacity:1}

/* === Scenes === */
.scene{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;flex-direction:column;opacity:0;transition:opacity 0.7s cubic-bezier(0.25,1,0.5,1);pointer-events:none}
.scene.active{opacity:1}

/* === Scene 3: Chain — flowing nodes === */
.chain-wrap{display:flex;flex-direction:column;align-items:center;gap:0;position:relative}
.chain-item{display:flex;align-items:center;gap:14px;padding:10px 0;opacity:0;transform:translateX(-30px);transition:all 0.6s cubic-bezier(0.34,1.56,0.64,1)}
.chain-item.in{opacity:1;transform:translateX(0)}
.chain-dot{width:10px;height:10px;border-radius:50%;background:#14b8a6;flex-shrink:0;box-shadow:0 0 10px rgba(20,184,166,0.4);transition:all 0.3s}
.chain-label{font-size:0.88rem;color:rgba(255,255,255,0.7);font-weight:300}
.chain-label em{color:#5eead4;font-style:normal;font-weight:500}
.chain-connector{width:1px;height:20px;background:linear-gradient(180deg,rgba(20,184,166,0.3),rgba(20,184,166,0.1));margin-left:5px;opacity:0;transition:opacity 0.4s}
.chain-connector.in{opacity:1}

/* === Scene 4: Report materialization === */
.report{width:300px;background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.06);border-radius:16px;padding:28px 24px;opacity:0;transform:scale(0.85) translateY(20px);transition:all 0.8s cubic-bezier(0.34,1.56,0.64,1);position:relative;overflow:hidden}
.report.in{opacity:1;transform:scale(1) translateY(0)}
.report-shimmer{position:absolute;inset:0;background:linear-gradient(105deg,transparent 40%,rgba(94,234,212,0.06) 50%,transparent 60%);animation:shimmer 2.5s ease-in-out infinite}
@keyframes shimmer{0%{transform:translateX(-100%)}100%{transform:translateX(100%)}}
.report-title{font-family:'DM Serif Display',serif;font-size:1.1rem;color:#e4e6ea;margin-bottom:16px}
.report-line{height:8px;border-radius:4px;background:rgba(255,255,255,0.04);margin-bottom:8px;opacity:0;transition:all 0.4s cubic-bezier(0.34,1.56,0.64,1)}
.report-line.in{opacity:1}
.report-line.fill{background:linear-gradient(90deg,rgba(14,122,126,0.3),rgba(20,184,166,0.15))}
.report-bar{display:flex;gap:6px;margin-top:14px}
.report-bar-item{flex:1;height:40px;border-radius:6px;background:rgba(255,255,255,0.03);opacity:0;transform:scaleY(0);transform-origin:bottom;transition:all 0.5s cubic-bezier(0.34,1.56,0.64,1)}
.report-bar-item.in{opacity:1;transform:scaleY(1)}
.report-bar-item:nth-child(1){background:linear-gradient(180deg,rgba(14,122,126,0.4),rgba(14,122,126,0.1));height:25px;align-self:flex-end}
.report-bar-item:nth-child(2){background:linear-gradient(180deg,rgba(20,184,166,0.4),rgba(20,184,166,0.1));height:38px;align-self:flex-end}
.report-bar-item:nth-child(3){background:linear-gradient(180deg,rgba(94,234,212,0.4),rgba(94,234,212,0.1));height:32px;align-self:flex-end}
.report-bar-item:nth-child(4){background:linear-gradient(180deg,rgba(14,122,126,0.4),rgba(14,122,126,0.1));height:45px;align-self:flex-end}
.report-sent{font-size:0.72rem;color:#5eead4;text-align:center;margin-top:16px;opacity:0;transition:all 0.5s;display:flex;align-items:center;justify-content:center;gap:6px}
.report-sent.in{opacity:1}
.report-sent svg{width:14px;height:14px}

/* === Scene 5: Companion === */
.s5-wrap{text-align:center;max-width:480px;padding:0 32px}
.s5-main{font-family:'DM Serif Display',serif;font-size:clamp(1.5rem,3.4vw,2.2rem);line-height:1.25;color:#e4e6ea}
.s5-main em{font-style:italic;color:#5eead4}
.s5-sub{font-size:0.78rem;color:rgba(255,255,255,0.3);margin-top:18px;line-height:1.55;font-weight:300}
.s5-brand{margin-top:28px}
.s5-name{font-size:0.78rem;font-weight:600;color:rgba(255,255,255,0.35)}
.s5-handle{font-size:0.6rem;color:#14b8a6;margin-top:3px}

/* === Floating particles === */
.particle{position:absolute;border-radius:50%;pointer-events:none;opacity:0}
@keyframes float-up{0%{transform:translateY(0) scale(1);opacity:0.6}100%{transform:translateY(-120px) scale(0);opacity:0}}
</style>
</head>
<body>
<div class="film" id="film">
  <!-- Ambient particles -->
  <div class="connections" id="connections"></div>

  <!-- The Orb — always present, the companion -->
  <div class="orb-wrap" id="orbWrap" style="top:50%;left:50%;transform:translate(-50%,-50%)">
    <div class="orb" id="orb">
      <div class="orb-ring"></div>
      <div class="orb-ring"></div>
    </div>
  </div>

  <!-- SCENE 1: You ask a question -->
  <div class="scene active" id="sc1">
    <div class="chat" id="chat1" style="top:50%;transform:translate(-50%,-20%)">
    </div>
  </div>

  <!-- SCENE 2: The orb answers — and notices more -->
  <div class="scene" id="sc2">
    <div class="chat" id="chat2" style="top:50%;transform:translate(-50%,-30%)">
    </div>
  </div>

  <!-- SCENE 3: The chain — questions connect -->
  <div class="scene" id="sc3">
    <div class="chain-wrap" id="chainWrap"></div>
  </div>

  <!-- SCENE 4: The report materializes -->
  <div class="scene" id="sc4">
    <div class="report" id="report">
      <div class="report-shimmer"></div>
      <div class="report-title">Your Health Report</div>
      <div class="report-line" id="rl1"></div>
      <div class="report-line" id="rl2"></div>
      <div class="report-line fill" id="rl3"></div>
      <div class="report-line" id="rl4"></div>
      <div class="report-bar" id="rbar">
        <div class="report-bar-item" id="rb1"></div>
        <div class="report-bar-item" id="rb2"></div>
        <div class="report-bar-item" id="rb3"></div>
        <div class="report-bar-item" id="rb4"></div>
      </div>
      <div class="report-sent" id="rsent">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><polyline points="20 6 9 17 4 12"/></svg>
        Sent to your inbox
      </div>
    </div>
  </div>

  <!-- SCENE 5: The companion -->
  <div class="scene" id="sc5">
    <div class="s5-wrap">
      <div class="s5-main" id="s5a" style="opacity:0;transform:translateY(16px);transition:all 0.85s cubic-bezier(0.16,1,0.3,1)">Tell us what you're working on.<br>We'll <em>build the tool.</em></div>
      <div class="s5-sub" id="s5b" style="opacity:0;transition:opacity 0.7s">Your health. Computed. Personalized. Ongoing.</div>
      <div class="s5-brand" id="s5c" style="opacity:0;transition:opacity 0.7s">
        <div class="s5-name">healthcalculators.xyz</div>
        <div class="s5-handle">@GetHealthC</div>
      </div>
    </div>
  </div>
</div>

<script>
(function(){
  var scenes=['sc1','sc2','sc3','sc4','sc5'];
  var orb=document.getElementById('orb');
  var orbWrap=document.getElementById('orbWrap');

  function show(id){
    scenes.forEach(function(s){document.getElementById(s).classList.remove('active')});
    document.getElementById(id).classList.add('active');
  }

  function moveOrb(top,left,cls){
    orbWrap.style.top=top;
    orbWrap.style.left=left;
    if(cls){orb.className='orb '+cls}else{orb.className='orb'}
  }

  function makeBubble(container,type,html,delay){
    setTimeout(function(){
      var b=document.createElement('div');
      b.className='bubble '+type;
      b.innerHTML=html;
      document.getElementById(container).appendChild(b);
      setTimeout(function(){b.classList.add('in')},30);
    },delay);
  }

  function spawnParticles(x,y,count){
    var film=document.getElementById('film');
    for(var i=0;i<count;i++){
      var p=document.createElement('div');
      p.className='particle';
      var size=3+Math.random()*4;
      p.style.cssText='width:'+size+'px;height:'+size+'px;left:'+(x+((Math.random()-0.5)*60))+'px;top:'+y+'px;background:rgba(94,234,212,'+(0.3+Math.random()*0.4)+');animation:float-up '+(0.8+Math.random()*0.6)+'s ease-out forwards;animation-delay:'+(i*0.05)+'s';
      film.appendChild(p);
      setTimeout(function(el){el.remove()},1500,p);
    }
  }

  // === SCENE 1 (0–6s): You ask, orb responds ===
  // Orb is centered and breathing. A question appears. Orb thinks. Answer appears.
  moveOrb('38%','50%');

  makeBubble('chat1','user','When should I stop drinking coffee so I can actually sleep?',800);

  // Orb starts thinking
  setTimeout(function(){orb.classList.add('thinking')},1600);

  // Typing indicator
  makeBubble('chat1','ai','<span class="typing"><span></span><span></span><span></span></span>',2000);

  // Replace typing with answer
  setTimeout(function(){
    var bubbles=document.getElementById('chat1').querySelectorAll('.bubble');
    var last=bubbles[bubbles.length-1];
    last.innerHTML='Based on your caffeine sensitivity: <em>2:00 PM</em>. That gives your body 10 half-lives before midnight.';
    orb.classList.remove('thinking');
    spawnParticles(window.innerWidth/2, window.innerHeight*0.38, 8);
  },3400);

  // === SCENE 2 (6–11s): Orb notices the connection ===
  setTimeout(function(){
    show('sc2');
    moveOrb('32%','50%');

    makeBubble('chat2','ai','You\'re optimizing sleep. That connects to something\u2026',400);

    setTimeout(function(){orb.classList.add('thinking')},1200);

    makeBubble('chat2','ai','<span class="typing"><span></span><span></span><span></span></span>',1800);

    setTimeout(function(){
      var bubbles=document.getElementById('chat2').querySelectorAll('.bubble');
      var last=bubbles[bubbles.length-1];
      last.innerHTML='Better sleep \u2192 better recovery \u2192 better results from your training. Want to see <em>the full picture</em>?';
      orb.classList.remove('thinking');
      spawnParticles(window.innerWidth/2, window.innerHeight*0.32, 10);
    },3200);
  },6000);

  // === SCENE 3 (11–17s): The chain builds ===
  var chain=[
    {label:'<em>Caffeine cutoff</em> \u2014 sleep quality',dot:true},
    {label:'<em>Sleep</em> \u2192 recovery rate',dot:true},
    {label:'<em>Recovery</em> \u2192 training capacity',dot:true},
    {label:'<em>Training</em> \u2192 calorie burn (TDEE)',dot:true},
    {label:'<em>TDEE</em> \u2192 what and how much to eat',dot:true}
  ];

  setTimeout(function(){
    show('sc3');
    moveOrb('16%','50%','small');

    var wrap=document.getElementById('chainWrap');
    chain.forEach(function(c,i){
      setTimeout(function(){
        if(i>0){
          var conn=document.createElement('div');
          conn.className='chain-connector';
          wrap.appendChild(conn);
          setTimeout(function(){conn.classList.add('in')},50);
        }
        var item=document.createElement('div');
        item.className='chain-item';
        item.innerHTML='<div class="chain-dot"></div><div class="chain-label">'+c.label+'</div>';
        wrap.appendChild(item);
        setTimeout(function(){item.classList.add('in')},80);
      }, i*900);
    });
  },11000);

  // === SCENE 4 (17–23s): Report materializes ===
  setTimeout(function(){
    show('sc4');
    moveOrb('18%','50%','small');

    var r=document.getElementById('report');
    setTimeout(function(){r.classList.add('in')},300);
    setTimeout(function(){document.getElementById('rl1').classList.add('in')},800);
    setTimeout(function(){document.getElementById('rl2').classList.add('in')},1000);
    setTimeout(function(){document.getElementById('rl3').classList.add('in')},1200);
    setTimeout(function(){document.getElementById('rl4').classList.add('in')},1400);
    setTimeout(function(){document.getElementById('rb1').classList.add('in')},1800);
    setTimeout(function(){document.getElementById('rb2').classList.add('in')},2000);
    setTimeout(function(){document.getElementById('rb3').classList.add('in')},2200);
    setTimeout(function(){document.getElementById('rb4').classList.add('in')},2400);
    setTimeout(function(){
      document.getElementById('rsent').classList.add('in');
      spawnParticles(window.innerWidth/2, window.innerHeight*0.6, 12);
    },3200);
  },17000);

  // === SCENE 5 (23–28.5s): The companion invitation ===
  setTimeout(function(){
    show('sc5');
    moveOrb('40%','50%','big');

    setTimeout(function(){
      var a=document.getElementById('s5a');a.style.opacity='1';a.style.transform='translateY(0)';
    },400);
    setTimeout(function(){document.getElementById('s5b').style.opacity='1'},1600);
    setTimeout(function(){document.getElementById('s5c').style.opacity='1'},1600);
  },23000);

  // Loop
  setTimeout(function(){
    document.getElementById('sc5').style.transition='opacity 0.6s';
    document.getElementById('sc5').style.opacity='0';
    orb.style.transition='opacity 0.6s';orb.style.opacity='0';
    setTimeout(function(){location.reload()},800);
  },28500);
})();
</script>
</body>
</html>
