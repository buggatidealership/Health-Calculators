<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>JTBD Pin</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,300&family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{width:100%;height:100%;overflow:hidden;font-family:'DM Sans',sans-serif}
body{background:#0f1419;transition:background 0.8s}
body.warm{background:#F5F0EA}
body.glow{background:linear-gradient(160deg,#eef7f6,#F5F0EA 50%,#fef5ee)}

.film{position:relative;width:100vw;height:100vh;overflow:hidden}
.sc{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;
  flex-direction:column;opacity:0;transition:opacity 0.6s;pointer-events:none;z-index:2;padding:20px}
.sc.on{opacity:1}

/* ================================
   SCENE 1: SEARCH BAR + SOURCES
   ================================ */
.search-wrap{width:420px;max-width:90vw}
.search-glow{position:absolute;width:300px;height:300px;border-radius:50%;
  background:radial-gradient(circle,rgba(59,130,246,0.06),transparent 70%);
  top:50%;left:50%;transform:translate(-50%,-50%);pointer-events:none}
.search-bar{background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.1);
  border-radius:28px;padding:16px 22px;display:flex;align-items:center;gap:12px;
  opacity:0;transform:translateY(10px);transition:all 0.6s cubic-bezier(0.34,1.56,0.64,1)}
.search-bar.in{opacity:1;transform:translateY(0)}
.search-icon{color:rgba(255,255,255,0.3);flex-shrink:0}
.search-icon svg{width:18px;height:18px}
.search-text{font-size:0.9rem;color:rgba(255,255,255,0.5);overflow:hidden;white-space:nowrap}
.search-cursor{display:inline-block;width:1px;height:1.1em;background:rgba(255,255,255,0.5);
  margin-left:1px;animation:blink 1s step-end infinite;vertical-align:text-bottom}
@keyframes blink{50%{opacity:0}}

.search-results{margin-top:14px;display:flex;flex-direction:column;gap:6px}
.search-result{background:rgba(255,255,255,0.04);border-radius:12px;padding:10px 16px;
  opacity:0;transform:translateY(8px);transition:all 0.3s cubic-bezier(0.34,1.56,0.64,1)}
.search-result.in{opacity:1;transform:translateY(0)}
.sr-name{font-size:0.58rem;font-weight:600;text-transform:uppercase;letter-spacing:0.06em;margin-bottom:3px}
.sr-answer{font-size:0.72rem;color:rgba(255,255,255,0.4);line-height:1.4}
.sr-conflict{color:rgba(239,68,68,0.5);font-size:0.58rem;margin-top:3px;font-weight:500}

.s1-qmark{font-family:'DM Serif Display',serif;font-size:clamp(2rem,5vw,3rem);
  color:rgba(255,255,255,0.15);text-align:center;margin-top:20px;
  opacity:0;transform:scale(0.5);transition:all 0.6s cubic-bezier(0,1.5,0.5,1)}
.s1-qmark.in{opacity:1;transform:scale(1)}

@keyframes micro-shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-2px)}75%{transform:translateX(2px)}}

/* ================================
   SCENE 2: COMPANION CHAT
   ================================ */
.phone{width:380px;max-width:92vw;background:#fff;border-radius:24px;
  box-shadow:0 8px 40px rgba(0,0,0,0.08);overflow:hidden;
  opacity:0;transform:translateY(30px) scale(0.92);
  transition:all 0.7s cubic-bezier(0.34,1.56,0.64,1)}
.phone.in{opacity:1;transform:translateY(0) scale(1)}
.ph-header{display:flex;align-items:center;gap:10px;padding:14px 18px;
  border-bottom:1px solid rgba(0,0,0,0.05);background:#fafaf8}
.ph-av{width:32px;height:32px;border-radius:50%;
  background:linear-gradient(135deg,#14b8a6,#0e7a7e);flex-shrink:0;
  display:flex;align-items:center;justify-content:center;position:relative;
  animation:pulse-av 3.75s ease-in-out infinite}
@keyframes pulse-av{0%,100%{transform:scale(1)}50%{transform:scale(1.06)}}
.ph-av::after{content:'';position:absolute;bottom:0;right:0;width:8px;height:8px;
  border-radius:50%;background:#22c55e;border:2px solid #fafaf8}
.ph-av span{color:#fff;font-weight:700;font-size:0.7rem}
.ph-name{font-weight:600;font-size:0.82rem;color:#1a1a1e}
.ph-status{font-size:0.58rem;color:#22c55e;font-weight:500}
.ph-msgs{padding:12px 14px;display:flex;flex-direction:column;gap:7px;min-height:140px}

.bub{max-width:82%;padding:10px 15px;border-radius:18px;font-size:0.8rem;line-height:1.5;
  opacity:0;transform:translateY(12px) scale(0.88);color:#2a2a2e;
  transition:all 0.4s cubic-bezier(0.34,1.56,0.64,1)}
.bub.in{opacity:1;transform:translateY(0) scale(1)}
.bub.u{background:#d1fae5;align-self:flex-end;border-bottom-right-radius:6px}
.bub.a{background:#f5f5f3;align-self:flex-start;border-bottom-left-radius:6px}
.bub .hl{color:#0e7a7e;font-weight:700}
.bub .warm{color:#b45309;font-weight:500}
.bub .soft{color:#7a7a82;font-size:0.7rem;display:block;margin-top:3px}

.dots{display:inline-flex;gap:4px;padding:2px 0}
.dots span{width:6px;height:6px;border-radius:50%;background:#b4b8c0;animation:tb 1.2s ease-in-out infinite}
.dots span:nth-child(2){animation-delay:0.15s}
.dots span:nth-child(3){animation-delay:0.3s}
@keyframes tb{0%,60%,100%{transform:translateY(0);opacity:0.4}30%{transform:translateY(-5px);opacity:1}}

.pills{display:flex;flex-wrap:wrap;gap:5px;align-self:flex-end}
.pill{padding:7px 14px;border-radius:20px;font-size:0.72rem;font-weight:500;
  background:#fff;border:1.5px solid rgba(14,122,126,0.2);color:#0e7a7e;
  opacity:0;transform:scale(0.8);transition:all 0.3s cubic-bezier(0.34,1.56,0.64,1)}
.pill.in{opacity:1;transform:scale(1)}
.pill.picked{background:#0e7a7e;color:#fff;border-color:#0e7a7e;transform:scale(1.05)}
.pill.fade{opacity:0.25;transform:scale(0.88)}

/* ================================
   SCENE 3: DELIVERABLES
   ================================ */
.s3-wrap{width:380px;max-width:90vw;display:flex;flex-direction:column;gap:14px;align-items:center}
.s3-label{font-size:0.62rem;font-weight:600;text-transform:uppercase;letter-spacing:0.12em;
  color:#0e7a7e;margin-bottom:4px;opacity:0;transition:opacity 0.5s}
.s3-label.in{opacity:1}

/* WhatsApp notification */
.wa-notif{width:100%;background:#fff;border-radius:14px;box-shadow:0 4px 20px rgba(0,0,0,0.06);
  padding:12px 16px;display:flex;gap:12px;align-items:flex-start;
  opacity:0;transform:translateY(12px) scale(0.94);
  transition:all 0.5s cubic-bezier(0.34,1.56,0.64,1)}
.wa-notif.in{opacity:1;transform:translateY(0) scale(1)}
.wa-icon{width:36px;height:36px;border-radius:10px;background:#25d366;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;color:#fff;font-size:0.9rem}
.wa-body{flex:1}
.wa-from{font-size:0.68rem;font-weight:600;color:#1a1a1e}
.wa-msg{font-size:0.72rem;color:#4a4a4e;line-height:1.45;margin-top:2px}
.wa-time{font-size:0.56rem;color:#9a9a9e;margin-top:3px}

/* Shopping list */
.shop-list{width:100%;background:#fff;border-radius:14px;box-shadow:0 4px 20px rgba(0,0,0,0.06);
  padding:16px 18px;opacity:0;transform:translateY(12px) scale(0.94);
  transition:all 0.5s cubic-bezier(0.34,1.56,0.64,1)}
.shop-list.in{opacity:1;transform:translateY(0) scale(1)}
.shop-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.shop-title{font-size:0.82rem;font-weight:600;color:#1a1a1e}
.shop-badge{font-size:0.56rem;font-weight:600;color:#25d366;background:rgba(37,211,102,0.08);
  padding:2px 8px;border-radius:8px}
.shop-item{display:flex;align-items:center;gap:8px;padding:4px 0;font-size:0.72rem;color:#4a4a4e;
  opacity:0;transform:translateX(-8px);transition:all 0.3s cubic-bezier(0.34,1.56,0.64,1)}
.shop-item.in{opacity:1;transform:translateX(0)}
.shop-check{width:16px;height:16px;border-radius:4px;border:1.5px solid rgba(0,0,0,0.12);flex-shrink:0;
  display:flex;align-items:center;justify-content:center;transition:all 0.25s cubic-bezier(0,1.5,0.5,1)}
.shop-check.done{background:#0e7a7e;border-color:#0e7a7e}
.shop-check.done::after{content:'';width:6px;height:3px;border-left:1.5px solid #fff;
  border-bottom:1.5px solid #fff;transform:rotate(-45deg) translateY(-1px)}
.shop-item.checked{color:#b0b0b4;text-decoration:line-through}

/* PDF card */
.pdf-card{width:100%;background:#fff;border-radius:14px;box-shadow:0 4px 20px rgba(0,0,0,0.06);
  padding:16px 18px;display:flex;gap:14px;align-items:center;
  opacity:0;transform:translateY(12px) scale(0.94);
  transition:all 0.5s cubic-bezier(0.34,1.56,0.64,1)}
.pdf-card.in{opacity:1;transform:translateY(0) scale(1)}
.pdf-icon{width:44px;height:52px;border-radius:6px;background:linear-gradient(135deg,#ef4444,#dc2626);
  display:flex;align-items:center;justify-content:center;color:#fff;font-size:0.6rem;font-weight:700;flex-shrink:0}
.pdf-info{flex:1}
.pdf-name{font-size:0.78rem;font-weight:600;color:#1a1a1e}
.pdf-detail{font-size:0.64rem;color:#7a7a82;margin-top:2px}
.pdf-actions{display:flex;gap:6px;margin-top:6px}
.pdf-btn{font-size:0.58rem;padding:4px 10px;border-radius:8px;font-weight:600}
.pdf-btn.primary{background:#0e7a7e;color:#fff}
.pdf-btn.secondary{background:rgba(0,0,0,0.04);color:#4a4a4e}
.pdf-btn.link{background:rgba(14,122,126,0.08);color:#0e7a7e}

/* ================================
   SCENE 4: COME BACK
   ================================ */
.time-skip{font-size:0.62rem;font-weight:600;text-transform:uppercase;letter-spacing:0.14em;
  color:#0e7a7e;background:rgba(14,122,126,0.08);padding:5px 14px;border-radius:20px;
  margin-bottom:14px;opacity:0;transform:scale(0.8);
  transition:all 0.4s cubic-bezier(0,1.5,0.5,1)}
.time-skip.in{opacity:1;transform:scale(1)}

.progress-mini{height:4px;border-radius:2px;background:rgba(0,0,0,0.05);
  margin-top:6px;overflow:hidden;width:100%}
.progress-fill{height:100%;border-radius:2px;width:0;
  background:linear-gradient(90deg,#14b8a6,#22c55e);
  transition:width 1.2s cubic-bezier(0.34,1.56,0.64,1)}

/* ================================
   SCENE 5: CLOSE
   ================================ */
.s5-wrap{text-align:center;max-width:440px}
.s5-orb{width:72px;height:72px;border-radius:50%;margin:0 auto 24px;
  background:linear-gradient(135deg,#14b8a6,#0e7a7e);
  box-shadow:0 4px 30px rgba(14,122,126,0.25);
  animation:pulse-av 3.75s ease-in-out infinite;
  display:flex;align-items:center;justify-content:center;
  opacity:0;transform:scale(0.4);transition:all 0.6s cubic-bezier(0,1.5,0.5,1)}
.s5-orb.in{opacity:1;transform:scale(1)}
.s5-orb span{color:#fff;font-weight:700;font-size:1.4rem}
.s5-line{overflow:hidden;display:flex;justify-content:center;flex-wrap:wrap;gap:0 10px}
.s5-word{font-family:'DM Serif Display',serif;font-size:clamp(1.4rem,3.5vw,2rem);
  line-height:1.4;color:#1a1a1e;display:inline-block;
  opacity:0;transform:translateY(100%);transition:all 0.5s cubic-bezier(0.16,1,0.3,1)}
.s5-word.in{opacity:1;transform:translateY(0)}
.s5-word.accent{color:#0e7a7e;font-style:italic}
.s5-sub{font-size:0.76rem;color:#7a7a82;margin-top:14px;line-height:1.5;
  opacity:0;transition:opacity 0.6s}
.s5-sub.in{opacity:1}
.s5-brand{margin-top:22px;opacity:0;transition:opacity 0.6s}
.s5-brand.in{opacity:1}
.s5-name{font-size:0.82rem;font-weight:600;color:#3a3a3e}
.s5-handle{font-size:0.62rem;color:#0e7a7e;margin-top:2px}

.spark{position:fixed;border-radius:50%;pointer-events:none;z-index:20}
@keyframes spark-out{0%{opacity:0.9;transform:translate(0,0) scale(1)}
  100%{opacity:0;transform:translate(var(--dx),var(--dy)) scale(0)}}
.confetti{position:fixed;pointer-events:none;z-index:20;opacity:0.9}
@keyframes conf-fall{0%{transform:translateY(0) rotate(0deg);opacity:0.9}
  100%{transform:translateY(var(--fall)) rotate(var(--spin));opacity:0}}
</style>
</head>
<body>
<div class="film" id="film">

  <!-- SCENE 1: SEARCH -->
  <div class="sc on" id="sc1">
    <div class="search-wrap" style="position:relative">
      <div class="search-glow"></div>
      <div class="search-bar" id="sbar">
        <div class="search-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg></div>
        <div class="search-text"><span id="stext"></span><span class="search-cursor"></span></div>
      </div>
      <div class="search-results" id="sresults"></div>
      <div class="s1-qmark" id="qmark">Who do I trust?</div>
    </div>
  </div>

  <!-- SCENE 2: COMPANION -->
  <div class="sc" id="sc2">
    <div class="phone" id="phone2">
      <div class="ph-header">
        <div class="ph-av"><span>P</span></div>
        <div><div class="ph-name">Pulse</div><div class="ph-status">online</div></div>
      </div>
      <div class="ph-msgs" id="msgs2"></div>
    </div>
  </div>

  <!-- SCENE 3: DELIVERABLES -->
  <div class="sc" id="sc3">
    <div class="s3-wrap" id="s3wrap">
      <div class="s3-label" id="s3label">Pulse is working for you</div>
    </div>
  </div>

  <!-- SCENE 4: COME BACK -->
  <div class="sc" id="sc4">
    <div style="display:flex;flex-direction:column;align-items:center">
      <div class="time-skip" id="skip">2 weeks later</div>
      <div class="phone" id="phone4" style="transform:scale(0.92);opacity:0">
        <div class="ph-header">
          <div class="ph-av"><span>P</span></div>
          <div><div class="ph-name">Pulse</div><div class="ph-status">online</div></div>
        </div>
        <div class="ph-msgs" id="msgs4"></div>
      </div>
    </div>
  </div>

  <!-- SCENE 5: CLOSE -->
  <div class="sc" id="sc5">
    <div class="s5-wrap">
      <div class="s5-orb" id="s5orb"><span>P</span></div>
      <div class="s5-line" id="s5line"></div>
      <div class="s5-sub" id="s5sub">Your health companion. Cited, personal, always learning.</div>
      <div class="s5-brand" id="s5brand">
        <div class="s5-name">healthcalculators.xyz</div>
        <div class="s5-handle">@GetHealthC</div>
      </div>
    </div>
  </div>
</div>

<script>
(function(){
  function show(id){
    document.querySelectorAll('.sc').forEach(function(s){s.classList.remove('on')});
    document.getElementById(id).classList.add('on');
  }
  function sparks(x,y,n){
    var cols=['#14b8a6','#5eead4','#a78bfa','#f59e0b','#22c55e','#f472b6','#3b82f6'];
    for(var i=0;i<n;i++){var s=document.createElement('div');s.className='spark';
      var sz=3+Math.random()*5,a=Math.random()*Math.PI*2,d=25+Math.random()*50;
      s.style.cssText='width:'+sz+'px;height:'+sz+'px;left:'+x+'px;top:'+y+'px;background:'+
        cols[Math.floor(Math.random()*cols.length)]+';--dx:'+(Math.cos(a)*d)+'px;--dy:'+
        (Math.sin(a)*d-20)+'px;animation:spark-out '+(0.4+Math.random()*0.3)+
        's ease-out forwards;animation-delay:'+(i*0.02)+'s';
      document.body.appendChild(s);setTimeout(function(el){el.remove()},1000,s)}
  }
  function confetti(cx,cy,n){
    var cols=['#0e7a7e','#14b8a6','#5eead4','#a78bfa','#f59e0b','#f472b6','#3b82f6','#22c55e'];
    for(var i=0;i<n;i++){var c=document.createElement('div');c.className='confetti';
      var x=cx+(Math.random()-0.5)*260,w=4+Math.random()*4,h=Math.random()>0.5?w:w*2.5;
      c.style.cssText='left:'+x+'px;top:'+(cy-50)+'px;width:'+w+'px;height:'+h+
        'px;background:'+cols[Math.floor(Math.random()*cols.length)]+';--fall:'+
        (180+Math.random()*250)+'px;--spin:'+(200+Math.random()*500)+'deg;animation:conf-fall '+
        (1.2+Math.random()*0.8)+'s ease-out forwards;animation-delay:'+(i*0.02)+
        's;border-radius:'+(Math.random()>0.5?'50%':'2px');
      document.body.appendChild(c);setTimeout(function(el){el.remove()},2500,c)}
  }
  function addBub(where,cls,html,delay,cb){
    setTimeout(function(){
      var m=document.createElement('div');m.className='bub '+cls;m.innerHTML=html;
      document.getElementById(where).appendChild(m);
      requestAnimationFrame(function(){requestAnimationFrame(function(){
        m.classList.add('in');if(cb)setTimeout(cb,80)})});
    },delay);
  }
  function showDots(where,delay,dur,cb){
    setTimeout(function(){
      var d=document.createElement('div');d.className='bub a';
      d.innerHTML='<span class="dots"><span></span><span></span><span></span></span>';
      document.getElementById(where).appendChild(d);
      requestAnimationFrame(function(){requestAnimationFrame(function(){d.classList.add('in')})});
      setTimeout(function(){d.remove();if(cb)cb()},dur);
    },delay);
  }
  function addPills(where,opts,delay,pickIdx,pickDelay,cb){
    setTimeout(function(){
      var w=document.createElement('div');w.className='pills';
      opts.forEach(function(o,i){
        var p=document.createElement('div');p.className='pill';p.textContent=o;w.appendChild(p);
        setTimeout(function(){p.classList.add('in')},60*i);
      });
      document.getElementById(where).appendChild(w);
      setTimeout(function(){
        w.querySelectorAll('.pill').forEach(function(p,i){
          if(i===pickIdx)p.classList.add('picked');else p.classList.add('fade')});
        setTimeout(function(){w.remove();if(cb)cb(opts[pickIdx])},350);
      },pickDelay);
    },delay);
  }

  // ============================================================
  // SCENE 1 (0–10s): SEARCH BAR — type, get 5 conflicting sources
  // ============================================================
  var sbar=document.getElementById('sbar');
  var stext=document.getElementById('stext');
  var query='is it normal to gain weight even though i exercise';

  setTimeout(function(){sbar.classList.add('in')},300);

  var ci=0;
  setTimeout(function(){
    var typer=setInterval(function(){
      if(ci<query.length){stext.textContent=query.substring(0,++ci)}
      else clearInterval(typer);
    },40);
  },600);

  // 5 sources pile up fast — chaos
  setTimeout(function(){
    var results=[
      {name:'Google',color:'#4285f4',answer:'"Muscle weighs more than fat — you\'re probably gaining muscle."'},
      {name:'Reddit',color:'#ff4500',answer:'"Same thing happened to me. Honestly no one knows."'},
      {name:'ChatGPT',color:'#10a37f',answer:'"Several possible explanations including water retention..."'},
      {name:'Claude',color:'#d97706',answer:'"It depends on many factors. Without more context..."'},
      {name:'Yahoo',color:'#720e9e',answer:'"Try cutting calories and doing more cardio."'}
    ];
    var container=document.getElementById('sresults');
    results.forEach(function(r,i){
      setTimeout(function(){
        var div=document.createElement('div');div.className='search-result';
        div.innerHTML='<div class="sr-name" style="color:'+r.color+'">'+r.name+'</div>'+
          '<div class="sr-answer">'+r.answer+'</div>';
        if(i===1) div.innerHTML+='<div class="sr-conflict">\u26a0 Contradicts Google</div>';
        if(i===4) div.innerHTML+='<div class="sr-conflict">\u26a0 Contradicts ChatGPT</div>';
        container.appendChild(div);
        requestAnimationFrame(function(){requestAnimationFrame(function(){div.classList.add('in')})});
      },i*500);
    });

    // Micro-shake after all results
    setTimeout(function(){
      sbar.style.animation='micro-shake 0.3s ease-in-out';
      setTimeout(function(){sbar.style.animation=''},300);
    },3000);
  },3200);

  // "Who do I trust?" appears below
  setTimeout(function(){document.getElementById('qmark').classList.add('in')},8000);

  // ============================================================
  // SCENE 2 (10–34s): COMPANION — tighter, no filler
  // ============================================================
  setTimeout(function(){
    show('sc2');
    document.body.classList.add('warm');

    var phone=document.getElementById('phone2');
    setTimeout(function(){phone.classList.add('in')},200);

    // User asks same question
    addBub('msgs2','u','Is it normal to gain weight even though I exercise?',500);

    // --- FAST: "I can help. Quick question..."
    showDots('msgs2',2000,600,function(){
      addBub('msgs2','a','I can help with that. Just one quick question \u2014 <span class="hl">how\'s your sleep been?</span>',0);
    });

    // --- Pills after question sits 4s
    addPills('msgs2',['\ud83d\ude34 Not great','Okay I guess','Pretty good'],7000,0,2200,function(picked){
      addBub('msgs2','u',picked,300);

      // --- SLOW: cortisol insight — hero moment
      showDots('msgs2',1200,1800,function(){
        addBub('msgs2','a','<span class="warm">That\'s one of the main reasons.</span> Poor sleep raises cortisol \u2192 your body holds onto fat even when you train hard.',0);
      });

      // --- FAST: protein
      showDots('msgs2',9000,600,function(){
        addBub('msgs2','a','What proteins do you prefer?',0);
      });

      addPills('msgs2',['\ud83d\udc14 Chicken','\ud83e\udd5a Eggs','\ud83d\udc1f Fish','\ud83c\udf31 Plant'],11500,0,1600,function(){
        addBub('msgs2','u','\ud83d\udc14 Chicken',300);

        // --- SLOW: the plan promise
        showDots('msgs2',800,1200,function(){
          addBub('msgs2','a','<span class="hl">Let me plan this for you</span> so you don\'t have to remember any of it.',0);
        });
      });
    });
  },10000);

  // ============================================================
  // SCENE 3 (38–60s): DELIVERABLES — show, then ACT
  // WhatsApp notif → grocery list with checkmarks clicking → PDF
  // ============================================================
  setTimeout(function(){
    show('sc3');
    document.body.className='glow';
    var wrap=document.getElementById('s3wrap');
    setTimeout(function(){document.getElementById('s3label').classList.add('in')},300);

    // 1. WhatsApp caffeine notification (1.5s in)
    setTimeout(function(){
      var wa=document.createElement('div');
      wa.className='wa-notif';
      wa.innerHTML=
        '<div class="wa-icon">\ud83d\udcac</div>'+
        '<div class="wa-body">'+
          '<div class="wa-from">Pulse \u2022 WhatsApp</div>'+
          '<div class="wa-msg">\u2615 Last cup of regular coffee for today if you want to improve your sleep tonight.</div>'+
          '<div class="wa-time">2:00 PM</div>'+
        '</div>';
      wrap.appendChild(wa);
      requestAnimationFrame(function(){requestAnimationFrame(function(){wa.classList.add('in')})});
    },1500);

    // 2. Grocery list — items appear, then get CHECKED one by one (5s in)
    setTimeout(function(){
      var list=document.createElement('div');
      list.className='shop-list';
      list.innerHTML=
        '<div class="shop-header">'+
          '<div class="shop-title">\ud83d\uded2 Your Grocery List</div>'+
          '<div class="shop-badge">WhatsApp</div>'+
        '</div>'+
        '<div id="shopItems"></div>';
      wrap.appendChild(list);
      requestAnimationFrame(function(){requestAnimationFrame(function(){list.classList.add('in')})});

      var items=['600g chicken breast','12 eggs','500g Greek yogurt','Brown rice','Broccoli','Sweet potatoes','Olive oil'];
      var itemEls=[];

      // Items appear fast
      items.forEach(function(item,i){
        setTimeout(function(){
          var row=document.createElement('div');
          row.className='shop-item';
          row.innerHTML='<div class="shop-check" id="chk'+i+'"></div><span>'+item+'</span>';
          document.getElementById('shopItems').appendChild(row);
          itemEls.push(row);
          requestAnimationFrame(function(){requestAnimationFrame(function(){row.classList.add('in')})});
        },300+i*180);
      });

      // Then CHECK them one by one — click click click click done
      setTimeout(function(){
        itemEls.forEach(function(row,i){
          setTimeout(function(){
            row.querySelector('.shop-check').classList.add('done');
            row.classList.add('checked');
          },i*200);
        });
      },2200);
    },5000);

    // 3. Training plan PDF (13s in)
    setTimeout(function(){
      var pdf=document.createElement('div');
      pdf.className='pdf-card';
      pdf.innerHTML=
        '<div class="pdf-icon">PDF</div>'+
        '<div class="pdf-info">'+
          '<div class="pdf-name">\ud83c\udfcb\ufe0f Your Training Plan</div>'+
          '<div class="pdf-detail">4 days/week \u2022 Matched to your recovery</div>'+
          '<div class="pdf-actions">'+
            '<div class="pdf-btn primary">Send to phone</div>'+
            '<div class="pdf-btn secondary">Print</div>'+
            '<div class="pdf-btn link">pulse/s8k2x</div>'+
          '</div>'+
        '</div>';
      wrap.appendChild(pdf);
      requestAnimationFrame(function(){requestAnimationFrame(function(){
        pdf.classList.add('in');
        setTimeout(function(){
          var r=pdf.getBoundingClientRect();
          confetti(r.left+r.width/2,r.top,35);
        },500);
      })});
    },13000);
  },38000);

  // ============================================================
  // SCENE 4 (60–72s): COME BACK — fast conversation
  // ============================================================
  setTimeout(function(){
    show('sc4');
    document.body.className='warm';

    setTimeout(function(){document.getElementById('skip').classList.add('in')},300);
    var phone=document.getElementById('phone4');
    setTimeout(function(){phone.classList.add('in')},800);

    showDots('msgs4',1800,1200,function(){
      addBub('msgs4','a','You\'ve hit your caffeine cutoff <span class="hl">12 days straight</span>. Sleep is up <span class="hl">23%</span>. Down <span class="hl">1.4 kg</span>.',0,function(){
        var bar=document.createElement('div');
        bar.innerHTML='<div class="progress-mini"><div class="progress-fill" id="pf"></div></div>';
        document.getElementById('msgs4').lastChild.appendChild(bar.firstChild);
        setTimeout(function(){document.getElementById('pf').style.width='73%'},300);
      });
    });

    showDots('msgs4',8500,600,function(){
      addBub('msgs4','a','Come back anytime to <span class="hl">log and track</span>. I\'ll keep adjusting so you don\'t stagnate.',0);
    });

    addPills('msgs4',['\ud83d\ude80 Keep going','Show my dashboard'],11500,0,1200,function(){
      addBub('msgs4','u','\ud83d\ude80 Keep going',200);
      var r=phone.getBoundingClientRect();
      setTimeout(function(){sparks(r.left+r.width/2,r.top+r.height/2,16)},300);
    });
  },60000);

  // ============================================================
  // SCENE 5 (72–80s): CLOSE — kinetic type
  // ============================================================
  setTimeout(function(){
    show('sc5');
    document.body.className='warm';
    setTimeout(function(){document.getElementById('s5orb').classList.add('in')},300);

    var words=[
      {text:'One',accent:false,delay:700},
      {text:'question.',accent:false,delay:1200},
      {text:'We',accent:false,delay:2800},
      {text:'figure',accent:false,delay:3100},
      {text:'out',accent:false,delay:3300},
      {text:'the',accent:false,delay:3800},
      {text:'rest.',accent:true,delay:4200}
    ];
    var line=document.getElementById('s5line');
    words.forEach(function(w){
      var span=document.createElement('span');
      span.className='s5-word'+(w.accent?' accent':'');
      span.textContent=w.text;
      line.appendChild(span);
      setTimeout(function(){span.classList.add('in')},w.delay);
    });

    setTimeout(function(){document.getElementById('s5sub').classList.add('in')},5800);
    setTimeout(function(){document.getElementById('s5brand').classList.add('in')},5800);
  },72000);

  setTimeout(function(){
    document.getElementById('sc5').style.transition='opacity 0.5s';
    document.getElementById('sc5').style.opacity='0';
    setTimeout(function(){location.reload()},600);
  },80000);

})();
</script>
