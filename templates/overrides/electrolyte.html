{% extends 'calculator_base.html' %}

{% block result_content %}
<div id="results-section" class="hidden" style="max-width:600px;width:100%;text-align:left;">
    <!-- Status -->
    <div id="elec-status" class="result-status" style="padding:1.2rem 1.5rem;border-radius:14px;margin-bottom:1.5rem;display:flex;gap:0.8rem;align-items:flex-start;">
        <span id="elec-icon" style="font-size:1.4rem;line-height:1;"></span>
        <span id="elec-description" style="font-size:0.92rem;line-height:1.6;"></span>
    </div>

    <!-- Quick comparison -->
    <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:0.7rem;margin-bottom:1.5rem;">
        <div class="detail-card" style="background:rgba(var(--accent-rgb),0.04);border:1px solid rgba(var(--accent-rgb),0.08);border-radius:14px;padding:1rem;text-align:center;">
            <div class="d-val" id="comp-sodium" style="font-family:var(--font-display);font-size:1.2rem;color:var(--accent);">--</div>
            <div class="d-lbl" style="font-size:0.75rem;color:var(--text-dim);margin-top:0.3rem;text-transform:uppercase;">Sodium</div>
        </div>
        <div class="detail-card" style="background:rgba(var(--accent-rgb),0.04);border:1px solid rgba(var(--accent-rgb),0.08);border-radius:14px;padding:1rem;text-align:center;">
            <div class="d-val" id="comp-potassium" style="font-family:var(--font-display);font-size:1.2rem;color:var(--accent);">--</div>
            <div class="d-lbl" style="font-size:0.75rem;color:var(--text-dim);margin-top:0.3rem;text-transform:uppercase;">Potassium</div>
        </div>
        <div class="detail-card" style="background:rgba(var(--accent-rgb),0.04);border:1px solid rgba(var(--accent-rgb),0.08);border-radius:14px;padding:1rem;text-align:center;">
            <div class="d-val" id="comp-magnesium" style="font-family:var(--font-display);font-size:1.2rem;color:var(--accent);">--</div>
            <div class="d-lbl" style="font-size:0.75rem;color:var(--text-dim);margin-top:0.3rem;text-transform:uppercase;">Magnesium</div>
        </div>
    </div>

    <!-- Electrolyte breakdown -->
    <div id="elec-breakdown"></div>

    <!-- Na:K Ratio -->
    <div style="margin-top:1.5rem;padding:1.2rem 1.5rem;background:rgba(var(--accent-rgb),0.03);border:1px solid rgba(var(--accent-rgb),0.08);border-radius:14px;">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:0.5rem;">
            <span style="font-weight:600;color:var(--text);">Na : K Ratio</span>
            <span id="display-ratio" style="font-family:var(--font-display);font-size:1.1rem;color:var(--accent);">--</span>
        </div>
        <p id="ratio-status" style="font-size:0.85rem;line-height:1.6;margin:0;"></p>
    </div>

    <!-- Diet note -->
    <div class="hidden" style="margin-top:1rem;padding:1rem 1.2rem;background:rgba(var(--accent-rgb),0.03);border:1px solid rgba(var(--accent-rgb),0.08);border-radius:12px;">
        <p id="diet-note" style="font-size:0.88rem;line-height:1.6;color:var(--text-dim);margin:0;"></p>
    </div>
</div>
{% endblock %}

{% block calc_script %}
<script src="/static/js/calculators/electrolyte.js?v=3"></script>
{% endblock %}
