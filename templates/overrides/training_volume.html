{% extends 'calculator_base.html' %}

{% block extra_head %}
<style>
.tv-form { max-width:500px; width:100%; }
.tv-form .form-group { margin-bottom:1.2rem; }
.tv-form label { display:block; color:var(--text-dim,#94a3b8); font-size:0.85rem; font-weight:600; margin-bottom:0.5rem; }
.tv-form select, .tv-form input {
    width:100%; background:rgba(255,255,255,0.05); border:1px solid rgba(var(--accent-rgb),0.12);
    border-radius:12px; color:var(--text,#e2e8f0); font-size:1rem; padding:0.75rem 1rem;
    font-family:var(--font-body,'DM Sans',sans-serif); outline:none;
    transition:border-color 0.2s, box-shadow 0.2s;
}
.tv-form select:focus { border-color:var(--accent); box-shadow:0 0 0 3px rgba(var(--accent-rgb),0.1); }
.tv-form select option { background:#0d1420; color:#e2e8f0; }
.tv-form .form-row { display:flex; gap:1rem; }
.tv-form .form-row .form-group { flex:1; }
.tv-form .input-hint { font-size:0.78rem; color:var(--text-muted,#64748b); margin-top:0.3rem; }

.chip-label {
    display:inline-flex; align-items:center; gap:6px; padding:6px 14px;
    border:1px solid rgba(var(--accent-rgb),0.15); border-radius:20px; cursor:pointer;
    font-size:0.85rem; color:var(--text-dim); transition:all 0.2s; user-select:none;
}
.chip-label:hover { border-color:rgba(var(--accent-rgb),0.3); }
.chip-label.selected { background:var(--accent); color:#0a0f1a; border-color:var(--accent); }
.chip-label input { display:none; }

/* Results */
.tv-results { max-width:600px; width:100%; text-align:left; }
.tv-summary {
    background:rgba(var(--accent-rgb),0.04); border:1px solid rgba(var(--accent-rgb),0.08);
    border-radius:14px; padding:1.2rem; margin-bottom:1rem; font-size:0.92rem; line-height:1.7;
    color:var(--text-dim);
}
.tv-summary strong { color:var(--accent); }

.tv-table { width:100%; border-collapse:collapse; margin-bottom:1rem; }
.tv-table th { text-align:left; padding:0.6rem 0.8rem; font-size:0.78rem; text-transform:uppercase; color:var(--text-dim); border-bottom:1px solid rgba(var(--accent-rgb),0.1); }
.tv-table td { padding:0.6rem 0.8rem; font-size:0.88rem; color:var(--text-dim); border-bottom:1px solid rgba(var(--accent-rgb),0.06); }
.tv-table .td-bold { font-weight:600; color:var(--text); }
.vol-bar { display:inline-block; height:8px; border-radius:4px; background:var(--accent); vertical-align:middle; margin-left:6px; }
.priority-badge { display:inline-block; font-size:0.72rem; padding:2px 8px; border-radius:10px; font-weight:600; }
.priority-badge.boosted { background:rgba(var(--accent-rgb),0.15); color:var(--accent); }
.priority-badge.normal { background:rgba(255,255,255,0.05); color:var(--text-muted); }

.split-day {
    background:rgba(var(--accent-rgb),0.03); border:1px solid rgba(var(--accent-rgb),0.08);
    border-radius:12px; padding:1rem; margin-bottom:0.6rem;
}
.split-day h5 { margin:0 0 0.5rem; color:var(--accent); font-size:0.88rem; }
.split-day ul { margin:0; padding-left:1.2rem; }
.split-day li { margin-bottom:0.2rem; font-size:0.85rem; color:var(--text-dim); }

.recovery-notes {
    margin-top:1rem; padding:1rem; border-radius:14px;
    background:rgba(var(--accent-rgb),0.03); border:1px solid rgba(var(--accent-rgb),0.08);
}
.recovery-notes h4 { margin:0 0 0.6rem; color:var(--text); font-size:0.92rem; }
.recovery-notes p { font-size:0.85rem; line-height:1.6; color:var(--text-dim); margin:0.5rem 0; }
.recovery-notes strong { color:var(--accent); }

@media (max-width:600px) { .tv-form .form-row { flex-direction:column; gap:0; } }
</style>
{% endblock %}

{% block form_content %}
<div class="factory-form tv-form">
    <div class="form-row">
        <div class="form-group">
            <label for="experience">Training Experience</label>
            <select id="experience">
                <option value="beginner">Beginner (&lt;1 year)</option>
                <option value="intermediate" selected>Intermediate (1-3 years)</option>
                <option value="advanced">Advanced (3+ years)</option>
            </select>
        </div>
        <div class="form-group">
            <label for="goal">Primary Goal</label>
            <select id="goal">
                <option value="hypertrophy" selected>Muscle Growth</option>
                <option value="strength">Strength</option>
                <option value="general">General Fitness</option>
            </select>
        </div>
    </div>
    <div class="form-row">
        <div class="form-group">
            <label for="days">Training Days/Week</label>
            <select id="days">
                <option value="2">2 days</option>
                <option value="3">3 days</option>
                <option value="4" selected>4 days</option>
                <option value="5">5 days</option>
                <option value="6">6 days</option>
            </select>
        </div>
        <div class="form-group">
            <label for="age">Age Range</label>
            <select id="age">
                <option value="18-30">18-30</option>
                <option value="31-40" selected>31-40</option>
                <option value="41-50">41-50</option>
                <option value="51-60">51-60</option>
                <option value="60+">60+</option>
            </select>
        </div>
    </div>
    <div class="form-row">
        <div class="form-group">
            <label for="sleep">Sleep Quality</label>
            <select id="sleep">
                <option value="good" selected>Good (7-9 hours)</option>
                <option value="fair">Fair (5-6 hours)</option>
                <option value="poor">Poor (&lt;5 hours)</option>
            </select>
        </div>
        <div class="form-group">
            <label for="stress">Life Stress</label>
            <select id="stress">
                <option value="low">Low</option>
                <option value="moderate" selected>Moderate</option>
                <option value="high">High</option>
            </select>
        </div>
    </div>
    <div class="form-group" style="margin-top:0.5rem;">
        <label>Prioritize Up to 3 Muscle Groups <span style="font-weight:400;color:var(--text-muted);">(optional)</span></label>
        <div id="priority-muscles" style="display:flex;flex-wrap:wrap;gap:0.4rem;margin-top:0.4rem;">
            <label class="chip-label"><input type="checkbox" value="chest"> Chest</label>
            <label class="chip-label"><input type="checkbox" value="back"> Back</label>
            <label class="chip-label"><input type="checkbox" value="quads"> Quads</label>
            <label class="chip-label"><input type="checkbox" value="hamstrings"> Hamstrings</label>
            <label class="chip-label"><input type="checkbox" value="glutes"> Glutes</label>
            <label class="chip-label"><input type="checkbox" value="shoulders"> Shoulders</label>
            <label class="chip-label"><input type="checkbox" value="biceps"> Biceps</label>
            <label class="chip-label"><input type="checkbox" value="triceps"> Triceps</label>
            <label class="chip-label"><input type="checkbox" value="calves"> Calves</label>
            <label class="chip-label"><input type="checkbox" value="abs"> Abs</label>
        </div>
    </div>
    <div style="text-align:center;margin-top:1.2rem;">
        <button class="calc-btn" id="calcBtn">Calculate My Volume</button>
    </div>
</div>
{% endblock %}

{% block result_content %}
<div id="tv-results" class="tv-results" style="display:none;">
    <div class="tv-summary" id="results-summary"></div>
    <h4 style="color:var(--text);font-size:0.92rem;margin-bottom:0.6rem;">Sets Per Muscle Group Per Week</h4>
    <table class="tv-table" id="volume-table">
        <thead><tr><th>Muscle</th><th>Sets/Week</th><th>Range</th><th>Per Session</th><th>Priority</th></tr></thead>
        <tbody id="volume-tbody"></tbody>
    </table>
    <div id="total-row" style="text-align:right;font-weight:600;font-size:0.88rem;color:var(--accent);"></div>
    <h4 style="color:var(--text);font-size:0.92rem;margin:1.2rem 0 0.6rem;">Suggested Weekly Split</h4>
    <div id="split-container"></div>
    <div class="recovery-notes" id="recovery-notes"></div>
</div>
{% endblock %}

{% block calc_script %}
<script>
(function() {
// Chip toggle (max 3)
var boxes = document.querySelectorAll('#priority-muscles input[type=checkbox]');
boxes.forEach(function(box) {
    box.addEventListener('change', function() {
        var checked = document.querySelectorAll('#priority-muscles input:checked');
        if (checked.length > 3) { this.checked = false; return; }
        this.parentElement.classList.toggle('selected', this.checked);
    });
});

var calcBtn = document.getElementById('calcBtn');
if (calcBtn) calcBtn.addEventListener('click', calculateVolume);

function calculateVolume() {
    var exp = document.getElementById('experience').value;
    var goal = document.getElementById('goal').value;
    var days = parseInt(document.getElementById('days').value);
    var age = document.getElementById('age').value;
    var sleep = document.getElementById('sleep').value;
    var stress = document.getElementById('stress').value;

    var priorities = [];
    document.querySelectorAll('#priority-muscles input:checked').forEach(function(cb) { priorities.push(cb.value); });

    var baseVolume = {
        beginner: { chest:10, back:12, quads:10, hamstrings:8, glutes:6, shoulders:12, biceps:10, triceps:8, calves:10, abs:10 },
        intermediate: { chest:14, back:16, quads:14, hamstrings:12, glutes:8, shoulders:18, biceps:16, triceps:12, calves:14, abs:16 },
        advanced: { chest:18, back:20, quads:16, hamstrings:14, glutes:12, shoulders:20, biceps:18, triceps:14, calves:16, abs:20 }
    };
    var mev = { chest:10, back:10, quads:8, hamstrings:6, glutes:0, shoulders:8, biceps:8, triceps:6, calves:8, abs:0 };
    var mrv = { chest:22, back:25, quads:20, hamstrings:20, glutes:16, shoulders:26, biceps:26, triceps:18, calves:20, abs:25 };

    var goalMod = { hypertrophy:1.0, strength:0.75, general:0.7 };
    var ageMod = { '18-30':1.0, '31-40':0.95, '41-50':0.88, '51-60':0.80, '60+':0.70 };
    var sleepMod = { good:1.0, fair:0.85, poor:0.70 };
    var stressMod = { low:1.0, moderate:0.92, high:0.80 };

    var totalMod = goalMod[goal] * ageMod[age] * sleepMod[sleep] * stressMod[stress];
    var muscleNames = { chest:'Chest', back:'Back', quads:'Quads', hamstrings:'Hamstrings', glutes:'Glutes', shoulders:'Shoulders', biceps:'Biceps', triceps:'Triceps', calves:'Calves', abs:'Abs' };
    var muscleOrder = ['chest','back','quads','hamstrings','glutes','shoulders','biceps','triceps','calves','abs'];

    var results = {};
    var totalSets = 0;

    muscleOrder.forEach(function(m) {
        var base = baseVolume[exp][m];
        var adjusted = Math.round(base * totalMod);
        var isPriority = priorities.indexOf(m) !== -1;
        if (isPriority) adjusted = Math.round(adjusted * 1.2);
        var floor = Math.max(mev[m], Math.round(mev[m] * (goal === 'general' ? 0.7 : 1)));
        if (goal === 'general' && (m === 'glutes' || m === 'abs')) floor = 0;
        adjusted = Math.max(floor, Math.min(mrv[m], adjusted));
        var freq = getFrequency(m, days);
        var perSession = Math.min(10, Math.ceil(adjusted / freq));
        results[m] = { sets:adjusted, mevVal:mev[m], mrvVal:mrv[m], perSession:perSession, freq:freq, priority:isPriority };
        totalSets += adjusted;
    });

    renderResults(results, muscleNames, muscleOrder, totalSets, days, exp, goal, totalMod, age, sleep, stress);
}

function getFrequency(muscle, days) {
    if (days <= 2) return days;
    if (days === 3) return 2;
    if (days === 4) return 2;
    if (days === 5) { return ['shoulders','biceps','triceps','abs'].indexOf(muscle) !== -1 ? 3 : 2; }
    if (days === 6) { return ['shoulders','biceps','abs','calves'].indexOf(muscle) !== -1 ? 3 : 2; }
    return 2;
}

function renderResults(results, names, order, total, days, exp, goal, mod, age, sleep, stress) {
    var resultsEl = document.getElementById('tv-results');
    if (resultsEl) resultsEl.style.display = 'block';

    var modPct = Math.round((1 - mod) * 100);
    var summaryParts = [];
    if (modPct > 0) {
        var factors = [];
        if (age !== '18-30') factors.push('age');
        if (sleep !== 'good') factors.push('sleep');
        if (stress !== 'low') factors.push('stress');
        if (goal !== 'hypertrophy') factors.push('goal');
        summaryParts.push('Volume adjusted <strong>' + modPct + '% lower</strong> due to ' + factors.join(', ') + '.');
    }
    var summaryEl = document.getElementById('results-summary');
    if (summaryEl) summaryEl.innerHTML = '<strong>' + total + ' total hard sets per week</strong> across ' + days + ' training days. ' + summaryParts.join(' ') + ' Each set should be taken to RPE 7+.';

    var tbody = document.getElementById('volume-tbody');
    if (tbody) {
        tbody.innerHTML = '';
        var maxSets = 0;
        order.forEach(function(m) { if (results[m].sets > maxSets) maxSets = results[m].sets; });
        order.forEach(function(m) {
            var r = results[m];
            if (r.sets === 0) return;
            var barWidth = Math.round((r.sets / maxSets) * 80);
            tbody.innerHTML += '<tr>' +
                '<td class="td-bold">' + names[m] + '</td>' +
                '<td><strong>' + r.sets + '</strong> <span class="vol-bar" style="width:' + barWidth + 'px;"></span></td>' +
                '<td>' + r.mevVal + '-' + r.mrvVal + '</td>' +
                '<td>' + r.perSession + ' sets x ' + r.freq + 'x</td>' +
                '<td>' + (r.priority ? '<span class="priority-badge boosted">Prioritized</span>' : '<span class="priority-badge normal">Standard</span>') + '</td></tr>';
        });
    }

    var totalRow = document.getElementById('total-row');
    if (totalRow) totalRow.textContent = 'Total: ' + total + ' sets/week';

    renderSplit(results, names, days, exp);
    renderRecoveryNotes(age, sleep, stress, exp);

    // Coach card
    var coachCard = document.getElementById('coachCard');
    if (coachCard) {
        coachCard.innerHTML = '<div class="coach-text">' +
            'Your program calls for <span class="hl">' + total + ' total sets per week</span> across <span class="hl">' + days + ' days</span>.' +
            '<div class="coach-rule">Each set: RPE 7+ (1-3 reps in reserve)</div>' +
            '<div class="coach-advice">' +
                '<em>Key:</em> Start at the lower end and add 1-2 sets per muscle every 2-3 weeks if recovering well.' +
            '</div></div>';
    }

    if (typeof factoryReveal === 'function') factoryReveal();
}

function renderSplit(results, names, days, exp) {
    var container = document.getElementById('split-container');
    if (!container) return;
    var splits = getSplitTemplate(days, exp);
    var html = '';
    splits.forEach(function(day) {
        html += '<div class="split-day"><h5>' + day.name + '</h5><ul>';
        day.muscles.forEach(function(m) {
            if (results[m] && results[m].sets > 0) html += '<li>' + names[m] + ': <strong>' + results[m].perSession + ' sets</strong></li>';
        });
        html += '</ul></div>';
    });
    container.innerHTML = html;
}

function getSplitTemplate(days, exp) {
    if (days === 2) return [
        { name: 'Day 1 - Full Body A', muscles: ['chest','back','quads','shoulders','biceps','abs'] },
        { name: 'Day 2 - Full Body B', muscles: ['chest','back','hamstrings','glutes','triceps','calves'] }
    ];
    if (days === 3) {
        if (exp === 'beginner') return [
            { name: 'Day 1 - Full Body A', muscles: ['chest','back','quads','shoulders','abs'] },
            { name: 'Day 2 - Full Body B', muscles: ['chest','back','hamstrings','glutes','biceps','calves'] },
            { name: 'Day 3 - Full Body C', muscles: ['shoulders','back','quads','triceps','abs'] }
        ];
        return [
            { name: 'Day 1 - Push', muscles: ['chest','shoulders','triceps'] },
            { name: 'Day 2 - Pull', muscles: ['back','biceps','abs'] },
            { name: 'Day 3 - Legs', muscles: ['quads','hamstrings','glutes','calves'] }
        ];
    }
    if (days === 4) return [
        { name: 'Day 1 - Upper A', muscles: ['chest','back','shoulders','biceps'] },
        { name: 'Day 2 - Lower A', muscles: ['quads','hamstrings','glutes','calves','abs'] },
        { name: 'Day 3 - Upper B', muscles: ['chest','back','shoulders','triceps'] },
        { name: 'Day 4 - Lower B', muscles: ['quads','hamstrings','glutes','calves','abs'] }
    ];
    if (days === 5) return [
        { name: 'Day 1 - Push', muscles: ['chest','shoulders','triceps'] },
        { name: 'Day 2 - Pull', muscles: ['back','biceps','abs'] },
        { name: 'Day 3 - Legs', muscles: ['quads','hamstrings','glutes','calves'] },
        { name: 'Day 4 - Upper', muscles: ['chest','back','shoulders','biceps','triceps'] },
        { name: 'Day 5 - Lower', muscles: ['quads','hamstrings','glutes','calves','abs'] }
    ];
    if (days === 6) return [
        { name: 'Day 1 - Push A', muscles: ['chest','shoulders','triceps'] },
        { name: 'Day 2 - Pull A', muscles: ['back','biceps','abs'] },
        { name: 'Day 3 - Legs A', muscles: ['quads','hamstrings','glutes','calves'] },
        { name: 'Day 4 - Push B', muscles: ['chest','shoulders','triceps'] },
        { name: 'Day 5 - Pull B', muscles: ['back','biceps','abs'] },
        { name: 'Day 6 - Legs B', muscles: ['quads','hamstrings','glutes','calves'] }
    ];
    return [];
}

function renderRecoveryNotes(age, sleep, stress, exp) {
    var notes = [];
    if (age === '51-60' || age === '60+') notes.push('<strong>Age-adjusted recovery:</strong> Allow 48-72 hours between sessions targeting the same muscle group.');
    else if (age === '41-50') notes.push('<strong>Age note:</strong> Recovery capacity begins declining in your 40s. Prioritize sleep and nutrition.');
    if (sleep === 'poor') notes.push('<strong>Sleep warning:</strong> Under 5 hours reduces muscle protein synthesis by ~18%. Fixing sleep will do more than any program change.');
    else if (sleep === 'fair') notes.push('<strong>Sleep note:</strong> 5-6 hours is below optimal. Volume reduced by 15%.');
    if (stress === 'high') notes.push('<strong>Stress note:</strong> High stress impairs recovery. Volume reduced by 20%. Maintain intensity but reduce total volume.');
    if (exp === 'beginner') notes.push('<strong>Beginner tip:</strong> Start at the lower end. Add 1-2 sets per muscle every 2-3 weeks if recovering well.');
    if (notes.length === 0) notes.push('<strong>Recovery looks good.</strong> Focus on progressive overload.');
    var el = document.getElementById('recovery-notes');
    if (el) el.innerHTML = '<h4>Recovery Notes</h4>' + notes.map(function(n) { return '<p>' + n + '</p>'; }).join('');
}
})();
</script>
{% endblock %}
