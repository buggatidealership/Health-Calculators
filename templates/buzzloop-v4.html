<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Buzzloop — Reel Categories</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
:root{--bg:#0c0c0f;--s:rgba(255,255,255,.03);--b:rgba(255,255,255,.06);--t:#eee;--t2:rgba(255,255,255,.5);--t3:rgba(255,255,255,.2);--a:#f97316;--ag:rgba(249,115,22,.12);--r:20px;--e:cubic-bezier(.16,1,.3,1)}
*{margin:0;padding:0;box-sizing:border-box}html{scroll-behavior:smooth}
body{font-family:'Inter',system-ui,sans-serif;background:var(--bg);color:var(--t);-webkit-font-smoothing:antialiased;overflow-x:hidden}

nav{position:fixed;top:0;left:0;right:0;z-index:100;background:rgba(12,12,15,.85);backdrop-filter:blur(16px);border-bottom:1px solid var(--b)}
.nav-i{max-width:1200px;margin:0 auto;padding:0 32px;height:56px;display:flex;align-items:center;justify-content:space-between}
.nav-logo{font-size:17px;font-weight:700;display:flex;align-items:center;gap:8px}
.bolt{width:22px;height:22px;background:var(--a);border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:12px}
.nav-cta{padding:8px 20px;background:var(--a);color:#fff;border-radius:8px;font-size:13px;font-weight:600;text-decoration:none}

/* Split layout: sticky phone left, scrolling descriptions right */
.showcase{display:flex;max-width:1200px;margin:0 auto;padding:80px 32px 40px;min-height:100vh}
.phone-col{flex:0 0 360px;position:sticky;top:80px;height:fit-content;display:flex;flex-direction:column;align-items:center}
.phone{width:300px;background:#111;border-radius:40px;border:2px solid rgba(255,255,255,.06);box-shadow:0 40px 100px rgba(0,0,0,.5);overflow:hidden}
.phone-notch{width:90px;height:20px;background:#111;border-radius:0 0 12px 12px;margin:0 auto}
.phone-screen{background:#080808;margin:0 5px 5px;border-radius:0 0 36px 36px;height:533px;overflow:hidden;position:relative}
.phone-screen video{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;opacity:0;transition:opacity .4s var(--e)}
.phone-screen video.active{opacity:1}

/* Dots */
.dots{display:flex;gap:8px;justify-content:center;margin-top:20px}
.dot{width:8px;height:8px;border-radius:50%;background:rgba(255,255,255,.1);border:none;cursor:pointer;padding:0;transition:all .3s var(--e)}
.dot.active{background:var(--a);transform:scale(1.4);box-shadow:0 0 8px var(--ag)}

/* Script column */
.script-col{flex:1;padding-left:48px;padding-top:20px}
.script-card{background:var(--s);border:1px solid var(--b);border-radius:var(--r);padding:28px;margin-bottom:20px;opacity:.3;transform:scale(.98);transition:all .4s var(--e);cursor:pointer}
.script-card.active{opacity:1;transform:scale(1);border-color:rgba(255,255,255,.1)}
.sc-num{font-size:11px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--a);margin-bottom:6px}
.sc-title{font-size:20px;font-weight:700;margin-bottom:4px}
.sc-trend{font-size:13px;color:var(--t3);margin-bottom:14px}
.sc-section{margin-bottom:10px}
.sc-label{font-size:10px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--t3);margin-bottom:3px}
.sc-text{font-size:13px;color:var(--t2);line-height:1.55}
.sc-text strong{color:var(--t);font-weight:600}

/* Hero */
.hero{max-width:1200px;margin:0 auto;padding:100px 32px 20px;text-align:center}
.hero h1{font-size:clamp(32px,5vw,52px);font-weight:800;letter-spacing:-.04em;margin-bottom:12px}
.hero h1 em{font-style:normal;color:var(--a)}
.hero-sub{font-size:16px;color:var(--t2);max-width:460px;margin:0 auto;line-height:1.6}

footer{max-width:1200px;margin:0 auto;padding:32px;border-top:1px solid var(--b);display:flex;justify-content:space-between;font-size:12px;color:var(--t3)}

@media(max-width:768px){
  .showcase{flex-direction:column;padding-top:100px}
  .phone-col{position:static;flex:none;margin-bottom:32px}
  .script-col{padding-left:0}
}
</style>
</head>
<body>
<nav><div class="nav-i"><div class="nav-logo"><div class="bolt">⚡</div>Buzzloop</div><a href="#" class="nav-cta">Start free →</a></div></nav>

<div class="hero">
  <h1>Reel categories built<br>from <em>your reviews</em></h1>
  <p class="hero-sub">Click any category to preview it. Each one is generated automatically from real customer reviews.</p>
</div>

<div class="showcase">
  <div class="phone-col">
    <div class="phone">
      <div class="phone-notch"></div>
      <div class="phone-screen">
        <video src="/static/videos/cat-dental-myth.mp4" class="active" autoplay muted loop playsinline></video>
        <video src="/static/videos/cat-bar-ritual.mp4" muted loop playsinline></video>
        <video src="/static/videos/cat-dental-dm.mp4" muted loop playsinline></video>
        <video src="/static/videos/cat-bar-myth.mp4" muted loop playsinline></video>
        <video src="/static/videos/cat-bar-afterhours.mp4" muted loop playsinline></video>
      </div>
    </div>
    <div class="dots" id="dots"></div>
  </div>

  <div class="script-col" id="scripts"></div>
</div>

<footer><div>⚡ Buzzloop</div><div>© 2026</div></footer>

<script>
const REELS=[
  {cat:"Dental",title:"Myth Slayer",trend:"Debunk viral myths with evidence",desc:"Influencer claim → glitch cut → clinical correction with source. The adversarial format triggers DM shares — people send corrections to friends.",algo:"DM shares (sends per reach)",breaks:"'Did you know?' fact cards"},
  {cat:"Restaurant",title:"The Ritual",trend:"ASMR sensory close-up of craft",desc:"No voice. Just the pour, the flame, the foam. Viewers watch for sensory satisfaction — then DM it to plan Friday night.",algo:"Completion rate + saves",breaks:"Slow-mo food money shot"},
  {cat:"Dental",title:"The DM",trend:"WhatsApp from your dentist",desc:"Chat bubbles, typing dots, a personal correction delivered warmly. Looks like a DM — gets shared as one.",algo:"Replies + DM shares",breaks:"Clinical distance & tone"},
  {cat:"Restaurant",title:"Menu Myth",trend:"Bold typography corrections",desc:"'Well-done isn't safer.' A common belief corrected with evidence. Educational content gets 2.3× more saves.",algo:"Saves (2.3× educational)",breaks:"Menu item reveals"},
  {cat:"Restaurant",title:"After Hours",trend:"Documentary cinema at closing",desc:"11:47 PM. Empty bar. Film grain. Ambient sound. Melancholy beauty. Nothing in hospitality looks like this.",algo:"Emotional shares",breaks:"BTS prep montage"}
];

const videos=document.querySelectorAll('.phone-screen video');
const dotsEl=document.getElementById('dots');
const scriptsEl=document.getElementById('scripts');
let current=0;

REELS.forEach((r,i)=>{
  const dot=document.createElement('button');
  dot.className=`dot${i===0?' active':''}`;
  dot.onclick=()=>go(i);
  dotsEl.appendChild(dot);

  const card=document.createElement('div');
  card.className=`script-card${i===0?' active':''}`;
  card.onclick=()=>go(i);
  card.innerHTML=`
    <div class="sc-num">${r.cat} · ${String(i+1).padStart(2,'0')}</div>
    <div class="sc-title">${r.title}</div>
    <div class="sc-trend">${r.trend}</div>
    <div class="sc-section"><div class="sc-label">How it works</div><div class="sc-text">${r.desc}</div></div>
    <div class="sc-section"><div class="sc-label">Algorithm signal</div><div class="sc-text"><strong>${r.algo}</strong></div></div>
    <div class="sc-section"><div class="sc-label">Breaks</div><div class="sc-text">${r.breaks}</div></div>
  `;
  scriptsEl.appendChild(card);
});

function go(idx){
  videos.forEach(v=>{v.classList.remove('active');v.pause()});
  videos[idx].classList.add('active');
  videos[idx].currentTime=0;
  videos[idx].play();
  document.querySelectorAll('.dot').forEach(d=>d.classList.remove('active'));
  dotsEl.children[idx].classList.add('active');
  document.querySelectorAll('.script-card').forEach(c=>c.classList.remove('active'));
  scriptsEl.children[idx].classList.add('active');
  scriptsEl.children[idx].scrollIntoView({behavior:'smooth',block:'nearest'});
  current=idx;
}
</script>
</body>
</html>
