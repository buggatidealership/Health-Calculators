<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>Caffeine Half-Life Calculator — The Split</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: 'DM Sans', sans-serif; overflow-x: hidden; }

/* SPLIT LAYOUT */
.split-container {
  display: flex;
  min-height: 100vh;
  position: relative;
}

.split-left {
  flex: 1;
  background: #F5F0EA;
  padding: 48px 40px;
  display: flex;
  flex-direction: column;
  justify-content: center;
  position: relative;
  z-index: 2;
}

.split-right {
  flex: 1;
  background: #0a0f1a;
  color: #e0e0e0;
  padding: 48px 40px;
  display: flex;
  flex-direction: column;
  justify-content: center;
  position: relative;
  z-index: 2;
  overflow: hidden;
}

/* Diagonal divider */
.split-container::after {
  content: '';
  position: absolute;
  top: 0;
  left: calc(50% - 40px);
  width: 80px;
  height: 100%;
  background: linear-gradient(165deg, #F5F0EA 50%, #0a0f1a 50%);
  z-index: 3;
  pointer-events: none;
}

/* LEFT SIDE — Form */
.form-title {
  font-family: 'DM Serif Display', serif;
  font-size: 2.2rem;
  color: #1a1a1a;
  margin-bottom: 8px;
  line-height: 1.2;
}

.form-subtitle {
  color: #777;
  font-size: 15px;
  margin-bottom: 36px;
}

.section-label {
  font-size: 12px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 1.5px;
  color: #0e7a7e;
  margin-bottom: 16px;
}

.source-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 8px;
  margin-bottom: 32px;
}

.source-card {
  background: #fff;
  border: 2px solid transparent;
  border-radius: 10px;
  padding: 12px 8px;
  text-align: center;
  cursor: pointer;
  transition: all 0.25s ease;
  font-size: 12px;
}

.source-card:hover { border-color: #0e7a7e; }
.source-card.active {
  border-color: #0e7a7e;
  background: #e8f5f5;
  box-shadow: 0 2px 12px rgba(14,122,126,0.12);
}

.source-card .icon { font-size: 22px; display: block; margin-bottom: 4px; }
.source-card .name { font-weight: 700; font-size: 11px; line-height: 1.3; }
.source-card .mg { color: #999; font-size: 10px; margin-top: 2px; }

.custom-mg-wrap { text-align: center; margin-bottom: 24px; }
.custom-mg-wrap.hidden { display: none; }
.custom-mg-input {
  font-family: 'DM Sans', sans-serif;
  font-size: 18px;
  padding: 10px 16px;
  border: 2px solid #d0ccc6;
  border-radius: 10px;
  width: 120px;
  text-align: center;
  outline: none;
  background: #fff;
}
.custom-mg-input:focus { border-color: #0e7a7e; }

.time-row {
  display: flex;
  gap: 16px;
  margin-bottom: 16px;
}

.time-group { flex: 1; }
.time-group label {
  display: block;
  font-size: 12px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 1px;
  color: #888;
  margin-bottom: 8px;
}

.time-group input[type="time"] {
  width: 100%;
  font-family: 'DM Sans', sans-serif;
  font-size: 18px;
  padding: 12px 16px;
  border: 2px solid #d0ccc6;
  border-radius: 10px;
  background: #fff;
  color: #1a1a1a;
  outline: none;
  transition: border-color 0.3s;
}

.time-group input[type="time"]:focus { border-color: #0e7a7e; }

/* RIGHT SIDE — Results */
.results-header {
  font-size: 12px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 2px;
  color: #2ee8b0;
  margin-bottom: 24px;
}

.result-big-number {
  font-family: 'DM Serif Display', serif;
  font-size: clamp(4rem, 8vw, 7rem);
  line-height: 1;
  margin-bottom: 4px;
  transition: color 0.4s;
}

.result-label {
  font-size: 16px;
  color: #666;
  margin-bottom: 8px;
}

.result-badge {
  display: inline-block;
  padding: 6px 18px;
  border-radius: 100px;
  font-size: 13px;
  font-weight: 700;
  margin-bottom: 40px;
}

.badge-good { background: rgba(46,232,176,0.12); color: #2ee8b0; }
.badge-caution { background: rgba(255,193,7,0.12); color: #ffc107; }
.badge-bad { background: rgba(255,82,82,0.12); color: #ff5252; }

/* Spectrum bar */
.spectrum-wrap {
  margin-bottom: 32px;
}

.spectrum-labels {
  display: flex;
  justify-content: space-between;
  font-size: 11px;
  color: #666;
  margin-bottom: 6px;
}

.spectrum-bar {
  height: 6px;
  background: linear-gradient(to right, #2ee8b0, #ffc107 50%, #ff5252);
  border-radius: 3px;
  position: relative;
}

.spectrum-marker {
  width: 14px;
  height: 14px;
  border-radius: 50%;
  background: #fff;
  border: 3px solid #2ee8b0;
  position: absolute;
  top: 50%;
  transform: translate(-50%, -50%);
  transition: left 0.6s ease, border-color 0.4s;
  box-shadow: 0 0 8px rgba(0,0,0,0.3);
}

/* Timeline */
.timeline { margin-bottom: 24px; }

.tl-row {
  display: flex;
  align-items: center;
  padding: 8px 0;
  border-bottom: 1px solid rgba(255,255,255,0.05);
  font-size: 13px;
}

.tl-time { width: 80px; color: #888; flex-shrink: 0; }
.tl-bar-wrap {
  flex: 1;
  height: 4px;
  background: rgba(255,255,255,0.05);
  border-radius: 2px;
  margin: 0 12px;
  overflow: hidden;
}
.tl-bar { height: 100%; border-radius: 2px; transition: width 0.6s ease; }
.tl-mg { width: 55px; text-align: right; font-weight: 700; font-size: 12px; }

/* Cutoff */
.cutoff-section {
  background: rgba(46,232,176,0.06);
  border: 1px solid rgba(46,232,176,0.15);
  border-radius: 12px;
  padding: 20px;
  text-align: center;
}

.cutoff-label {
  font-size: 12px;
  color: #888;
  text-transform: uppercase;
  letter-spacing: 1px;
  margin-bottom: 8px;
}

.cutoff-value {
  font-family: 'DM Serif Display', serif;
  font-size: 2.5rem;
  color: #2ee8b0;
}

/* ASK PULSE — full width */
.pulse-section {
  background: #050a14;
  padding: 80px 24px;
  text-align: center;
  position: relative;
}

.pulse-dot {
  width: 14px;
  height: 14px;
  background: #2ee8b0;
  border-radius: 50%;
  display: inline-block;
  margin-bottom: 24px;
  animation: pulse-glow 2s ease-in-out infinite;
}

@keyframes pulse-glow {
  0%, 100% { box-shadow: 0 0 0 0 rgba(46,232,176,0.4); }
  50% { box-shadow: 0 0 0 18px rgba(46,232,176,0); }
}

.pulse-title {
  font-family: 'DM Serif Display', serif;
  font-size: 2rem;
  color: #f0f0f0;
  margin-bottom: 12px;
}

.pulse-sub {
  color: #666;
  font-size: 15px;
  margin-bottom: 28px;
}

.pulse-input-wrap {
  max-width: 480px;
  margin: 0 auto;
  position: relative;
}

.pulse-input {
  width: 100%;
  padding: 16px 56px 16px 24px;
  border: 1px solid rgba(255,255,255,0.1);
  border-radius: 100px;
  background: rgba(255,255,255,0.04);
  color: #f0f0f0;
  font-family: 'DM Sans', sans-serif;
  font-size: 15px;
  outline: none;
}

.pulse-input::placeholder { color: #555; }
.pulse-input:focus { border-color: #2ee8b0; }

.pulse-send {
  position: absolute;
  right: 6px;
  top: 50%;
  transform: translateY(-50%);
  width: 40px;
  height: 40px;
  border-radius: 50%;
  background: #2ee8b0;
  border: none;
  color: #050a14;
  font-size: 18px;
  cursor: pointer;
}

/* MOBILE */
@media (max-width: 768px) {
  .split-container {
    flex-direction: column;
    min-height: auto;
  }
  .split-left, .split-right {
    padding: 32px 20px;
  }
  .split-container::after {
    left: 0;
    width: 100%;
    height: 60px;
    top: auto;
    bottom: auto;
    position: relative;
    background: linear-gradient(to bottom, #F5F0EA 50%, #0a0f1a 50%);
    display: none;
  }
  .source-grid { grid-template-columns: repeat(4, 1fr); }
  .form-title { font-size: 1.8rem; }
  .result-big-number { font-size: 4rem; }
}
</style>
</head>
<body>

<div class="split-container">
  <!-- LEFT: Form -->
  <div class="split-left">
    <h1 class="form-title">Caffeine<br>Half-Life Calculator</h1>
    <p class="form-subtitle">How much caffeine will be in your system at bedtime?</p>

    <div class="section-label">Pick your source</div>
    <div class="source-grid" id="source-grid"></div>
    <div class="custom-mg-wrap hidden" id="custom-mg-wrap">
      <input type="number" class="custom-mg-input" id="custom-mg" placeholder="mg" min="1" max="1000">
    </div>

    <div class="section-label">Set your times</div>
    <div class="time-row">
      <div class="time-group">
        <label>Consumed at</label>
        <input type="time" id="drink-time" value="08:00">
      </div>
      <div class="time-group">
        <label>Bedtime</label>
        <input type="time" id="bed-time" value="22:00">
      </div>
    </div>
  </div>

  <!-- RIGHT: Results -->
  <div class="split-right">
    <div class="results-header">Your results</div>

    <div class="result-big-number" id="big-mg">—</div>
    <div class="result-label">mg remaining at bedtime</div>
    <div class="result-badge badge-good" id="verdict">Enter your details</div>

    <div class="spectrum-wrap">
      <div class="spectrum-labels">
        <span>Sleep-friendly</span>
        <span>Caution</span>
        <span>Disruptive</span>
      </div>
      <div class="spectrum-bar">
        <div class="spectrum-marker" id="spectrum-marker" style="left:10%"></div>
      </div>
    </div>

    <div class="timeline" id="timeline"></div>

    <div class="cutoff-section">
      <div class="cutoff-label">Last safe cup</div>
      <div class="cutoff-value" id="cutoff-time">—</div>
    </div>
  </div>
</div>

<!-- ASK PULSE -->
<div class="pulse-section">
  <div class="pulse-dot"></div>
  <div class="pulse-title">Ask Pulse anything</div>
  <p class="pulse-sub">Sleep, caffeine, nutrition, fitness — we're listening.</p>
  <div class="pulse-input-wrap">
    <input type="text" class="pulse-input" placeholder="e.g. Is 2 cups of coffee a day too much?">
    <button class="pulse-send" aria-label="Send">&#8593;</button>
  </div>
</div>

<script>
var HALF_LIFE = 5;
var state = { mg: 95, source: 'Coffee' };

var sources = [
  { name: 'Coffee', mg: 95, icon: '\u2615' },
  { name: 'Tall coffee', mg: 142, icon: '\u2615' },
  { name: 'Espresso', mg: 63, icon: '\u2615' },
  { name: 'Cold brew', mg: 200, icon: '\u2615' },
  { name: 'Energy drink', mg: 160, icon: '\u26A1' },
  { name: 'Bang/Reign', mg: 300, icon: '\uD83D\uDCAA' },
  { name: 'Black tea', mg: 47, icon: '\uD83C\uDF75' },
  { name: 'Green tea', mg: 28, icon: '\uD83C\uDF75' },
  { name: 'Caffeine pill', mg: 200, icon: '\uD83D\uDC8A' },
  { name: 'Cola', mg: 34, icon: '\uD83E\uDD64' },
  { name: 'Pre-workout', mg: 200, icon: '\uD83C\uDFCB' },
  { name: 'Custom', mg: 0, icon: '\u2699' }
];

function parseTime(val) {
  if (!val) return null;
  var parts = val.split(':');
  return parseInt(parts[0]) * 60 + parseInt(parts[1]);
}

function formatTime(minutes) {
  var m = ((minutes % 1440) + 1440) % 1440;
  var h = Math.floor(m / 60);
  var min = m % 60;
  var ampm = h >= 12 ? 'PM' : 'AM';
  var h12 = h % 12 || 12;
  return h12 + ':' + String(min).padStart(2, '0') + ' ' + ampm;
}

function remaining(initialMg, hours) {
  return initialMg * Math.pow(0.5, hours / HALF_LIFE);
}

// Build source grid
var grid = document.getElementById('source-grid');
sources.forEach(function(s, i) {
  var card = document.createElement('div');
  card.className = 'source-card' + (i === 0 ? ' active' : '');
  card.innerHTML = '<span class="icon">' + s.icon + '</span><div class="name">' + s.name + '</div>' + (s.mg > 0 ? '<div class="mg">' + s.mg + ' mg</div>' : '<div class="mg">your dose</div>');
  card.addEventListener('click', function() {
    document.querySelectorAll('.source-card').forEach(function(c) { c.classList.remove('active'); });
    card.classList.add('active');
    if (s.name === 'Custom') {
      document.getElementById('custom-mg-wrap').classList.remove('hidden');
      state.mg = parseInt(document.getElementById('custom-mg').value) || 100;
    } else {
      document.getElementById('custom-mg-wrap').classList.add('hidden');
      state.mg = s.mg;
    }
    state.source = s.name;
    calculate();
  });
  grid.appendChild(card);
});

document.getElementById('custom-mg').addEventListener('input', function() {
  state.mg = parseInt(this.value) || 0;
  calculate();
});
document.getElementById('drink-time').addEventListener('change', calculate);
document.getElementById('bed-time').addEventListener('change', calculate);

function calculate() {
  var drinkMin = parseTime(document.getElementById('drink-time').value);
  var bedMin = parseTime(document.getElementById('bed-time').value);
  if (drinkMin === null || bedMin === null || state.mg <= 0) return;

  var diff = bedMin - drinkMin;
  if (diff <= 0) diff += 1440;
  var hours = diff / 60;
  var mgAtBed = remaining(state.mg, hours);
  var rounded = Math.round(mgAtBed);

  document.getElementById('big-mg').textContent = rounded;

  var verdict = document.getElementById('verdict');
  var bigEl = document.getElementById('big-mg');
  var marker = document.getElementById('spectrum-marker');

  // Spectrum position: 0mg = 0%, cap at ~150mg = 100%
  var pct = Math.min((mgAtBed / 100) * 100, 100);
  marker.style.left = pct + '%';

  if (mgAtBed < 25) {
    verdict.textContent = 'Sleep-friendly';
    verdict.className = 'result-badge badge-good';
    bigEl.style.color = '#2ee8b0';
    marker.style.borderColor = '#2ee8b0';
  } else if (mgAtBed < 50) {
    verdict.textContent = 'Caution zone';
    verdict.className = 'result-badge badge-caution';
    bigEl.style.color = '#ffc107';
    marker.style.borderColor = '#ffc107';
  } else {
    verdict.textContent = 'Sleep disruptive';
    verdict.className = 'result-badge badge-bad';
    bigEl.style.color = '#ff5252';
    marker.style.borderColor = '#ff5252';
  }

  // Timeline
  var timeline = document.getElementById('timeline');
  timeline.innerHTML = '';
  var maxHours = Math.min(Math.ceil(hours) + 1, 20);
  var step = maxHours > 14 ? 2 : 1;
  for (var h = 0; h <= maxHours; h += step) {
    var mg = remaining(state.mg, h);
    var barPct = (mg / state.mg) * 100;
    var time = formatTime(drinkMin + h * 60);
    var barColor = mg < 25 ? '#2ee8b0' : mg < 50 ? '#ffc107' : '#ff5252';

    var row = document.createElement('div');
    row.className = 'tl-row';
    row.innerHTML =
      '<div class="tl-time">' + time + '</div>' +
      '<div class="tl-bar-wrap"><div class="tl-bar" style="width:' + barPct + '%;background:' + barColor + '"></div></div>' +
      '<div class="tl-mg" style="color:' + barColor + '">' + Math.round(mg) + '</div>';
    timeline.appendChild(row);
  }

  // Cutoff
  var hoursNeeded = HALF_LIFE * Math.log2(state.mg / 25);
  var cutoffMin = bedMin - hoursNeeded * 60;
  document.getElementById('cutoff-time').textContent = formatTime(cutoffMin);
}

calculate();
</script>
</body>
</html>
