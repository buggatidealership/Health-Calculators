<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>Caffeine Half-Life Calculator | Pulse</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@400;500;600;700&family=DM+Serif+Display&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #12121f;
  --bg-panel: #1a1a2e;
  --bg-panel-alt: #1e1e34;
  --border: rgba(255,255,255,0.06);
  --border-bright: rgba(255,255,255,0.12);
  --teal: #14b8a6;
  --teal-dim: rgba(20,184,166,0.5);
  --teal-bg: rgba(20,184,166,0.08);
  --text: #e2e8f0;
  --text-dim: #64748b;
  --text-bright: #f8fafc;
  --green: #22c55e;
  --yellow: #eab308;
  --red: #ef4444;
  --mono: 'DM Mono', monospace;
}

body {
  font-family: 'DM Sans', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  -webkit-font-smoothing: antialiased;
}

.dashboard {
  max-width: 960px;
  margin: 0 auto;
  padding: 20px 16px 80px;
}

/* Top bar */
.top-bar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 12px 0 24px;
  border-bottom: 1px solid var(--border);
  margin-bottom: 20px;
}
.top-bar-brand {
  display: flex;
  align-items: center;
  gap: 10px;
}
.top-bar-dot {
  width: 8px; height: 8px;
  background: var(--teal);
  border-radius: 50%;
  animation: dot-pulse 2s ease-in-out infinite;
}
@keyframes dot-pulse {
  0%, 100% { opacity: 0.5; } 50% { opacity: 1; }
}
.top-bar-brand span {
  font-size: 14px;
  font-weight: 600;
  color: var(--text-dim);
  text-transform: uppercase;
  letter-spacing: 2px;
}
.top-bar-title {
  font-size: 13px;
  color: var(--text-dim);
  font-family: var(--mono);
}

/* Panel */
.panel {
  background: var(--bg-panel);
  border: 1px solid var(--border);
  border-radius: 12px;
  overflow: hidden;
}
.panel-header {
  padding: 14px 20px;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.panel-title {
  font-size: 12px;
  text-transform: uppercase;
  letter-spacing: 1.5px;
  color: var(--text-dim);
  font-weight: 600;
}
.panel-badge {
  font-family: var(--mono);
  font-size: 11px;
  padding: 3px 8px;
  border-radius: 4px;
  background: var(--teal-bg);
  color: var(--teal);
}
.panel-body {
  padding: 20px;
}

/* Input grid */
.input-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 16px;
  margin-bottom: 20px;
}
@media (max-width: 600px) {
  .input-grid { grid-template-columns: 1fr; }
}

/* Source selector — compact grid */
.source-compact-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
  gap: 6px;
}
.src-btn {
  background: var(--bg-panel-alt);
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 8px 10px;
  cursor: pointer;
  font-family: inherit;
  font-size: 12px;
  color: var(--text);
  text-align: left;
  transition: all 0.15s;
  display: flex;
  justify-content: space-between;
  align-items: center;
}
.src-btn:hover { border-color: var(--border-bright); }
.src-btn.active { border-color: var(--teal); background: var(--teal-bg); }
.src-btn .src-mg {
  font-family: var(--mono);
  font-size: 11px;
  color: var(--text-dim);
}
.src-btn.active .src-mg { color: var(--teal); }

.custom-row {
  display: none;
  margin-top: 8px;
  gap: 8px;
  align-items: center;
}
.custom-row.show { display: flex; }
.custom-row input {
  width: 80px;
  background: var(--bg-panel-alt);
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 8px 10px;
  font-family: var(--mono);
  font-size: 14px;
  color: var(--text);
  outline: none;
}
.custom-row input:focus { border-color: var(--teal); }
.custom-row span { font-size: 12px; color: var(--text-dim); }

/* Time inputs */
.time-panel-row {
  display: flex;
  gap: 12px;
}
.time-panel-field {
  flex: 1;
}
.time-panel-field label {
  display: block;
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 1px;
  color: var(--text-dim);
  margin-bottom: 6px;
}
.time-panel-field input {
  width: 100%;
  background: var(--bg-panel-alt);
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 10px 12px;
  font-family: var(--mono);
  font-size: 16px;
  color: var(--text);
  outline: none;
}
.time-panel-field input:focus { border-color: var(--teal); }

.run-btn {
  width: 100%;
  padding: 12px;
  background: var(--teal);
  color: var(--bg);
  border: none;
  border-radius: 8px;
  font-family: inherit;
  font-size: 14px;
  font-weight: 600;
  cursor: pointer;
  margin-top: 12px;
  transition: all 0.2s;
  text-transform: uppercase;
  letter-spacing: 1px;
}
.run-btn:hover { filter: brightness(1.1); }

/* Results dashboard grid */
.results-area { display: none; margin-top: 20px; }
.results-area.show { display: block; }

.dash-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 16px;
  margin-bottom: 16px;
}
@media (max-width: 600px) {
  .dash-grid { grid-template-columns: 1fr; }
}

/* Big metric panel */
.metric-panel {
  text-align: center;
  padding: 32px 20px;
}
.metric-label {
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 1.5px;
  color: var(--text-dim);
  margin-bottom: 8px;
}
.metric-value {
  font-family: var(--mono);
  font-size: 56px;
  font-weight: 500;
  line-height: 1;
  margin-bottom: 4px;
}
.metric-value.good { color: var(--green); }
.metric-value.caution { color: var(--yellow); }
.metric-value.bad { color: var(--red); }
.metric-unit {
  font-family: var(--mono);
  font-size: 14px;
  color: var(--text-dim);
}

/* Cutoff panel */
.cutoff-panel {
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  text-align: center;
  padding: 32px 20px;
}
.cutoff-value {
  font-family: var(--mono);
  font-size: 36px;
  font-weight: 500;
  color: var(--teal);
  margin-bottom: 4px;
}
.cutoff-desc {
  font-size: 12px;
  color: var(--text-dim);
  text-transform: uppercase;
  letter-spacing: 1px;
}

/* Decay curve — canvas */
.curve-panel { padding: 20px; }
.curve-canvas {
  width: 100%;
  height: 200px;
  display: block;
}

/* Color bar */
.colorbar-panel {
  padding: 20px;
}
.colorbar-track {
  height: 12px;
  border-radius: 6px;
  position: relative;
  overflow: hidden;
}
.colorbar-labels {
  display: flex;
  justify-content: space-between;
  margin-top: 8px;
  font-family: var(--mono);
  font-size: 10px;
  color: var(--text-dim);
}
.colorbar-marker {
  position: absolute;
  top: -4px;
  width: 4px; height: 20px;
  background: white;
  transform: translateX(-50%);
  border-radius: 2px;
  transition: left 0.5s ease;
  box-shadow: 0 0 6px rgba(255,255,255,0.5);
}
.colorbar-now {
  position: absolute;
  top: -22px;
  transform: translateX(-50%);
  font-family: var(--mono);
  font-size: 10px;
  color: var(--text-bright);
  white-space: nowrap;
}

/* Timeline compact */
.tl-compact {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(64px, 1fr));
  gap: 4px;
}
.tl-cell {
  text-align: center;
  padding: 8px 4px;
  border-radius: 4px;
  font-family: var(--mono);
  transition: background 0.2s;
}
.tl-cell-time { font-size: 10px; color: var(--text-dim); }
.tl-cell-mg { font-size: 14px; font-weight: 500; margin-top: 2px; }
.tl-cell.good { background: rgba(34,197,94,0.08); }
.tl-cell.good .tl-cell-mg { color: var(--green); }
.tl-cell.caution { background: rgba(234,179,8,0.08); }
.tl-cell.caution .tl-cell-mg { color: var(--yellow); }
.tl-cell.bad { background: rgba(239,68,68,0.08); }
.tl-cell.bad .tl-cell-mg { color: var(--red); }

/* Terminal / Ask Pulse */
.terminal-section {
  margin-top: 32px;
}
.terminal-body {
  padding: 20px;
  font-family: var(--mono);
}
.terminal-prompt {
  display: flex;
  align-items: center;
  gap: 8px;
}
.terminal-caret {
  color: var(--teal);
  font-size: 14px;
}
.terminal-input {
  flex: 1;
  background: none;
  border: none;
  font-family: var(--mono);
  font-size: 14px;
  color: var(--text);
  outline: none;
}
.terminal-input::placeholder { color: var(--text-dim); }
.terminal-hint {
  margin-top: 12px;
  font-size: 11px;
  color: var(--text-dim);
}
.terminal-examples {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  margin-top: 8px;
}
.terminal-ex {
  font-size: 11px;
  color: var(--teal-dim);
  cursor: pointer;
  padding: 3px 8px;
  border: 1px solid var(--border);
  border-radius: 4px;
  transition: all 0.2s;
}
.terminal-ex:hover { border-color: var(--teal); color: var(--teal); }

@media (max-width: 480px) {
  .dashboard { padding: 12px 12px 60px; }
  .source-compact-grid { grid-template-columns: repeat(2, 1fr); }
  .metric-value { font-size: 44px; }
  .cutoff-value { font-size: 28px; }
  .tl-compact { grid-template-columns: repeat(3, 1fr); }
}
</style>
</head>
<body>
<div class="dashboard">
  <div class="top-bar">
    <div class="top-bar-brand">
      <div class="top-bar-dot"></div>
      <span>Pulse</span>
    </div>
    <div class="top-bar-title">caffeine // half-life</div>
  </div>

  <!-- Input panel -->
  <div class="input-grid">
    <div class="panel">
      <div class="panel-header">
        <span class="panel-title">Source</span>
        <span class="panel-badge" id="selectedBadge">95 mg</span>
      </div>
      <div class="panel-body">
        <div class="source-compact-grid" id="sourceGrid"></div>
        <div class="custom-row" id="customRow">
          <input type="number" id="customMg" placeholder="mg" min="1" max="1000">
          <span>mg</span>
        </div>
      </div>
    </div>
    <div class="panel">
      <div class="panel-header">
        <span class="panel-title">Timing</span>
      </div>
      <div class="panel-body">
        <div class="time-panel-row">
          <div class="time-panel-field">
            <label>Consumed</label>
            <input type="time" id="consumedTime" value="08:00">
          </div>
          <div class="time-panel-field">
            <label>Bedtime</label>
            <input type="time" id="bedtime" value="22:30">
          </div>
        </div>
        <button class="run-btn" id="calcBtn">Run Analysis</button>
      </div>
    </div>
  </div>

  <!-- Results -->
  <div class="results-area" id="results">
    <div class="dash-grid">
      <!-- Big metric -->
      <div class="panel">
        <div class="panel-header">
          <span class="panel-title">At Bedtime</span>
          <span class="panel-badge" id="statusBadge">--</span>
        </div>
        <div class="panel-body metric-panel">
          <div class="metric-value" id="bigNum">--</div>
          <div class="metric-unit">mg remaining</div>
        </div>
      </div>
      <!-- Cutoff -->
      <div class="panel">
        <div class="panel-header">
          <span class="panel-title">Safe Cutoff</span>
        </div>
        <div class="panel-body cutoff-panel">
          <div class="cutoff-value" id="cutoffTime">--</div>
          <div class="cutoff-desc">Last safe intake</div>
        </div>
      </div>
    </div>

    <!-- Decay curve -->
    <div class="panel" style="margin-bottom:16px">
      <div class="panel-header">
        <span class="panel-title">Decay Curve</span>
      </div>
      <div class="panel-body curve-panel">
        <canvas class="curve-canvas" id="curveCanvas"></canvas>
      </div>
    </div>

    <!-- Color bar -->
    <div class="panel" style="margin-bottom:16px">
      <div class="panel-header">
        <span class="panel-title">Sleep Impact Timeline</span>
      </div>
      <div class="panel-body colorbar-panel">
        <div class="colorbar-track" id="colorbar"></div>
        <div class="colorbar-labels" id="colorbarLabels"></div>
      </div>
    </div>

    <!-- Hourly -->
    <div class="panel">
      <div class="panel-header">
        <span class="panel-title">Hourly Breakdown</span>
      </div>
      <div class="panel-body">
        <div class="tl-compact" id="timeline"></div>
      </div>
    </div>
  </div>

  <!-- Terminal / Ask Pulse -->
  <div class="panel terminal-section">
    <div class="panel-header">
      <span class="panel-title">Ask Pulse</span>
      <span class="panel-badge">AI</span>
    </div>
    <div class="terminal-body">
      <div class="terminal-prompt">
        <span class="terminal-caret">&gt;</span>
        <input class="terminal-input" type="text" placeholder="ask anything about health, caffeine, sleep...">
      </div>
      <div class="terminal-hint">Try:</div>
      <div class="terminal-examples">
        <span class="terminal-ex">caffeine tolerance</span>
        <span class="terminal-ex">sleep latency</span>
        <span class="terminal-ex">pre-workout timing</span>
        <span class="terminal-ex">caffeine + anxiety</span>
      </div>
    </div>
  </div>
</div>

<script>
var HALF_LIFE = 5;
var state = { mg: 95 };

var sources = [
  { name: 'Coffee', mg: 95 },
  { name: 'Tall coffee', mg: 142 },
  { name: 'Espresso', mg: 63 },
  { name: 'Cold brew', mg: 200 },
  { name: 'Energy drink', mg: 160 },
  { name: 'Bang / Reign', mg: 300 },
  { name: 'Black tea', mg: 47 },
  { name: 'Green tea', mg: 28 },
  { name: 'Caffeine pill', mg: 200 },
  { name: 'Cola', mg: 34 },
  { name: 'Pre-workout', mg: 200 },
  { name: 'Custom', mg: null }
];

function parseTime(val) {
  if (!val) return null;
  var parts = val.split(':');
  return parseInt(parts[0]) * 60 + parseInt(parts[1]);
}

function formatTime(minutes) {
  var m = ((minutes % 1440) + 1440) % 1440;
  var h = Math.floor(m / 60);
  var min = m % 60;
  var ampm = h >= 12 ? 'PM' : 'AM';
  var h12 = h % 12 || 12;
  return h12 + ':' + String(min).padStart(2, '0') + ' ' + ampm;
}

function remaining(initialMg, hours) {
  return initialMg * Math.pow(0.5, hours / HALF_LIFE);
}

// Build source grid
var grid = document.getElementById('sourceGrid');
sources.forEach(function(s, i) {
  var btn = document.createElement('button');
  btn.className = 'src-btn' + (i === 0 ? ' active' : '');
  btn.innerHTML = '<span>' + s.name + '</span><span class="src-mg">' + (s.mg !== null ? s.mg : '?') + '</span>';
  btn.addEventListener('click', function() {
    document.querySelectorAll('.src-btn').forEach(function(b) { b.classList.remove('active'); });
    btn.classList.add('active');
    if (s.mg !== null) {
      state.mg = s.mg;
      document.getElementById('customRow').classList.remove('show');
      document.getElementById('selectedBadge').textContent = s.mg + ' mg';
    } else {
      document.getElementById('customRow').classList.add('show');
      var cv = parseInt(document.getElementById('customMg').value);
      state.mg = cv > 0 ? cv : 100;
      document.getElementById('selectedBadge').textContent = state.mg + ' mg';
    }
  });
  grid.appendChild(btn);
});

document.getElementById('customMg').addEventListener('input', function() {
  var v = parseInt(this.value);
  if (v > 0) {
    state.mg = v;
    document.getElementById('selectedBadge').textContent = v + ' mg';
  }
});

// Draw decay curve
function drawCurve(ct, hours, mg) {
  var canvas = document.getElementById('curveCanvas');
  var dpr = window.devicePixelRatio || 1;
  var rect = canvas.getBoundingClientRect();
  canvas.width = rect.width * dpr;
  canvas.height = rect.height * dpr;
  var ctx = canvas.getContext('2d');
  ctx.scale(dpr, dpr);
  var W = rect.width, H = rect.height;
  var padL = 40, padR = 16, padT = 16, padB = 28;
  var gW = W - padL - padR, gH = H - padT - padB;

  // Grid lines
  ctx.strokeStyle = 'rgba(255,255,255,0.05)';
  ctx.lineWidth = 1;
  for (var i = 0; i <= 4; i++) {
    var y = padT + (gH / 4) * i;
    ctx.beginPath(); ctx.moveTo(padL, y); ctx.lineTo(padL + gW, y); ctx.stroke();
  }

  // Threshold lines
  [25, 50].forEach(function(th) {
    var y = padT + gH - (th / mg) * gH;
    if (y > padT && y < padT + gH) {
      ctx.strokeStyle = th === 25 ? 'rgba(34,197,94,0.25)' : 'rgba(234,179,8,0.25)';
      ctx.setLineDash([4, 4]);
      ctx.beginPath(); ctx.moveTo(padL, y); ctx.lineTo(padL + gW, y); ctx.stroke();
      ctx.setLineDash([]);
      ctx.fillStyle = th === 25 ? 'rgba(34,197,94,0.5)' : 'rgba(234,179,8,0.5)';
      ctx.font = '10px DM Mono, monospace';
      ctx.fillText(th + 'mg', padL + 4, y - 4);
    }
  });

  // Curve
  ctx.strokeStyle = '#14b8a6';
  ctx.lineWidth = 2.5;
  ctx.beginPath();
  var steps = 100;
  for (var s = 0; s <= steps; s++) {
    var t = (s / steps) * hours;
    var val = remaining(mg, t);
    var x = padL + (s / steps) * gW;
    var y = padT + gH - (val / mg) * gH;
    if (s === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
  }
  ctx.stroke();

  // Fill under curve
  ctx.lineTo(padL + gW, padT + gH);
  ctx.lineTo(padL, padT + gH);
  ctx.closePath();
  var grad = ctx.createLinearGradient(0, padT, 0, padT + gH);
  grad.addColorStop(0, 'rgba(20,184,166,0.15)');
  grad.addColorStop(1, 'rgba(20,184,166,0)');
  ctx.fillStyle = grad;
  ctx.fill();

  // X labels
  ctx.fillStyle = '#64748b';
  ctx.font = '10px DM Mono, monospace';
  ctx.textAlign = 'center';
  var labelCount = Math.min(Math.ceil(hours), 8);
  var step = Math.ceil(hours / labelCount);
  for (var h = 0; h <= hours; h += step) {
    var x = padL + (h / hours) * gW;
    ctx.fillText(formatTime(ct + h * 60), x, H - 4);
  }

  // Y labels
  ctx.textAlign = 'right';
  for (var i = 0; i <= 4; i++) {
    var val = Math.round((i / 4) * mg);
    var y = padT + gH - (i / 4) * gH;
    ctx.fillText(val, padL - 6, y + 4);
  }
}

document.getElementById('calcBtn').addEventListener('click', function() {
  var ct = parseTime(document.getElementById('consumedTime').value);
  var bt = parseTime(document.getElementById('bedtime').value);
  if (ct === null || bt === null) return;

  var diff = bt - ct;
  if (diff <= 0) diff += 1440;
  var hours = diff / 60;

  var mgAtBed = remaining(state.mg, hours);
  var mgRound = Math.round(mgAtBed);

  // Big metric
  var bigEl = document.getElementById('bigNum');
  bigEl.textContent = mgRound;
  bigEl.className = 'metric-value ' + (mgRound < 25 ? 'good' : mgRound <= 50 ? 'caution' : 'bad');

  // Status badge
  var sb = document.getElementById('statusBadge');
  if (mgRound < 25) { sb.textContent = 'CLEAR'; sb.style.background = 'rgba(34,197,94,0.12)'; sb.style.color = '#22c55e'; }
  else if (mgRound <= 50) { sb.textContent = 'CAUTION'; sb.style.background = 'rgba(234,179,8,0.12)'; sb.style.color = '#eab308'; }
  else { sb.textContent = 'HIGH'; sb.style.background = 'rgba(239,68,68,0.12)'; sb.style.color = '#ef4444'; }

  // Cutoff
  var cutoffHours = HALF_LIFE * Math.log2(state.mg / 25);
  var cutoffMin = bt - Math.round(cutoffHours * 60);
  document.getElementById('cutoffTime').textContent = formatTime(cutoffMin);

  // Decay curve
  drawCurve(ct, hours, state.mg);

  // Color bar — continuous gradient
  var cb = document.getElementById('colorbar');
  var segments = 100;
  var gradStops = [];
  for (var s = 0; s <= segments; s++) {
    var t = (s / segments) * hours;
    var val = remaining(state.mg, t);
    var pct = (s / segments) * 100;
    var color;
    if (val < 25) color = '#22c55e';
    else if (val < 50) {
      var r = (val - 25) / 25;
      color = 'rgb(' + Math.round(34 + r * 200) + ',' + Math.round(197 - r * 18) + ',' + Math.round(94 - r * 86) + ')';
    } else {
      var r = Math.min((val - 50) / 50, 1);
      color = 'rgb(' + Math.round(234 + r * 5) + ',' + Math.round(179 - r * 111) + ',' + Math.round(8 + r * 60) + ')';
    }
    gradStops.push(color + ' ' + pct + '%');
  }
  cb.style.background = 'linear-gradient(90deg, ' + gradStops.join(', ') + ')';

  // Marker on color bar for bedtime
  cb.innerHTML = '<div class="colorbar-marker" style="left:100%"><div class="colorbar-now">bed ' + mgRound + 'mg</div></div>';

  // Color bar labels
  var cbl = document.getElementById('colorbarLabels');
  cbl.innerHTML = '';
  var lCount = Math.min(6, Math.ceil(hours));
  var lStep = Math.ceil(hours / lCount);
  for (var h = 0; h <= hours; h += lStep) {
    var span = document.createElement('span');
    span.textContent = formatTime(ct + h * 60);
    cbl.appendChild(span);
  }

  // Timeline
  var tl = document.getElementById('timeline');
  tl.innerHTML = '';
  for (var h = 0; h <= Math.ceil(hours); h++) {
    var mg = remaining(state.mg, h);
    var mgR = Math.round(mg);
    var cls = mgR < 25 ? 'good' : mgR <= 50 ? 'caution' : 'bad';
    var timeM = ct + h * 60;
    var cell = document.createElement('div');
    cell.className = 'tl-cell ' + cls;
    cell.innerHTML = '<div class="tl-cell-time">' + formatTime(timeM) + '</div><div class="tl-cell-mg">' + mgR + '</div>';
    tl.appendChild(cell);
  }

  document.getElementById('results').classList.add('show');
  document.getElementById('results').scrollIntoView({ behavior: 'smooth', block: 'start' });
});

// Resize canvas on window resize
window.addEventListener('resize', function() {
  if (document.getElementById('results').classList.contains('show')) {
    var ct = parseTime(document.getElementById('consumedTime').value);
    var bt = parseTime(document.getElementById('bedtime').value);
    if (ct === null || bt === null) return;
    var diff = bt - ct;
    if (diff <= 0) diff += 1440;
    drawCurve(ct, diff / 60, state.mg);
  }
});
</script>
</body>
</html>
