<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>Pinned Post A — Semantic</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--accent:#0e7a7e;--accent-glow:rgba(14,122,126,0.4);--bg:#0a0e18;--surface:#0f1320;--text:#e8eaed;--dim:rgba(255,255,255,0.35);--muted:rgba(255,255,255,0.12)}
body{background:#000;font-family:'DM Sans',sans-serif;display:flex;align-items:center;justify-content:center;min-height:100vh;padding:20px}

.stage{position:relative;width:100%;max-width:900px;aspect-ratio:16/9;background:var(--bg);border-radius:20px;overflow:hidden;cursor:pointer}

/* Step dots */
.dots{position:absolute;top:20px;left:50%;transform:translateX(-50%);display:flex;gap:6px;z-index:20}
.dot{width:8px;height:8px;border-radius:50%;background:var(--muted);transition:all 0.5s}
.dot.on{background:var(--accent);width:24px;border-radius:4px}

/* Canvas area */
.canvas{position:absolute;inset:50px 40px 120px;z-index:2}

/* Bottom label */
.label{position:absolute;bottom:20px;left:0;right:0;text-align:center;z-index:20;padding:0 40px}
.label-step{font-size:0.62rem;font-weight:600;text-transform:uppercase;letter-spacing:0.14em;color:var(--accent);margin-bottom:6px;opacity:0;transition:opacity 0.5s}
.label-title{font-family:'DM Serif Display',serif;font-size:1.3rem;color:#fff;margin-bottom:5px;opacity:0;transition:opacity 0.5s 0.1s}
.label-desc{font-size:0.75rem;color:var(--dim);max-width:420px;margin:0 auto;line-height:1.5;opacity:0;transition:opacity 0.5s 0.2s}
.label-step.vis,.label-title.vis,.label-desc.vis{opacity:1}

/* Noise fragments */
.frag{position:absolute;font-size:0.55rem;color:var(--muted);white-space:nowrap;pointer-events:none;transition:all 0.8s ease}
.frag.signal{color:var(--accent);opacity:1!important;text-shadow:0 0 8px var(--accent-glow);font-weight:600;font-size:0.62rem}
.frag.fade{opacity:0!important}
.frag.converge{transition:all 1.2s cubic-bezier(0.4,0,0.2,1)!important}

/* Scan line */
.scanline{position:absolute;top:0;left:-2px;width:2px;height:100%;background:linear-gradient(180deg,transparent,var(--accent),transparent);opacity:0;z-index:5}
.scanline.go{opacity:0.6;animation:sweep 2s ease-in-out forwards}
@keyframes sweep{0%{left:-2px}100%{left:100%}}

/* Center node */
.node{position:absolute;left:50%;top:50%;transform:translate(-50%,-50%) scale(0);width:44px;height:44px;border-radius:50%;background:var(--accent);display:flex;align-items:center;justify-content:center;z-index:6;opacity:0;transition:all 0.6s cubic-bezier(0.34,1.56,0.64,1)}
.node.vis{transform:translate(-50%,-50%) scale(1);opacity:1}
.node.pulse{animation:npulse 2s ease-in-out infinite}
@keyframes npulse{0%,100%{box-shadow:0 0 0 0 var(--accent-glow)}50%{box-shadow:0 0 0 18px rgba(14,122,126,0)}}
.node svg{width:20px;height:20px;color:#fff}

/* Ring burst */
.ring{position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);width:10px;height:10px;border-radius:50%;border:1.5px solid var(--accent);opacity:0;z-index:5;pointer-events:none}
.ring.burst{animation:rburst 0.8s ease-out forwards}
@keyframes rburst{0%{width:10px;height:10px;opacity:0.7}100%{width:180px;height:180px;opacity:0}}

/* Result card */
.result{position:absolute;left:50%;top:50%;transform:translate(-50%,-50%) scale(0.6);width:240px;background:#fff;border-radius:16px;padding:24px 20px 18px;text-align:center;opacity:0;z-index:10;box-shadow:0 8px 50px rgba(0,0,0,0.5);transition:all 0.7s cubic-bezier(0.34,1.56,0.64,1)}
.result.vis{opacity:1;transform:translate(-50%,-50%) scale(1)}
.result-label{font-size:0.58rem;font-weight:600;text-transform:uppercase;letter-spacing:0.1em;color:var(--accent);margin-bottom:4px}
.result-heartbeat{display:block;margin:0 auto 8px;opacity:0.3}
.result-num{font-family:'DM Serif Display',serif;font-size:2.8rem;color:var(--accent);line-height:1;margin-bottom:2px;font-variant-numeric:tabular-nums}
.result-unit{font-size:0.65rem;font-weight:600;color:#666;text-transform:uppercase;letter-spacing:0.06em;margin-bottom:10px}
.result-cite{font-size:0.55rem;color:#aaa;border-top:1px solid #eee;padding-top:8px}
.result-bar{height:4px;background:#eee;border-radius:2px;margin:10px 20px 0;overflow:hidden}
.result-bar-fill{height:100%;background:var(--accent);border-radius:2px;width:0;transition:width 1s cubic-bezier(0.25,1,0.5,1)}

/* Differentiator text */
.diff-line{position:absolute;left:50%;transform:translateX(-50%);font-size:1.1rem;font-weight:600;color:#fff;white-space:nowrap;opacity:0;transition:all 0.5s cubic-bezier(0.25,1,0.5,1);z-index:10}
.diff-line.vis{opacity:1}
.diff-line.teal{color:var(--accent)}

/* Scale tiles */
.tiles{position:absolute;left:50%;top:40%;transform:translate(-50%,-50%);display:flex;flex-wrap:wrap;gap:6px;justify-content:center;max-width:500px;z-index:10}
.tile{padding:6px 14px;background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.06);border-radius:8px;font-size:0.62rem;color:var(--dim);opacity:0;transform:scale(0.7);transition:all 0.3s cubic-bezier(0.25,1,0.5,1)}
.tile.vis{opacity:1;transform:scale(1)}
.tile:hover{background:rgba(14,122,126,0.1);border-color:rgba(14,122,126,0.3);color:#fff}

.brand-line{position:absolute;left:50%;bottom:45%;transform:translateX(-50%);font-size:1rem;font-weight:600;color:#fff;white-space:nowrap;opacity:0;transition:opacity 0.6s;z-index:10}
.brand-line.vis{opacity:1}
.brand-sub{position:absolute;left:50%;bottom:35%;transform:translateX(-50%);font-size:0.72rem;color:var(--accent);opacity:0;transition:opacity 0.6s 0.2s;z-index:10;white-space:nowrap}
.brand-sub.vis{opacity:1}

/* Replay */
.replay{position:absolute;bottom:16px;right:20px;padding:6px 16px;background:transparent;border:1px solid var(--muted);border-radius:8px;color:var(--dim);font-size:0.7rem;font-weight:500;font-family:'DM Sans',sans-serif;cursor:pointer;z-index:20;display:none;transition:all 0.2s}
.replay:hover{border-color:var(--accent);color:var(--accent)}

@media(max-width:700px){
  .stage{aspect-ratio:auto;min-height:500px}
  .canvas{inset:45px 20px 100px}
  .label-title{font-size:1.1rem}
  .diff-line{font-size:0.85rem}
  .frag{font-size:0.45rem}
}
</style>
</head>
<body>

<div class="stage" id="stage">
  <div class="dots" id="dots">
    <div class="dot on"></div><div class="dot"></div><div class="dot"></div><div class="dot"></div>
  </div>
  <div class="canvas" id="canvas">
    <div class="scanline" id="scanline"></div>
    <div class="node" id="node"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M22 12h-4l-3 9L9 3l-3 9H2"/></svg></div>
    <div class="ring" id="ring"></div>
    <div class="result" id="result">
      <div class="result-label">YOUR DAILY CALORIES</div>
      <svg class="result-heartbeat" width="60" height="10" viewBox="0 0 60 10" fill="none"><path d="M0 5L18 5L24 2L28 8L33 3L37 5L60 5" stroke="#0e7a7e" stroke-width="1.2" stroke-linecap="round"/></svg>
      <div class="result-num" id="rnum">0</div>
      <div class="result-unit">calories / day</div>
      <div class="result-bar"><div class="result-bar-fill" id="rbar"></div></div>
      <div class="result-cite">Mifflin-St Jeor et al., 1990 · PubMed</div>
    </div>
  </div>
  <div class="label">
    <div class="label-step" id="lstep">The problem</div>
    <div class="label-title" id="ltitle">You Googled a health question</div>
    <div class="label-desc" id="ldesc">You got a number. No source. No formula. No idea if it's right.</div>
  </div>
  <button class="replay" id="replay">↻ Replay</button>
</div>

<script>
(function(){
  var canvas=document.getElementById('canvas'),node=document.getElementById('node'),
      scanline=document.getElementById('scanline'),ring=document.getElementById('ring'),
      result=document.getElementById('result'),replay=document.getElementById('replay'),
      dots=document.querySelectorAll('.dot'),frags=[];

  var noiseData=[
    'drink 8 glasses of water','BMR = 10×weight + 6.25×height','lose 10 lbs in a week',
    'keto is the best diet','calories in vs calories out','TDEE = BMR × activity',
    'eat clean gain lean','Mifflin-St Jeor (1990)','2000 cal/day recommended',
    'intermittent fasting works','carbs are bad for you','protein: 0.8g per kg',
    'study n=4,489 adults','p < 0.001','WHO guidelines 2024',
    'one weird trick','doctors hate this','metabolism booster',
    'Harris-Benedict equation','RMR vs BMR difference','PubMed PMID:28630601',
    'moderate activity: 1.55×','thermic effect of food','NEAT variance ±300cal',
    'just eat less move more','cortisol and weight gain','n=392 meta-analysis',
    'supplements not regulated','clinical trial phase III','body composition matters',
    'AMA dietary guidelines','fiber: 25-30g/day','NIH reference ranges',
    'detox your body naturally','superfood antioxidants','evidence level: A',
    'sedentary: 1.2× multiplier','VO2max correlation','visceral fat index'
  ];
  var signals=[1,5,7,12,13,14,18,20,22,23,27,30,32,35,37];

  function setStep(i,step,title,desc){
    document.getElementById('lstep').textContent=step;
    document.getElementById('lstep').className='label-step vis';
    document.getElementById('ltitle').textContent=title;
    document.getElementById('ltitle').className='label-title vis';
    document.getElementById('ldesc').textContent=desc;
    document.getElementById('ldesc').className='label-desc vis';
    dots.forEach(function(d,j){d.className=j===i?'dot on':'dot'});
  }

  function fadeLabel(){
    document.getElementById('lstep').className='label-step';
    document.getElementById('ltitle').className='label-title';
    document.getElementById('ldesc').className='label-desc';
  }

  function clearCanvas(){
    frags.forEach(function(f){f.remove()});frags=[];
    // Clear diff lines, tiles, brand
    canvas.querySelectorAll('.diff-line,.tiles,.brand-line,.brand-sub').forEach(function(e){e.remove()});
    result.classList.remove('vis');
    node.classList.remove('vis','pulse');
    node.style='';
    scanline.classList.remove('go');
    ring.classList.remove('burst');
    document.getElementById('rbar').style.width='0';
  }

  function run(){
    replay.style.display='none';
    clearCanvas();
    var cw=canvas.offsetWidth,ch=canvas.offsetHeight;

    // === STEP 1 (0-3s): PROBLEM — noise appears ===
    setStep(0,'The problem','You Googled a health question',
      'You got a number. No source. No formula. No idea if it\'s right.');

    noiseData.forEach(function(txt,i){
      var el=document.createElement('div');
      el.className='frag';
      el.textContent=txt;
      el.style.left=(Math.random()*(cw-100))+'px';
      el.style.top=(Math.random()*(ch-14))+'px';
      el.style.opacity='0';
      el.style.transform='rotate('+(Math.random()*14-7)+'deg)';
      canvas.appendChild(el);
      frags.push(el);
      setTimeout(function(){
        el.style.opacity=(0.06+Math.random()*0.1).toString();
      },80+i*50);
    });

    // === STEP 2 (3-6.5s): SCAN — Pulse appears, scans, signal lights ===
    setTimeout(function(){
      setStep(1,'The scan','AI reads everything',
        'Scanning peer-reviewed papers. Finding the validated formula.');
      node.classList.add('vis');
      setTimeout(function(){scanline.classList.add('go')},300);
      setTimeout(function(){
        signals.forEach(function(idx,i){
          if(frags[idx]) setTimeout(function(){
            frags[idx].classList.add('signal');
            frags[idx].style.opacity='1';
            frags[idx].style.transform='rotate(0deg)';
          },i*100);
        });
        frags.forEach(function(el,idx){
          if(signals.indexOf(idx)===-1) setTimeout(function(){el.classList.add('fade')},600+idx*20);
        });
      },600);
    },3000);

    // === STEP 3 (6.5-10s): CONVERGENCE — signal → result ===
    setTimeout(function(){
      setStep(2,'The signal','Finding your answer',
        'Noise falls away. What remains: one validated formula, one clear number.');
      node.classList.add('pulse');
      var cx=cw/2,cy=ch/2;
      signals.forEach(function(idx,i){
        if(frags[idx]){
          frags[idx].classList.add('converge');
          setTimeout(function(){
            var a=(i/signals.length)*Math.PI*2;
            var r=55+Math.random()*15;
            frags[idx].style.left=(cx+Math.cos(a)*r-35)+'px';
            frags[idx].style.top=(cy+Math.sin(a)*r-7)+'px';
            frags[idx].style.fontSize='0.5rem';
          },i*60);
        }
      });
      setTimeout(function(){
        signals.forEach(function(idx){if(frags[idx]){frags[idx].style.transition='opacity 0.5s';frags[idx].style.opacity='0'}});
        ring.classList.add('burst');
        setTimeout(function(){
          node.classList.remove('pulse');
          node.style.transition='all 0.4s ease';
          node.style.opacity='0';
          node.style.transform='translate(-50%,-50%) scale(0.3)';
        },300);
      },1400);
    },6500);

    // === STEP 4 (10-14s): RESULT + DIFFERENTIATOR ===
    setTimeout(function(){
      setStep(3,'Your answer','Every formula cited. Every number verified.',
        '90+ tools. One AI reading the research. Zero guesswork.');
      result.classList.add('vis');
      // Count up
      var target=2340,dur=800,start=performance.now();
      (function tick(now){
        var p=Math.min((now-start)/dur,1);
        var e=1-Math.pow(1-p,3);
        document.getElementById('rnum').textContent=Math.round(target*e).toLocaleString();
        if(p<1)requestAnimationFrame(tick);
      })(performance.now());
      setTimeout(function(){document.getElementById('rbar').style.width='65%'},300);
      setTimeout(function(){replay.style.display=''},2500);
    },9500);
  }

  // Auto-start
  setTimeout(run,600);
  replay.addEventListener('click',run);
  document.getElementById('stage').addEventListener('click',function(e){
    if(e.target!==replay)run();
  });
})();
</script>
</body>
</html>
