<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>Caffeine Half-Life Calculator — The Ambient</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: 'DM Sans', sans-serif;
  color: #1a1a1a;
  min-height: 100vh;
  overflow-x: hidden;
  position: relative;
}

/* Breathing animated background */
.ambient-bg {
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  z-index: -1;
  animation: ambient-breathe 30s ease-in-out infinite;
}

@keyframes ambient-breathe {
  0%   { background: linear-gradient(135deg, #FEFCF9 0%, #f0ede8 50%, #e8f0ef 100%); }
  25%  { background: linear-gradient(135deg, #f0f7f6 0%, #FEFCF9 50%, #f5f0ea 100%); }
  50%  { background: linear-gradient(135deg, #e8f5f3 0%, #f2f0eb 50%, #FEFCF9 100%); }
  75%  { background: linear-gradient(135deg, #FEFCF9 0%, #edf5f3 50%, #f5f0ea 100%); }
  100% { background: linear-gradient(135deg, #FEFCF9 0%, #f0ede8 50%, #e8f0ef 100%); }
}

/* Ambient color shift based on result */
body.result-good .ambient-bg {
  animation-name: ambient-good;
}
body.result-caution .ambient-bg {
  animation-name: ambient-caution;
}
body.result-bad .ambient-bg {
  animation-name: ambient-bad;
}

@keyframes ambient-good {
  0%   { background: linear-gradient(135deg, #f0f9f7 0%, #e8f5f3 50%, #f0faf8 100%); }
  50%  { background: linear-gradient(135deg, #e4f5f0 0%, #f0f9f7 50%, #e8f5f3 100%); }
  100% { background: linear-gradient(135deg, #f0f9f7 0%, #e8f5f3 50%, #f0faf8 100%); }
}

@keyframes ambient-caution {
  0%   { background: linear-gradient(135deg, #fdf8f0 0%, #f8f0e0 50%, #fdf6ee 100%); }
  50%  { background: linear-gradient(135deg, #f8f0e0 0%, #fdf8f0 50%, #f5ece0 100%); }
  100% { background: linear-gradient(135deg, #fdf8f0 0%, #f8f0e0 50%, #fdf6ee 100%); }
}

@keyframes ambient-bad {
  0%   { background: linear-gradient(135deg, #fdf0f0 0%, #f8e8e8 50%, #fdf0ee 100%); }
  50%  { background: linear-gradient(135deg, #f8e8e8 0%, #fdf0f0 50%, #f5e4e2 100%); }
  100% { background: linear-gradient(135deg, #fdf0f0 0%, #f8e8e8 50%, #fdf0ee 100%); }
}

.container {
  max-width: 760px;
  margin: 0 auto;
  padding: 56px 24px 0;
}

/* Header */
.page-header {
  text-align: center;
  margin-bottom: 56px;
  animation: float-in 1s ease-out;
}

@keyframes float-in {
  from { opacity: 0; transform: translateY(20px); }
  to { opacity: 1; transform: translateY(0); }
}

.page-title {
  font-family: 'DM Serif Display', serif;
  font-size: 2.4rem;
  color: #0e7a7e;
  margin-bottom: 8px;
  line-height: 1.2;
}

.page-subtitle {
  color: #999;
  font-size: 15px;
}

/* Section labels */
.section-label {
  font-size: 13px;
  font-weight: 500;
  color: #aaa;
  margin-bottom: 20px;
}

/* Source cards with float animation */
.source-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
  gap: 12px;
  margin-bottom: 40px;
}

.source-card {
  background: rgba(255,255,255,0.7);
  backdrop-filter: blur(10px);
  -webkit-backdrop-filter: blur(10px);
  border: 2px solid rgba(14,122,126,0.08);
  border-radius: 18px;
  padding: 18px 12px;
  text-align: center;
  cursor: pointer;
  transition: all 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94);
  animation: card-float 6s ease-in-out infinite;
}

/* Stagger the float animation */
.source-card:nth-child(1)  { animation-delay: 0s; }
.source-card:nth-child(2)  { animation-delay: 0.5s; }
.source-card:nth-child(3)  { animation-delay: 1s; }
.source-card:nth-child(4)  { animation-delay: 1.5s; }
.source-card:nth-child(5)  { animation-delay: 2s; }
.source-card:nth-child(6)  { animation-delay: 0.3s; }
.source-card:nth-child(7)  { animation-delay: 0.8s; }
.source-card:nth-child(8)  { animation-delay: 1.3s; }
.source-card:nth-child(9)  { animation-delay: 1.8s; }
.source-card:nth-child(10) { animation-delay: 0.6s; }
.source-card:nth-child(11) { animation-delay: 1.1s; }
.source-card:nth-child(12) { animation-delay: 1.6s; }

@keyframes card-float {
  0%, 100% { transform: translateY(0); }
  50% { transform: translateY(-4px); }
}

.source-card:hover {
  transform: translateY(-6px) scale(1.02);
  box-shadow: 0 12px 32px rgba(14,122,126,0.1);
  border-color: rgba(14,122,126,0.2);
}

.source-card.active {
  border-color: #0e7a7e;
  background: rgba(14,122,126,0.08);
  box-shadow: 0 8px 24px rgba(14,122,126,0.12);
  animation: none;
  transform: translateY(-2px);
}

/* Ripple effect on click */
.source-card .ripple {
  position: absolute;
  border-radius: 50%;
  background: rgba(14,122,126,0.15);
  transform: scale(0);
  animation: ripple-expand 0.6s ease-out forwards;
  pointer-events: none;
}

@keyframes ripple-expand {
  to { transform: scale(4); opacity: 0; }
}

.source-card { position: relative; overflow: hidden; }
.source-card .icon { font-size: 26px; display: block; margin-bottom: 6px; position: relative; z-index: 1; }
.source-card .name { font-weight: 700; font-size: 12px; position: relative; z-index: 1; }
.source-card .mg-val { color: #999; font-size: 11px; margin-top: 3px; position: relative; z-index: 1; }

.custom-mg-wrap { text-align: center; margin-top: -24px; margin-bottom: 32px; }
.custom-mg-wrap.hidden { display: none; }
.custom-mg-input {
  font-family: 'DM Sans', sans-serif;
  font-size: 20px;
  padding: 12px 20px;
  border: 2px solid rgba(14,122,126,0.2);
  border-radius: 14px;
  width: 140px;
  text-align: center;
  outline: none;
  background: rgba(255,255,255,0.7);
  backdrop-filter: blur(10px);
}
.custom-mg-input:focus { border-color: #0e7a7e; }

/* Time inputs */
.time-row {
  display: flex;
  gap: 20px;
  margin-bottom: 40px;
}

.time-group { flex: 1; }
.time-group label {
  display: block;
  font-size: 13px;
  color: #999;
  margin-bottom: 8px;
}

.time-group input[type="time"] {
  width: 100%;
  font-family: 'DM Sans', sans-serif;
  font-size: 20px;
  padding: 14px 18px;
  border: 2px solid rgba(14,122,126,0.12);
  border-radius: 16px;
  background: rgba(255,255,255,0.7);
  backdrop-filter: blur(10px);
  color: #1a1a1a;
  outline: none;
  transition: all 0.4s;
}

.time-group input[type="time"]:focus {
  border-color: #0e7a7e;
  box-shadow: 0 0 0 4px rgba(14,122,126,0.08);
}

/* Results — morphing appearance */
.results-panel {
  background: rgba(255,255,255,0.8);
  backdrop-filter: blur(16px);
  -webkit-backdrop-filter: blur(16px);
  border-radius: 28px;
  padding: 36px 32px;
  margin-bottom: 28px;
  border: 1px solid rgba(14,122,126,0.08);
  transition: all 0.6s ease;
  animation: morph-in 0.8s ease-out;
}

@keyframes morph-in {
  from { opacity: 0; transform: scale(0.96); border-radius: 40px; }
  to { opacity: 1; transform: scale(1); border-radius: 28px; }
}

.result-row {
  display: flex;
  align-items: baseline;
  gap: 12px;
  margin-bottom: 8px;
}

.result-number {
  font-family: 'DM Serif Display', serif;
  font-size: clamp(4rem, 10vw, 5.5rem);
  line-height: 1;
  transition: color 0.6s ease;
}

.result-suffix {
  font-size: 18px;
  color: #999;
}

.result-verdict {
  display: inline-block;
  padding: 8px 20px;
  border-radius: 100px;
  font-size: 14px;
  font-weight: 500;
  margin-bottom: 28px;
  transition: all 0.4s;
}

.v-good { background: rgba(14,122,126,0.08); color: #0e7a7e; }
.v-caution { background: rgba(200,150,50,0.08); color: #b8860b; }
.v-bad { background: rgba(200,60,60,0.08); color: #c83c3c; }

/* Animated spectrum */
.spectrum-wrap { margin-top: 8px; }
.spectrum-labels {
  display: flex;
  justify-content: space-between;
  font-size: 11px;
  color: #bbb;
  margin-bottom: 8px;
}

.spectrum-track {
  height: 8px;
  border-radius: 4px;
  background: #e8e4de;
  position: relative;
  overflow: hidden;
}

.spectrum-fill {
  height: 100%;
  border-radius: 4px;
  transition: width 1.2s cubic-bezier(0.25, 0.46, 0.45, 0.94), background 0.6s;
  width: 0%;
}

.spectrum-marker-ambient {
  width: 16px;
  height: 16px;
  border-radius: 50%;
  background: #fff;
  border: 3px solid #0e7a7e;
  position: absolute;
  top: 50%;
  transform: translate(-50%, -50%);
  transition: left 1s cubic-bezier(0.25, 0.46, 0.45, 0.94), border-color 0.6s;
  box-shadow: 0 2px 8px rgba(0,0,0,0.1);
}

/* Timeline with cascade */
.timeline-section {
  background: rgba(255,255,255,0.8);
  backdrop-filter: blur(16px);
  border-radius: 24px;
  padding: 28px 24px;
  margin-bottom: 28px;
  border: 1px solid rgba(14,122,126,0.06);
}

.timeline-title {
  font-family: 'DM Serif Display', serif;
  font-size: 1.3rem;
  color: #0e7a7e;
  margin-bottom: 20px;
}

.tl-row {
  display: flex;
  align-items: center;
  padding: 10px 0;
  border-bottom: 1px solid rgba(0,0,0,0.04);
  opacity: 0;
  transform: translateX(-20px);
  transition: all 0.5s cubic-bezier(0.25, 0.46, 0.45, 0.94);
}

.tl-row.cascaded {
  opacity: 1;
  transform: translateX(0);
}

.tl-time { width: 90px; font-size: 13px; color: #999; flex-shrink: 0; }
.tl-bar-wrap {
  flex: 1;
  height: 6px;
  background: rgba(0,0,0,0.04);
  border-radius: 3px;
  margin: 0 14px;
  overflow: hidden;
}
.tl-bar {
  height: 100%;
  border-radius: 3px;
  transition: width 0.8s cubic-bezier(0.25, 0.46, 0.45, 0.94);
  width: 0%;
}
.tl-mg { width: 60px; text-align: right; font-weight: 700; font-size: 13px; }

/* Cutoff */
.cutoff-section {
  background: rgba(255,255,255,0.8);
  backdrop-filter: blur(16px);
  border-radius: 24px;
  padding: 28px;
  text-align: center;
  margin-bottom: 40px;
  border: 1px solid rgba(14,122,126,0.06);
}

.cutoff-label { font-size: 14px; color: #999; margin-bottom: 8px; }
.cutoff-value {
  font-family: 'DM Serif Display', serif;
  font-size: 2.5rem;
  color: #0e7a7e;
}

/* ASK PULSE — dark ambient */
.pulse-section {
  background: #0a0f1a;
  margin: 0 -24px;
  padding: 80px 24px;
  text-align: center;
  position: relative;
  overflow: hidden;
}

/* Floating particles */
.particle {
  position: absolute;
  width: 3px;
  height: 3px;
  background: rgba(46,232,176,0.3);
  border-radius: 50%;
  animation: float-particle linear infinite;
}

@keyframes float-particle {
  0% { transform: translateY(100%) translateX(0); opacity: 0; }
  10% { opacity: 1; }
  90% { opacity: 1; }
  100% { transform: translateY(-100vh) translateX(40px); opacity: 0; }
}

.pulse-dot {
  width: 16px;
  height: 16px;
  background: #2ee8b0;
  border-radius: 50%;
  display: inline-block;
  margin-bottom: 28px;
  animation: ambient-pulse 3s ease-in-out infinite;
  position: relative;
  z-index: 1;
}

@keyframes ambient-pulse {
  0%, 100% { box-shadow: 0 0 0 0 rgba(46,232,176,0.3), 0 0 20px rgba(46,232,176,0.1); }
  50% { box-shadow: 0 0 0 20px rgba(46,232,176,0), 0 0 40px rgba(46,232,176,0.05); }
}

.pulse-title {
  font-family: 'DM Serif Display', serif;
  font-size: 2rem;
  color: #f0f0f0;
  margin-bottom: 12px;
  position: relative;
  z-index: 1;
}

.pulse-sub {
  color: #666;
  font-size: 15px;
  margin-bottom: 28px;
  max-width: 400px;
  margin-left: auto;
  margin-right: auto;
  line-height: 1.5;
  position: relative;
  z-index: 1;
}

.pulse-input-wrap {
  max-width: 480px;
  margin: 0 auto;
  position: relative;
  z-index: 1;
}

.pulse-input {
  width: 100%;
  padding: 16px 56px 16px 24px;
  border: 1px solid rgba(46,232,176,0.15);
  border-radius: 100px;
  background: rgba(255,255,255,0.04);
  color: #f0f0f0;
  font-family: 'DM Sans', sans-serif;
  font-size: 15px;
  outline: none;
  transition: all 0.4s;
}

.pulse-input::placeholder { color: #444; }
.pulse-input:focus {
  border-color: rgba(46,232,176,0.4);
  box-shadow: 0 0 0 4px rgba(46,232,176,0.05);
}

.pulse-send {
  position: absolute;
  right: 6px;
  top: 50%;
  transform: translateY(-50%);
  width: 40px;
  height: 40px;
  border-radius: 50%;
  background: #2ee8b0;
  border: none;
  color: #0a0f1a;
  font-size: 18px;
  cursor: pointer;
  transition: transform 0.3s;
}

.pulse-send:hover { transform: translateY(-50%) scale(1.05); }

@media (max-width: 600px) {
  .source-grid { grid-template-columns: repeat(3, 1fr); gap: 8px; }
  .source-card { padding: 14px 8px; border-radius: 14px; }
  .time-row { gap: 12px; }
  .container { padding: 40px 16px 0; }
  .results-panel { padding: 28px 20px; }
  .pulse-section { margin: 0 -16px; }
}
</style>
</head>
<body>

<div class="ambient-bg"></div>

<div class="container">
  <!-- Header -->
  <div class="page-header">
    <h1 class="page-title">Caffeine Half-Life Calculator</h1>
    <p class="page-subtitle">Watch your caffeine dissolve, hour by hour.</p>
  </div>

  <!-- Source -->
  <div class="section-label">What did you have?</div>
  <div class="source-grid" id="source-grid"></div>
  <div class="custom-mg-wrap hidden" id="custom-mg-wrap">
    <input type="number" class="custom-mg-input" id="custom-mg" placeholder="mg" min="1" max="1000">
  </div>

  <!-- Times -->
  <div class="section-label">When?</div>
  <div class="time-row">
    <div class="time-group">
      <label>Consumed at</label>
      <input type="time" id="drink-time" value="08:00">
    </div>
    <div class="time-group">
      <label>Bedtime</label>
      <input type="time" id="bed-time" value="22:00">
    </div>
  </div>

  <!-- Results -->
  <div class="results-panel">
    <div class="result-row">
      <div class="result-number" id="big-mg">—</div>
      <div class="result-suffix">mg</div>
    </div>
    <div class="result-verdict v-good" id="verdict">remaining at bedtime</div>

    <div class="spectrum-wrap">
      <div class="spectrum-labels">
        <span>Sleep-friendly</span>
        <span>Caution</span>
        <span>Disruptive</span>
      </div>
      <div class="spectrum-track">
        <div class="spectrum-fill" id="spectrum-fill"></div>
        <div class="spectrum-marker-ambient" id="spectrum-marker" style="left:10%"></div>
      </div>
    </div>
  </div>

  <!-- Timeline -->
  <div class="timeline-section">
    <div class="timeline-title">Hour by hour</div>
    <div id="timeline"></div>
  </div>

  <!-- Cutoff -->
  <div class="cutoff-section">
    <div class="cutoff-label">Last safe cup</div>
    <div class="cutoff-value" id="cutoff-time">—</div>
  </div>
</div>

<!-- Ask Pulse -->
<div class="pulse-section" id="pulse-section">
  <div class="pulse-dot"></div>
  <div class="pulse-title">Ask Pulse anything</div>
  <p class="pulse-sub">Your health questions, answered. Sleep, nutrition, fitness — whatever's on your mind.</p>
  <div class="pulse-input-wrap">
    <input type="text" class="pulse-input" placeholder="e.g. Why do I feel jittery after coffee?">
    <button class="pulse-send" aria-label="Send">&#8593;</button>
  </div>
</div>

<script>
var HALF_LIFE = 5;
var state = { mg: 95, source: 'Coffee' };

var sources = [
  { name: 'Coffee', mg: 95, icon: '\u2615' },
  { name: 'Tall coffee', mg: 142, icon: '\u2615' },
  { name: 'Espresso', mg: 63, icon: '\u2615' },
  { name: 'Cold brew', mg: 200, icon: '\u2615' },
  { name: 'Energy drink', mg: 160, icon: '\u26A1' },
  { name: 'Bang/Reign', mg: 300, icon: '\uD83D\uDCAA' },
  { name: 'Black tea', mg: 47, icon: '\uD83C\uDF75' },
  { name: 'Green tea', mg: 28, icon: '\uD83C\uDF75' },
  { name: 'Caffeine pill', mg: 200, icon: '\uD83D\uDC8A' },
  { name: 'Cola', mg: 34, icon: '\uD83E\uDD64' },
  { name: 'Pre-workout', mg: 200, icon: '\uD83C\uDFCB' },
  { name: 'Custom', mg: 0, icon: '\u2699' }
];

function parseTime(val) {
  if (!val) return null;
  var parts = val.split(':');
  return parseInt(parts[0]) * 60 + parseInt(parts[1]);
}

function formatTime(minutes) {
  var m = ((minutes % 1440) + 1440) % 1440;
  var h = Math.floor(m / 60);
  var min = m % 60;
  var ampm = h >= 12 ? 'PM' : 'AM';
  var h12 = h % 12 || 12;
  return h12 + ':' + String(min).padStart(2, '0') + ' ' + ampm;
}

function remaining(initialMg, hours) {
  return initialMg * Math.pow(0.5, hours / HALF_LIFE);
}

// Create floating particles in pulse section
(function() {
  var pulseEl = document.getElementById('pulse-section');
  for (var i = 0; i < 20; i++) {
    var p = document.createElement('div');
    p.className = 'particle';
    p.style.left = Math.random() * 100 + '%';
    p.style.animationDuration = (8 + Math.random() * 12) + 's';
    p.style.animationDelay = Math.random() * 10 + 's';
    p.style.width = p.style.height = (2 + Math.random() * 3) + 'px';
    pulseEl.appendChild(p);
  }
})();

// Build source grid with ripple effect
var grid = document.getElementById('source-grid');
sources.forEach(function(s, i) {
  var card = document.createElement('div');
  card.className = 'source-card' + (i === 0 ? ' active' : '');
  card.innerHTML = '<span class="icon">' + s.icon + '</span><div class="name">' + s.name + '</div>' + (s.mg > 0 ? '<div class="mg-val">' + s.mg + ' mg</div>' : '<div class="mg-val">your dose</div>');

  card.addEventListener('click', function(e) {
    // Ripple effect
    var rect = card.getBoundingClientRect();
    var ripple = document.createElement('div');
    ripple.className = 'ripple';
    var size = Math.max(rect.width, rect.height);
    ripple.style.width = ripple.style.height = size + 'px';
    ripple.style.left = (e.clientX - rect.left - size / 2) + 'px';
    ripple.style.top = (e.clientY - rect.top - size / 2) + 'px';
    card.appendChild(ripple);
    setTimeout(function() { ripple.remove(); }, 600);

    document.querySelectorAll('.source-card').forEach(function(c) { c.classList.remove('active'); });
    card.classList.add('active');
    if (s.name === 'Custom') {
      document.getElementById('custom-mg-wrap').classList.remove('hidden');
      state.mg = parseInt(document.getElementById('custom-mg').value) || 100;
    } else {
      document.getElementById('custom-mg-wrap').classList.add('hidden');
      state.mg = s.mg;
    }
    state.source = s.name;
    calculate();
  });
  grid.appendChild(card);
});

document.getElementById('custom-mg').addEventListener('input', function() {
  state.mg = parseInt(this.value) || 0;
  calculate();
});
document.getElementById('drink-time').addEventListener('change', calculate);
document.getElementById('bed-time').addEventListener('change', calculate);

function calculate() {
  var drinkMin = parseTime(document.getElementById('drink-time').value);
  var bedMin = parseTime(document.getElementById('bed-time').value);
  if (drinkMin === null || bedMin === null || state.mg <= 0) return;

  var diff = bedMin - drinkMin;
  if (diff <= 0) diff += 1440;
  var hours = diff / 60;
  var mgAtBed = remaining(state.mg, hours);
  var rounded = Math.round(mgAtBed);

  document.getElementById('big-mg').textContent = rounded;

  var verdict = document.getElementById('verdict');
  var bigEl = document.getElementById('big-mg');
  var marker = document.getElementById('spectrum-marker');
  var fill = document.getElementById('spectrum-fill');
  var pct = Math.min((mgAtBed / 100) * 100, 100);
  marker.style.left = pct + '%';
  fill.style.width = pct + '%';

  // Remove old body classes
  document.body.classList.remove('result-good', 'result-caution', 'result-bad');

  if (mgAtBed < 25) {
    verdict.textContent = 'Sleep-friendly levels';
    verdict.className = 'result-verdict v-good';
    bigEl.style.color = '#0e7a7e';
    marker.style.borderColor = '#0e7a7e';
    fill.style.background = 'linear-gradient(to right, #0e7a7e, #2ee8b0)';
    document.body.classList.add('result-good');
  } else if (mgAtBed < 50) {
    verdict.textContent = 'Moderate — may affect sleep';
    verdict.className = 'result-verdict v-caution';
    bigEl.style.color = '#b8860b';
    marker.style.borderColor = '#b8860b';
    fill.style.background = 'linear-gradient(to right, #b8860b, #e8b830)';
    document.body.classList.add('result-caution');
  } else {
    verdict.textContent = 'High — likely sleep disruption';
    verdict.className = 'result-verdict v-bad';
    bigEl.style.color = '#c83c3c';
    marker.style.borderColor = '#c83c3c';
    fill.style.background = 'linear-gradient(to right, #c83c3c, #ff6060)';
    document.body.classList.add('result-bad');
  }

  // Timeline with cascade animation
  var timeline = document.getElementById('timeline');
  timeline.innerHTML = '';
  var maxHours = Math.min(Math.ceil(hours) + 1, 20);
  for (var h = 0; h <= maxHours; h++) {
    var mg = remaining(state.mg, h);
    var barPct = (mg / state.mg) * 100;
    var time = formatTime(drinkMin + h * 60);
    var barColor = mg < 25 ? '#0e7a7e' : mg < 50 ? '#b8860b' : '#c83c3c';

    var row = document.createElement('div');
    row.className = 'tl-row';
    row.innerHTML =
      '<div class="tl-time">' + time + '</div>' +
      '<div class="tl-bar-wrap"><div class="tl-bar" style="background:' + barColor + '" data-width="' + barPct + '"></div></div>' +
      '<div class="tl-mg" style="color:' + barColor + '">' + Math.round(mg) + ' mg</div>';
    timeline.appendChild(row);

    // Cascade in
    (function(r, bar, bPct, delay) {
      setTimeout(function() {
        r.classList.add('cascaded');
        bar.style.width = bPct + '%';
      }, delay);
    })(row, row.querySelector('.tl-bar'), barPct, h * 100 + 50);
  }

  // Cutoff
  var hoursNeeded = HALF_LIFE * Math.log2(state.mg / 25);
  var cutoffMin = bedMin - hoursNeeded * 60;
  document.getElementById('cutoff-time').textContent = formatTime(cutoffMin);
}

calculate();
</script>
</body>
</html>
