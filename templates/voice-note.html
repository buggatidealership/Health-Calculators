<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>Voice Note</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: #050508; color: #e8eaed; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; min-height: 100vh; display: flex; flex-direction: column; align-items: center; padding: 40px 20px; }
h1 { font-size: 1.4rem; font-weight: 600; margin-bottom: 8px; }
.sub { font-size: 0.85rem; color: #666; margin-bottom: 32px; }
.btn { padding: 16px 40px; border: none; border-radius: 100px; font-size: 1rem; font-weight: 600; cursor: pointer; transition: all 0.2s; display: flex; align-items: center; gap: 10px; }
.btn-record { background: #0e7a7e; color: #fff; }
.btn-record:hover { background: #0b6b6e; }
.btn-record.recording { background: #ef4444; animation: pulse 1.5s ease-in-out infinite; }
@keyframes pulse { 0%,100% { box-shadow: 0 0 0 0 rgba(239,68,68,0.4); } 50% { box-shadow: 0 0 0 12px rgba(239,68,68,0); } }
.btn-copy { background: #222; color: #e8eaed; margin-top: 16px; }
.btn-copy:hover { background: #333; }
.btn-copy.copied { background: #22c55e; color: #fff; }
.dot { width: 10px; height: 10px; border-radius: 50%; background: currentColor; }
.output { width: 100%; max-width: 700px; margin-top: 24px; padding: 20px; background: #0c0c12; border: 1px solid #1a1a2e; border-radius: 14px; font-size: 0.95rem; line-height: 1.7; color: #e8eaed; min-height: 200px; white-space: pre-wrap; word-wrap: break-word; }
.live { color: #666; font-style: italic; }
.status { font-size: 0.78rem; color: #444; margin-top: 12px; }
.controls { display: flex; flex-direction: column; align-items: center; }
.tip { font-size: 0.75rem; color: #333; margin-top: 24px; max-width: 500px; text-align: center; line-height: 1.5; }
</style>
</head>
<body>
<h1>Voice Note</h1>
<p class="sub">Speak your brain dump. Copy the text. Paste into terminal.</p>

<div class="controls">
  <button class="btn btn-record" id="recordBtn" onclick="toggleRecord()">
    <span class="dot"></span>
    <span id="btnText">Start Recording</span>
  </button>
  <button class="btn btn-copy" id="copyBtn" onclick="copyText()" style="display:none;">Copy All Text</button>
</div>

<div class="output" id="output" contenteditable="true"></div>
<div class="status" id="status">Click record and start speaking</div>
<p class="tip">Works in Chrome and Edge (desktop). Safari has partial support. Firefox does not support Web Speech API.<br>If recording doesn't work, type directly into the text box above — it's editable.</p>

<script>
var recognition = null;
var isRecording = false;
var fullText = '';
var output = document.getElementById('output');
var status = document.getElementById('status');
var btnText = document.getElementById('btnText');
var recordBtn = document.getElementById('recordBtn');
var copyBtn = document.getElementById('copyBtn');

if ('webkitSpeechRecognition' in window || 'SpeechRecognition' in window) {
  var SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
  recognition = new SpeechRecognition();
  recognition.continuous = true;
  recognition.interimResults = true;
  recognition.lang = 'en-US';

  recognition.onresult = function(event) {
    var interim = '';
    var final = '';
    for (var i = event.resultIndex; i < event.results.length; i++) {
      if (event.results[i].isFinal) {
        final += event.results[i][0].transcript + ' ';
      } else {
        interim += event.results[i][0].transcript;
      }
    }
    if (final) {
      fullText += final;
      copyBtn.style.display = '';
    }
    output.innerHTML = fullText + (interim ? '<span class="live">' + interim + '</span>' : '');
    output.scrollTop = output.scrollHeight;
  };

  recognition.onerror = function(event) {
    var msg = 'Error: ' + event.error;
    if (event.error === 'not-allowed') {
      msg = 'Microphone access denied. Click the lock icon in your address bar → Allow microphone → Refresh.';
    } else if (event.error === 'no-speech') {
      msg = 'No speech detected. Try speaking louder or closer to the mic.';
      return; // don't stop — keep listening
    } else if (event.error === 'network') {
      msg = 'Network error. Speech recognition requires an internet connection (audio is processed by Google).';
    } else if (event.error === 'aborted') {
      return; // normal when stopping
    }
    status.textContent = msg;
    isRecording = false;
    recordBtn.classList.remove('recording');
    btnText.textContent = 'Start Recording';
  };

  recognition.onend = function() {
    if (isRecording) {
      recognition.start(); // auto-restart for continuous recording
    }
  };
} else {
  status.textContent = 'Speech recognition not supported in this browser. Use Chrome or Edge.';
  recordBtn.disabled = true;
}

function toggleRecord() {
  if (!recognition) {
    status.textContent = 'Speech recognition not available. Use Chrome or Edge on desktop.';
    return;
  }
  if (isRecording) {
    isRecording = false;
    recognition.stop();
    recordBtn.classList.remove('recording');
    btnText.textContent = 'Start Recording';
    status.textContent = 'Stopped. ' + fullText.split(/\s+/).filter(Boolean).length + ' words captured.';
  } else {
    isRecording = true;
    recordBtn.classList.add('recording');
    btnText.textContent = 'Stop Recording';
    status.textContent = 'Requesting microphone access...';
    try {
      recognition.start();
      status.textContent = 'Listening... speak now';
    } catch(e) {
      status.textContent = 'Error: ' + e.message + '. Try refreshing the page.';
      isRecording = false;
      recordBtn.classList.remove('recording');
      btnText.textContent = 'Start Recording';
    }
  }
}

function copyText() {
  var text = output.innerText || output.textContent;
  navigator.clipboard.writeText(text.trim()).then(function() {
    copyBtn.textContent = 'Copied!';
    copyBtn.classList.add('copied');
    setTimeout(function() {
      copyBtn.textContent = 'Copy All Text';
      copyBtn.classList.remove('copied');
    }, 2000);
  });
}
</script>
</body>
</html>
