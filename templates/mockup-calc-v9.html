<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>CAFFEINE HALF-LIFE CALCULATOR</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@400;500;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: 'DM Sans', sans-serif;
  background: #000;
  color: #fff;
  min-height: 100vh;
  overflow-x: hidden;
}

/* Grid lines */
.grid-bg {
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  background-image:
    linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px),
    linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px);
  background-size: 60px 60px;
  pointer-events: none;
  z-index: 0;
}

.page { position: relative; z-index: 1; }

/* Massive hero title */
.hero {
  padding: 80px 24px 40px;
  border-bottom: 1px solid rgba(255,255,255,0.08);
}

.hero-title {
  font-family: 'DM Sans', sans-serif;
  font-weight: 700;
  font-size: clamp(3rem, 12vw, 8rem);
  line-height: 0.95;
  letter-spacing: -3px;
  text-transform: uppercase;
}

.hero-title .accent { color: #00FFD1; }

.hero-sub {
  font-size: 14px;
  color: #555;
  text-transform: uppercase;
  letter-spacing: 3px;
  margin-top: 24px;
}

/* Sections with visible borders */
.section {
  border-bottom: 1px solid rgba(255,255,255,0.08);
  padding: 48px 24px;
}

.section-label {
  font-size: 11px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 4px;
  color: #555;
  margin-bottom: 28px;
}

/* Source grid — raw cards */
.source-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
  gap: 0;
}

.source-card {
  border: 1px solid rgba(255,255,255,0.08);
  padding: 20px 12px;
  text-align: center;
  cursor: pointer;
  transition: all 0.2s ease;
  position: relative;
}

.source-card:hover { background: rgba(0,255,209,0.03); }

.source-card.active {
  background: rgba(0,255,209,0.06);
  border-color: #00FFD1;
}

.source-card.active::after {
  content: '';
  position: absolute;
  top: 8px;
  right: 8px;
  width: 8px;
  height: 8px;
  background: #00FFD1;
}

.source-card .icon { font-size: 24px; display: block; margin-bottom: 8px; }
.source-card .name {
  font-size: 11px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 1px;
}
.source-card .mg-val {
  font-family: 'JetBrains Mono', monospace;
  font-size: 12px;
  color: #00FFD1;
  margin-top: 4px;
}

.custom-mg-wrap { padding: 16px 0; }
.custom-mg-wrap.hidden { display: none; }
.custom-mg-input {
  font-family: 'JetBrains Mono', monospace;
  font-size: 24px;
  padding: 8px 0;
  border: none;
  border-bottom: 2px solid #00FFD1;
  background: transparent;
  color: #fff;
  width: 120px;
  outline: none;
  text-align: center;
}

/* Time inputs — underline style */
.time-row {
  display: flex;
  gap: 48px;
  align-items: flex-end;
}

.time-group {}
.time-group label {
  display: block;
  font-size: 11px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 3px;
  color: #555;
  margin-bottom: 12px;
}

.time-group input[type="time"] {
  font-family: 'JetBrains Mono', monospace;
  font-size: 28px;
  padding: 8px 0;
  border: none;
  border-bottom: 2px solid rgba(255,255,255,0.2);
  background: transparent;
  color: #fff;
  outline: none;
  transition: border-color 0.3s;
}

.time-group input[type="time"]:focus { border-bottom-color: #00FFD1; }

/* Results — massive monospace */
.results-section {
  padding: 64px 24px;
  border-bottom: 1px solid rgba(255,255,255,0.08);
}

.result-number {
  font-family: 'JetBrains Mono', monospace;
  font-size: clamp(6rem, 18vw, 14rem);
  font-weight: 700;
  line-height: 1;
  transition: color 0.3s;
  letter-spacing: -4px;
}

.result-label {
  font-size: 14px;
  color: #555;
  text-transform: uppercase;
  letter-spacing: 3px;
  margin-top: 8px;
  margin-bottom: 24px;
}

.verdict-text {
  font-family: 'JetBrains Mono', monospace;
  font-size: 14px;
  padding: 8px 16px;
  border: 1px solid;
  display: inline-block;
  text-transform: uppercase;
  letter-spacing: 2px;
}

/* Full-width spectrum line */
.spectrum-section {
  padding: 40px 0;
  border-bottom: 1px solid rgba(255,255,255,0.08);
}

.spectrum-full {
  height: 3px;
  background: linear-gradient(to right, #00FFD1, #FFD100 50%, #FF3D3D);
  position: relative;
  width: 100%;
}

.spectrum-marker-brutal {
  width: 3px;
  height: 32px;
  background: #fff;
  position: absolute;
  top: 50%;
  transform: translate(-50%, -50%);
  transition: left 0.5s ease;
}

.spectrum-marker-brutal::after {
  content: attr(data-mg);
  position: absolute;
  top: -24px;
  left: 50%;
  transform: translateX(-50%);
  font-family: 'JetBrains Mono', monospace;
  font-size: 12px;
  color: #fff;
  white-space: nowrap;
}

.spectrum-labels-full {
  display: flex;
  justify-content: space-between;
  padding: 12px 24px 0;
  font-size: 10px;
  text-transform: uppercase;
  letter-spacing: 2px;
  color: #444;
}

/* Timeline — raw data */
.timeline-section { padding: 48px 24px; border-bottom: 1px solid rgba(255,255,255,0.08); }

.tl-row-brutal {
  display: flex;
  align-items: center;
  padding: 8px 0;
  border-bottom: 1px solid rgba(255,255,255,0.04);
  font-family: 'JetBrains Mono', monospace;
  font-size: 13px;
}

.tl-time-b { width: 100px; color: #555; flex-shrink: 0; }
.tl-bar-b-wrap {
  flex: 1;
  height: 2px;
  background: rgba(255,255,255,0.04);
  margin: 0 16px;
  position: relative;
}
.tl-bar-b {
  height: 100%;
  transition: width 0.5s ease;
}
.tl-mg-b { width: 70px; text-align: right; }

/* Cutoff */
.cutoff-brutal {
  padding: 48px 24px;
  border-bottom: 1px solid rgba(255,255,255,0.08);
}

.cutoff-label-b {
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 4px;
  color: #555;
  margin-bottom: 12px;
}

.cutoff-value-b {
  font-family: 'JetBrains Mono', monospace;
  font-size: clamp(3rem, 8vw, 5rem);
  font-weight: 700;
  color: #00FFD1;
}

/* ASK PULSE — brutal */
.pulse-brutal {
  padding: 80px 24px;
  text-align: center;
}

.pulse-brutal-title {
  font-family: 'DM Sans', sans-serif;
  font-weight: 700;
  font-size: clamp(2rem, 8vw, 5rem);
  text-transform: uppercase;
  letter-spacing: -2px;
  line-height: 1;
  margin-bottom: 32px;
}

.pulse-brutal-title .accent { color: #00FFD1; }

.pulse-input-brutal-wrap {
  max-width: 600px;
  margin: 0 auto;
  position: relative;
}

.pulse-input-brutal {
  width: 100%;
  padding: 16px 0;
  border: none;
  border-bottom: 2px solid rgba(255,255,255,0.15);
  background: transparent;
  color: #fff;
  font-family: 'JetBrains Mono', monospace;
  font-size: 16px;
  outline: none;
  text-align: center;
}

.pulse-input-brutal::placeholder { color: #333; }
.pulse-input-brutal:focus { border-bottom-color: #00FFD1; }

.pulse-send-brutal {
  display: block;
  margin: 24px auto 0;
  padding: 12px 40px;
  border: 2px solid #00FFD1;
  background: transparent;
  color: #00FFD1;
  font-family: 'DM Sans', sans-serif;
  font-weight: 700;
  font-size: 12px;
  text-transform: uppercase;
  letter-spacing: 3px;
  cursor: pointer;
  transition: all 0.2s;
}

.pulse-send-brutal:hover {
  background: #00FFD1;
  color: #000;
}

@media (max-width: 600px) {
  .hero { padding: 48px 16px 24px; }
  .hero-title { letter-spacing: -1px; }
  .section { padding: 32px 16px; }
  .source-grid { grid-template-columns: repeat(3, 1fr); }
  .source-card { padding: 14px 8px; }
  .time-row { gap: 24px; }
  .time-group input[type="time"] { font-size: 20px; }
  .results-section { padding: 40px 16px; }
  .result-number { letter-spacing: -2px; }
}
</style>
</head>
<body>

<div class="grid-bg"></div>

<div class="page">
  <!-- HERO -->
  <div class="hero">
    <h1 class="hero-title">CAFFEINE<br><span class="accent">HALF-LIFE</span></h1>
    <p class="hero-sub">Calculator / Decay Model / Sleep Analysis</p>
  </div>

  <!-- SOURCE SELECTION -->
  <div class="section">
    <div class="section-label">01 — Select Source</div>
    <div class="source-grid" id="source-grid"></div>
    <div class="custom-mg-wrap hidden" id="custom-mg-wrap">
      <input type="number" class="custom-mg-input" id="custom-mg" placeholder="000" min="1" max="1000">
    </div>
  </div>

  <!-- TIME -->
  <div class="section">
    <div class="section-label">02 — Define Timeline</div>
    <div class="time-row">
      <div class="time-group">
        <label>Consumed</label>
        <input type="time" id="drink-time" value="08:00">
      </div>
      <div class="time-group">
        <label>Sleep Target</label>
        <input type="time" id="bed-time" value="22:00">
      </div>
    </div>
  </div>

  <!-- RESULTS -->
  <div class="results-section">
    <div class="section-label" style="padding:0 0 16px;">03 — Result</div>
    <div class="result-number" id="big-mg">—</div>
    <div class="result-label">MG Remaining at Sleep Target</div>
    <div class="verdict-text" id="verdict" style="border-color:#555;color:#555;">Awaiting input</div>
  </div>

  <!-- SPECTRUM -->
  <div class="spectrum-section">
    <div class="spectrum-full">
      <div class="spectrum-marker-brutal" id="spectrum-marker" style="left:10%" data-mg="—"></div>
    </div>
    <div class="spectrum-labels-full">
      <span>Clear</span>
      <span>Threshold</span>
      <span>Disruptive</span>
    </div>
  </div>

  <!-- TIMELINE -->
  <div class="timeline-section">
    <div class="section-label">04 — Decay Timeline</div>
    <div id="timeline"></div>
  </div>

  <!-- CUTOFF -->
  <div class="cutoff-brutal">
    <div class="cutoff-label-b">05 — Last Safe Intake</div>
    <div class="cutoff-value-b" id="cutoff-time">—:—</div>
  </div>

  <!-- ASK PULSE -->
  <div class="pulse-brutal">
    <div class="pulse-brutal-title">WHAT DO <span class="accent">YOU</span> NEED?</div>
    <div class="pulse-input-brutal-wrap">
      <input type="text" class="pulse-input-brutal" placeholder="TYPE YOUR QUESTION">
      <button class="pulse-send-brutal">Submit</button>
    </div>
  </div>
</div>

<script>
var HALF_LIFE = 5;
var state = { mg: 95, source: 'Coffee' };

var sources = [
  { name: 'Coffee', mg: 95, icon: '\u2615' },
  { name: 'Tall coffee', mg: 142, icon: '\u2615' },
  { name: 'Espresso', mg: 63, icon: '\u2615' },
  { name: 'Cold brew', mg: 200, icon: '\u2615' },
  { name: 'Energy drink', mg: 160, icon: '\u26A1' },
  { name: 'Bang/Reign', mg: 300, icon: '\uD83D\uDCAA' },
  { name: 'Black tea', mg: 47, icon: '\uD83C\uDF75' },
  { name: 'Green tea', mg: 28, icon: '\uD83C\uDF75' },
  { name: 'Caffeine pill', mg: 200, icon: '\uD83D\uDC8A' },
  { name: 'Cola', mg: 34, icon: '\uD83E\uDD64' },
  { name: 'Pre-workout', mg: 200, icon: '\uD83C\uDFCB' },
  { name: 'Custom', mg: 0, icon: '\u2699' }
];

function parseTime(val) {
  if (!val) return null;
  var parts = val.split(':');
  return parseInt(parts[0]) * 60 + parseInt(parts[1]);
}

function formatTime(minutes) {
  var m = ((minutes % 1440) + 1440) % 1440;
  var h = Math.floor(m / 60);
  var min = m % 60;
  var ampm = h >= 12 ? 'PM' : 'AM';
  var h12 = h % 12 || 12;
  return h12 + ':' + String(min).padStart(2, '0') + ' ' + ampm;
}

function remaining(initialMg, hours) {
  return initialMg * Math.pow(0.5, hours / HALF_LIFE);
}

var grid = document.getElementById('source-grid');
sources.forEach(function(s, i) {
  var card = document.createElement('div');
  card.className = 'source-card' + (i === 0 ? ' active' : '');
  card.innerHTML = '<span class="icon">' + s.icon + '</span><div class="name">' + s.name + '</div>' + (s.mg > 0 ? '<div class="mg-val">' + s.mg + ' MG</div>' : '<div class="mg-val">CUSTOM</div>');
  card.addEventListener('click', function() {
    document.querySelectorAll('.source-card').forEach(function(c) { c.classList.remove('active'); });
    card.classList.add('active');
    if (s.name === 'Custom') {
      document.getElementById('custom-mg-wrap').classList.remove('hidden');
      state.mg = parseInt(document.getElementById('custom-mg').value) || 100;
    } else {
      document.getElementById('custom-mg-wrap').classList.add('hidden');
      state.mg = s.mg;
    }
    state.source = s.name;
    calculate();
  });
  grid.appendChild(card);
});

document.getElementById('custom-mg').addEventListener('input', function() {
  state.mg = parseInt(this.value) || 0;
  calculate();
});
document.getElementById('drink-time').addEventListener('change', calculate);
document.getElementById('bed-time').addEventListener('change', calculate);

function calculate() {
  var drinkMin = parseTime(document.getElementById('drink-time').value);
  var bedMin = parseTime(document.getElementById('bed-time').value);
  if (drinkMin === null || bedMin === null || state.mg <= 0) return;

  var diff = bedMin - drinkMin;
  if (diff <= 0) diff += 1440;
  var hours = diff / 60;
  var mgAtBed = remaining(state.mg, hours);
  var rounded = Math.round(mgAtBed);

  document.getElementById('big-mg').textContent = rounded;

  var verdict = document.getElementById('verdict');
  var bigEl = document.getElementById('big-mg');
  var marker = document.getElementById('spectrum-marker');
  var pct = Math.min((mgAtBed / 100) * 100, 100);
  marker.style.left = pct + '%';
  marker.setAttribute('data-mg', rounded + ' MG');

  if (mgAtBed < 25) {
    verdict.textContent = 'CLEAR';
    verdict.style.borderColor = '#00FFD1';
    verdict.style.color = '#00FFD1';
    bigEl.style.color = '#00FFD1';
  } else if (mgAtBed < 50) {
    verdict.textContent = 'THRESHOLD';
    verdict.style.borderColor = '#FFD100';
    verdict.style.color = '#FFD100';
    bigEl.style.color = '#FFD100';
  } else {
    verdict.textContent = 'DISRUPTIVE';
    verdict.style.borderColor = '#FF3D3D';
    verdict.style.color = '#FF3D3D';
    bigEl.style.color = '#FF3D3D';
  }

  // Timeline
  var timeline = document.getElementById('timeline');
  timeline.innerHTML = '';
  var maxHours = Math.min(Math.ceil(hours) + 1, 20);
  for (var h = 0; h <= maxHours; h++) {
    var mg = remaining(state.mg, h);
    var barPct = (mg / state.mg) * 100;
    var time = formatTime(drinkMin + h * 60);
    var barColor = mg < 25 ? '#00FFD1' : mg < 50 ? '#FFD100' : '#FF3D3D';

    var row = document.createElement('div');
    row.className = 'tl-row-brutal';
    row.innerHTML =
      '<div class="tl-time-b">' + time + '</div>' +
      '<div class="tl-bar-b-wrap"><div class="tl-bar-b" style="width:' + barPct + '%;background:' + barColor + '"></div></div>' +
      '<div class="tl-mg-b" style="color:' + barColor + '">' + Math.round(mg) + '</div>';
    timeline.appendChild(row);
  }

  // Cutoff
  var hoursNeeded = HALF_LIFE * Math.log2(state.mg / 25);
  var cutoffMin = bedMin - hoursNeeded * 60;
  document.getElementById('cutoff-time').textContent = formatTime(cutoffMin);
}

calculate();
</script>
</body>
</html>
