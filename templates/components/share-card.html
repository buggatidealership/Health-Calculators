{#
  Reusable share card component for calculator result sharing.

  Usage: {% include 'components/share-card.html' %}
  Place after the results section inside the calculator div.
  Auto-detects results via MutationObserver and generates share card.
#}
<div id="share-card-output" class="share-card-container" style="display:none;"></div>

<style>
/* Share Card Component */
.share-card-container {
  margin-top: 24px;
  padding: 20px;
  background: var(--color-surface, #ffffff);
  border-radius: var(--radius, 10px);
  border: 1px solid var(--color-border, #e2e8f0);
}

.share-card-title {
  font-size: 0.82rem;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  color: var(--color-text-tertiary, #94a3b8);
  margin: 0 0 14px;
  text-align: center;
}

.share-card-canvas-wrap {
  text-align: center;
  margin-bottom: 16px;
}

.share-card-canvas-wrap canvas {
  max-width: 100%;
  height: auto;
  border-radius: 8px;
  box-shadow: 0 2px 8px rgba(0,0,0,0.08);
}

.share-card-buttons {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  justify-content: center;
}

.share-card-btn {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 10px 14px;
  background: var(--color-muted, #f1f5f9);
  color: var(--color-text-secondary, #475569);
  border: 1px solid var(--color-border, #e2e8f0);
  border-radius: 8px;
  font-size: 0.82rem;
  font-weight: 500;
  font-family: inherit;
  cursor: pointer;
  transition: all 0.15s;
  width: auto;
  box-shadow: none;
  transform: none;
}

.share-card-btn:hover {
  background: var(--color-accent-bg, #ecfeff);
  border-color: var(--color-accent, #0a7e8c);
  color: var(--color-accent, #0a7e8c);
  box-shadow: none;
  transform: none;
}

.share-card-btn-copied {
  background: var(--color-good-bg, #f0fdf4) !important;
  border-color: var(--color-good-border, #bbf7d0) !important;
  color: var(--color-good, #16a34a) !important;
}

.share-card-btn svg {
  flex-shrink: 0;
}

@media (max-width: 500px) {
  .share-card-buttons {
    gap: 6px;
  }
  .share-card-btn {
    padding: 8px 10px;
    font-size: 0.78rem;
  }
  .share-card-btn span {
    display: none;
  }
  .share-card-container {
    padding: 14px;
  }
}
</style>

<script defer src="/static/js/share-card.js"></script>
<script>
// Auto-detect results and generate share card via MutationObserver
(function() {
  function setup() {
    var resultsEl = document.getElementById('results') || document.getElementById('result');
    if (!resultsEl) return;

    // Watch for results becoming visible (class/style changes)
    var observer = new MutationObserver(function() {
      // Check if results are visible
      if (resultsEl.offsetHeight > 0 && !resultsEl.classList.contains('hidden')) {
        // Wait for count-up animations to complete before capturing values
        setTimeout(function() {
          if (typeof autoShareCard === 'function') autoShareCard();
        }, 1500);
      }
    });

    observer.observe(resultsEl, {
      attributes: true,
      attributeFilter: ['style', 'class']
    });
  }

  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', setup);
  } else {
    setup();
  }
})();
</script>
