<!-- Global SEO Head Elements -->
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="{{ meta_description }}">
<meta name="keywords" content="{{ meta_keywords }}">
<meta name="author" content="LongevityCalculator.xyz">
<meta name="robots" content="index, follow">
<link rel="icon" type="image/png" href="{{ url_for('static', filename='images/favicon.png') }}">
<meta name="theme-color" content="#d63384">

<!-- Open Graph tags for social sharing -->
<meta property="og:title" content="{{ og_title }}">
<meta property="og:description" content="{{ og_description }}">
<meta property="og:url" content="https://longevitycalculator.xyz{{ og_url }}">
<meta property="og:image" content="{{ og_image }}">
<meta property="og:type" content="website">

<!-- Twitter Card -->
<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:title" content="{{ og_title }}">
<meta name="twitter:description" content="{{ og_description }}">

<!-- Schema Markup -->
<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "SoftwareApplication",
  "name": "{{ schema_name }}",
  "applicationCategory": "HealthApplication",
  "operatingSystem": "All",
  "url": "https://longevitycalculator.xyz{{ schema_url }}",
  "description": "{{ schema_description }}"
}
</script>

<title>{{ page_title }}</title>
<link rel="canonical" href="https://longevitycalculator.xyz{{ canonical_url }}">
<link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}">
