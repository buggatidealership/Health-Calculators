<!-- Schema Markup -->
<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "{{ schema_type|default('MedicalWebPage') }}",
  "name": "{{ schema_name }}",
  "headline": "{{ schema_name }}",
  "url": "https://healthcalculators.xyz{{ schema_url }}",
  "description": "{{ schema_description }}",
  "image": {
    "@type": "ImageObject",
    "url": "https://healthcalculators.xyz/static/images/{{ og_image or 'default-calculator-og.jpg' }}",
    "width": 1200,
    "height": 628
  },
  "datePublished": "{{ date_published|default('2025-06-01') }}",
  "dateModified": "{{ date_modified|default('2025-06-01') }}",
  "author": {
    "@type": "Organization",
    "name": "HealthCalculators.xyz",
    "url": "https://healthcalculators.xyz",
    "sameAs": [
      "https://github.com/buggatidealership/Health-Calculators"
    ]
  },
  {% if schema_type|default('MedicalWebPage') == 'MedicalWebPage' %}
  "reviewedBy": {
    "@type": "Organization",
    "name": "HealthCalculators.xyz Editorial Team",
    "url": "https://healthcalculators.xyz/editorial-policy"
  },
  {% endif %}
  "publisher": {
    "@type": "Organization",
    "name": "HealthCalculators.xyz",
    "url": "https://healthcalculators.xyz",
    "logo": {
      "@type": "ImageObject",
      "url": "https://healthcalculators.xyz/static/images/logo.png",
      "width": 512,
      "height": 512
    }
  },
  "mainEntityOfPage": {
    "@type": "WebPage",
    "@id": "https://healthcalculators.xyz{{ schema_url }}"
  },
  "about": {
    "@type": "Thing",
    "name": "{{ schema_about|default(schema_name) }}"
  }
  {% if schema_type|default('MedicalWebPage') == 'MedicalWebPage' %},
  "audience": {
    "@type": "MedicalAudience",
    "audienceType": "Patient"
  },
  "lastReviewed": "{{ date_modified|default('2025-06-01') }}"
  {% endif %}
}
</script>

<!-- Breadcrumb Schema Markup -->
<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "BreadcrumbList",
  "itemListElement": [
    {
      "@type": "ListItem",
      "position": 1,
      "name": "Home",
      "item": "https://healthcalculators.xyz"
    }
    {% if breadcrumb_category is defined and breadcrumb_category %},
    {
      "@type": "ListItem",
      "position": 2,
      {% if breadcrumb_category is mapping %}
      "name": "{{ breadcrumb_category.name }}",
      "item": "https://healthcalculators.xyz{{ breadcrumb_category.url }}"
      {% else %}
      "name": "{{ breadcrumb_category }}"
      {% endif %}
    },
    {
      "@type": "ListItem",
      "position": 3,
      "name": "{{ breadcrumb_title|default(page_title) }}",
      "item": "https://healthcalculators.xyz{{ canonical_url }}"
    }
    {% else %},
    {
      "@type": "ListItem",
      "position": 2,
      "name": "{{ breadcrumb_title|default(page_title) }}",
      "item": "https://healthcalculators.xyz{{ canonical_url }}"
    }
    {% endif %}
  ]
}
</script>

<title>{{ page_title }}</title>
<link rel="canonical" href="https://healthcalculators.xyz{{ canonical_url }}">
<link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}">
<script>
document.addEventListener('DOMContentLoaded',function(){
  // Smooth scroll for anchor links
  document.querySelectorAll('a[href^="#"]').forEach(function(a){
    a.addEventListener('click',function(e){
      e.preventDefault();
      var t=document.querySelector(a.getAttribute('href'));
      if(t)window.scrollTo({top:t.offsetTop-70,behavior:'smooth'});
    });
  });
  // Header dropdown toggle
  var btn=document.getElementById('nav-menu-btn');
  var dd=document.getElementById('nav-dropdown');
  if(btn&&dd){
    btn.addEventListener('click',function(e){
      e.stopPropagation();
      dd.classList.toggle('open');
      btn.classList.toggle('open');
    });
    document.addEventListener('click',function(e){
      if(!dd.contains(e.target)&&!btn.contains(e.target)){
        dd.classList.remove('open');
        btn.classList.remove('open');
      }
    });
  }
  // Sticky header shadow on scroll
  var header=document.getElementById('site-header');
  if(header){
    window.addEventListener('scroll',function(){
      header.classList.toggle('scrolled',window.scrollY>10);
    });
  }
  // URL param pre-filler: reads ?weight=70&height=175&age=30&gender=male etc.
  // Enables data-carrying cross-links between calculators
  (function(){
    var params=new URLSearchParams(window.location.search);
    if(params.toString()){
      // Map of URL param names to possible form field IDs
      var fieldMap={
        'weight_kg':['weight_kg','weight-kg'],
        'weight_lb':['weight_lb','weight-lb'],
        'height_cm':['height_cm','height-cm'],
        'height_ft':['height_ft','height-ft'],
        'height_in':['height_in','height-in'],
        'age':['age'],
        'gender':['gender','sex'],
        'activity':['activity','activity-level'],
        'weight':['weight_kg','weight','weight-kg']
      };
      params.forEach(function(val,key){
        var ids=fieldMap[key]||[key];
        ids.forEach(function(id){
          var el=document.getElementById(id);
          if(el){
            el.value=val;
            // Trigger change event for selects
            if(el.tagName==='SELECT'){
              el.dispatchEvent(new Event('change'));
            }
          }
        });
      });
      // If imperial weight/height provided, switch to imperial
      if(params.get('weight_lb')||params.get('height_ft')){
        var impBtn=document.getElementById('imperial-btn');
        if(impBtn&&!impBtn.classList.contains('active')){
          impBtn.click();
        }
      }
      // Clean URL without reloading (removes params after pre-filling)
      if(window.history.replaceState){
        window.history.replaceState(null,'',window.location.pathname);
      }
    }
  })();
  // FAQ: start expanded on all devices (required for FAQPage schema compliance)
  // On mobile, allow collapsing on tap after initial render
  document.querySelectorAll('.faq-item').forEach(function(item){
    item.classList.add('faq-open');
  });
  if(window.innerWidth<=600){
    document.querySelectorAll('.faq-item h4, .faq-item h3').forEach(function(h){
      h.addEventListener('click',function(){
        h.parentElement.classList.toggle('faq-open');
      });
    });
  }
  // Sticky mobile CTA: show when calculator form scrolls out of view
  (function(){
    var calcForm=document.querySelector('.calculator');
    if(!calcForm) return;
    // Create sticky CTA
    var sticky=document.createElement('div');
    sticky.className='sticky-cta';
    sticky.innerHTML='<button class="sticky-cta-btn" type="button">&#9650; Use Calculator</button>';
    document.body.appendChild(sticky);
    sticky.querySelector('button').addEventListener('click',function(){
      calcForm.scrollIntoView({behavior:'smooth',block:'start'});
      if(typeof gtag==='function'){
        gtag('event','sticky_cta_click',{event_category:'engagement',page:window.location.pathname});
      }
    });
    // Show/hide based on scroll position
    var ticking=false;
    window.addEventListener('scroll',function(){
      if(!ticking){
        requestAnimationFrame(function(){
          var rect=calcForm.getBoundingClientRect();
          // Show when calculator form is above viewport
          if(rect.bottom<0){
            sticky.classList.add('visible');
          } else {
            sticky.classList.remove('visible');
          }
          ticking=false;
        });
        ticking=true;
      }
    });
  })();
  // Auto-generate FAQPage schema from .faq-item elements
  // Skip if a hardcoded FAQPage schema already exists in the page
  (function(){
    var existing=document.querySelectorAll('script[type="application/ld+json"]');
    for(var i=0;i<existing.length;i++){
      try{
        var d=JSON.parse(existing[i].textContent);
        if(d['@type']==='FAQPage'||(d['@graph']&&d['@graph'].some(function(g){return g['@type']==='FAQPage';}))) return;
      }catch(e){}
    }
    var items=document.querySelectorAll('.faq-item');
    if(items.length<2) return;
    var faqEntities=[];
    items.forEach(function(item){
      var h=item.querySelector('h4,h3');
      var body=item.querySelector('.faq-body,.faq-answer');
      if(h&&body){
        var answer=body.textContent.trim();
        if(answer.length>10){
          faqEntities.push({
            '@type':'Question',
            'name':h.textContent.trim(),
            'acceptedAnswer':{'@type':'Answer','text':answer}
          });
        }
      }
    });
    if(faqEntities.length>=2){
      var script=document.createElement('script');
      script.type='application/ld+json';
      script.textContent=JSON.stringify({
        '@context':'https://schema.org',
        '@type':'FAQPage',
        'mainEntity':faqEntities
      });
      document.head.appendChild(script);
    }
  })();
});
</script>
