<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-1580600669281697" crossorigin="anonymous"></script>

<!-- Global SEO Head Elements -->
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="{{ meta_description }}">
<meta name="keywords" content="{{ meta_keywords }}">
<meta name="author" content="HealthCalculators.xyz">
<meta name="robots" content="index, follow">
<link rel="icon" type="image/png" href="{{ url_for('static', filename='images/favicon.png') }}">
<meta name="theme-color" content="#d63384">

<!-- Google tag (gtag.js) -->
<script async src="https://www.googletagmanager.com/gtag/js?id=G-7QBF9RR49T"></script>
<script>
  window.dataLayer = window.dataLayer || [];
  function gtag(){dataLayer.push(arguments);}
  gtag('js', new Date());
  gtag('config', 'G-7QBF9RR49T');
</script>

<!-- Open Graph tags for social sharing -->
<meta property="og:title" content="{{ og_title }}">
<meta property="og:description" content="{{ og_description }}">
<meta property="og:url" content="https://healthcalculators.xyz{{ og_url }}">
<meta property="og:image" content="https://healthcalculators.xyz/static/images/{{ og_image or 'default-calculator-og.jpg' }}">
<meta property="og:type" content="website">

<!-- Twitter Card -->
<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:title" content="{{ og_title }}">
<meta name="twitter:description" content="{{ og_description }}">

<!-- Schema Markup -->
<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "SoftwareApplication",
  "name": "{{ schema_name }}",
  "applicationCategory": "HealthApplication",
  "operatingSystem": "All",
  "url": "https://healthcalculators.xyz{{ schema_url }}",
  "description": "{{ schema_description }}"
}
</script>

<title>{{ page_title }}</title>
<link rel="canonical" href="https://healthcalculators.xyz{{ canonical_url }}">
<link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}">
