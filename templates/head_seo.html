<!-- Fonts: DM Serif Display (headings) + DM Sans (body) -->

<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@0,400;0,500;0,600;0,700;1,400&family=DM+Serif+Display&display=swap" rel="stylesheet" media="print" onload="this.media='all'">
<noscript><link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@0,400;0,500;0,600;0,700;1,400&family=DM+Serif+Display&display=swap" rel="stylesheet"></noscript>

<!-- Global SEO Head Elements -->
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="{{ meta_description }}">
<meta name="author" content="HealthCalculators.xyz">
<meta name="robots" content="{{ robots_meta|default('index, follow') }}">
<meta name="google-site-verification" content="UNgxdXemjoASqphaPyegFdYw_pfs9TXdaIpLrBdtCA4" />
<meta name="theme-color" content="#0a7e8c">

<!-- Favicon Integration -->
<link rel="icon" type="image/png" sizes="32x32" href="{{ url_for('static', filename='favicon-32x32.png') }}">
<link rel="icon" type="image/png" sizes="16x16" href="{{ url_for('static', filename='favicon-16x16.png') }}">
<link rel="shortcut icon" href="{{ url_for('static', filename='favicon.ico') }}" type="image/x-icon">
<link rel="apple-touch-icon" sizes="180x180" href="{{ url_for('static', filename='apple-touch-icon.png') }}">
<link rel="manifest" href="{{ url_for('static', filename='site.webmanifest') }}">

<!-- GDPR Consent: default denied for EU, granted elsewhere -->
<script>
  window.dataLayer = window.dataLayer || [];
  function gtag(){dataLayer.push(arguments);}
  gtag('consent', 'default', {
    'analytics_storage': 'denied',
    'ad_storage': 'denied',
    'ad_user_data': 'denied',
    'ad_personalization': 'denied',
    'wait_for_update': 500
  });
  gtag('consent', 'default', {
    'analytics_storage': 'granted',
    'ad_storage': 'granted',
    'ad_user_data': 'granted',
    'ad_personalization': 'granted',
    'region': ['US', 'CA', 'AU', 'NZ', 'JP', 'KR', 'SG', 'BR', 'MX', 'IN']
  });
</script>
<!-- Google tag (gtag.js) -->
<script async src="https://www.googletagmanager.com/gtag/js?id=G-7QBF9RR49T"></script>
<script>
  gtag('js', new Date());
  gtag('config', 'G-7QBF9RR49T');
</script>

<!-- Open Graph tags for social sharing -->
<meta property="og:title" content="{{ og_title }}">
<meta property="og:description" content="{{ og_description }}">
<meta property="og:url" content="https://healthcalculators.xyz{{ og_url }}">
<meta property="og:image" content="https://healthcalculators.xyz/static/images/{{ og_image or 'default-calculator-og.jpg' }}">
<meta property="og:type" content="{{ 'article' if schema_type|default('') == 'Article' else 'website' }}">
<meta property="og:locale" content="en_US">
<meta property="og:site_name" content="HealthCalculators.xyz">

<!-- Twitter Card -->
<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:site" content="@GetHealthC">
<meta name="twitter:title" content="{{ og_title }}">
<meta name="twitter:description" content="{{ og_description }}">
<meta name="twitter:image" content="https://healthcalculators.xyz/static/images/{{ og_image or 'default-calculator-og.jpg' }}">

<!-- Schema Markup -->
<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "{{ schema_type|default('MedicalWebPage') }}",
  "name": "{{ schema_name }}",
  "headline": "{{ schema_name }}",
  "url": "https://healthcalculators.xyz{{ schema_url }}",
  "description": "{{ schema_description }}",
  "image": {
    "@type": "ImageObject",
    "url": "https://healthcalculators.xyz/static/images/{{ og_image or 'default-calculator-og.jpg' }}",
    "width": 1200,
    "height": 628
  },
  "datePublished": "{{ date_published|default('2025-06-01') }}",
  "dateModified": "{{ date_modified|default('2025-06-01') }}",
  "author": {
    "@type": "Organization",
    "name": "HealthCalculators.xyz",
    "url": "https://healthcalculators.xyz",
    "sameAs": ["https://x.com/GetHealthC"]
  },
  "publisher": {
    "@type": "Organization",
    "name": "HealthCalculators.xyz",
    "url": "https://healthcalculators.xyz",
    "logo": {
      "@type": "ImageObject",
      "url": "https://healthcalculators.xyz/static/images/logo.png",
      "width": 512,
      "height": 512
    }
  },
  "mainEntityOfPage": {
    "@type": "WebPage",
    "@id": "https://healthcalculators.xyz{{ schema_url }}"
  },
  "about": {
    "@type": "Thing",
    "name": "{{ schema_about|default(schema_name) }}"
  }
  {% if schema_type|default('MedicalWebPage') == 'MedicalWebPage' %},
  "audience": {
    "@type": "MedicalAudience",
    "audienceType": "Patient"
  },
  "lastReviewed": "{{ date_modified|default('2025-06-01') }}"
  {% endif %}
}
</script>

<!-- Breadcrumb Schema Markup -->
<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "BreadcrumbList",
  "itemListElement": [
    {
      "@type": "ListItem",
      "position": 1,
      "name": "Home",
      "item": "https://healthcalculators.xyz"
    }
    {% if breadcrumb_category is defined and breadcrumb_category %},
    {
      "@type": "ListItem",
      "position": 2,
      {% if breadcrumb_category is mapping %}
      "name": "{{ breadcrumb_category.name }}",
      "item": "https://healthcalculators.xyz{{ breadcrumb_category.url }}"
      {% else %}
      "name": "{{ breadcrumb_category }}"
      {% endif %}
    },
    {
      "@type": "ListItem",
      "position": 3,
      "name": "{{ breadcrumb_title or page_title }}",
      "item": "https://healthcalculators.xyz{{ canonical_url }}"
    }
    {% else %},
    {
      "@type": "ListItem",
      "position": 2,
      "name": "{{ breadcrumb_title or page_title }}",
      "item": "https://healthcalculators.xyz{{ canonical_url }}"
    }
    {% endif %}
  ]
}
</script>

<title>{{ page_title }}</title>
<link rel="canonical" href="https://healthcalculators.xyz{{ canonical_url }}">
<link rel="stylesheet" href="{{ url_for('static', filename='css/layout.css') }}?v=2">
{% if not skip_global_css %}
<link rel="stylesheet" href="{{ url_for('static', filename='css/theme-light.css') }}?v=2">
{% else %}
<link rel="stylesheet" href="{{ url_for('static', filename='css/theme-dark.css') }}?v=2">
{% endif %}
<script>
document.addEventListener('DOMContentLoaded',function(){
  // Smooth scroll for anchor links
  document.querySelectorAll('a[href^="#"]').forEach(function(a){
    a.addEventListener('click',function(e){
      e.preventDefault();
      var t=document.querySelector(a.getAttribute('href'));
      if(t)window.scrollTo({top:t.offsetTop-70,behavior:'smooth'});
    });
  });
  // Header dropdown toggle
  var btn=document.getElementById('nav-menu-btn');
  var dd=document.getElementById('nav-dropdown');
  if(btn&&dd){
    btn.addEventListener('click',function(e){
      e.stopPropagation();
      dd.classList.toggle('open');
      btn.classList.toggle('open');
    });
    document.addEventListener('click',function(e){
      if(!dd.contains(e.target)&&!btn.contains(e.target)){
        dd.classList.remove('open');
        btn.classList.remove('open');
      }
    });
  }
  // Sticky header shadow on scroll
  var header=document.getElementById('site-header');
  if(header){
    window.addEventListener('scroll',function(){
      header.classList.toggle('scrolled',window.scrollY>10);
    });
  }
  // URL param pre-filler: reads ?weight=70&height=175&age=30&gender=male etc.
  // Enables data-carrying cross-links between calculators
  (function(){
    var params=new URLSearchParams(window.location.search);
    if(params.toString()){
      // Map of URL param names to possible form field IDs
      var fieldMap={
        'weight_kg':['weight_kg','weight-kg'],
        'weight_lb':['weight_lb','weight-lb'],
        'height_cm':['height_cm','height-cm'],
        'height_ft':['height_ft','height-ft'],
        'height_in':['height_in','height-in'],
        'age':['age'],
        'gender':['gender','sex'],
        'activity':['activity','activity-level'],
        'weight':['weight_kg','weight','weight-kg']
      };
      params.forEach(function(val,key){
        var ids=fieldMap[key]||[key];
        ids.forEach(function(id){
          var el=document.getElementById(id);
          if(el){
            el.value=val;
            // Trigger change event for selects
            if(el.tagName==='SELECT'){
              el.dispatchEvent(new Event('change'));
            }
          }
        });
      });
      // If imperial weight/height provided, switch to imperial
      if(params.get('weight_lb')||params.get('height_ft')){
        var impBtn=document.getElementById('imperial-btn');
        if(impBtn&&!impBtn.classList.contains('active')){
          impBtn.click();
        }
      }
      // Clean URL without reloading (removes params after pre-filling)
      if(window.history.replaceState){
        window.history.replaceState(null,'',window.location.pathname);
      }
    }
  })();
  // FAQ: start expanded on all devices (required for FAQPage schema compliance)
  // On mobile, allow collapsing on tap after initial render
  document.querySelectorAll('.faq-item').forEach(function(item){
    item.classList.add('faq-open');
  });
  if(window.innerWidth<=600){
    document.querySelectorAll('.faq-item h4, .faq-item h3').forEach(function(h){
      h.addEventListener('click',function(){
        h.parentElement.classList.toggle('faq-open');
      });
    });
  }
  // Sticky mobile CTA: show when calculator form scrolls out of view
  (function(){
    var calcForm=document.querySelector('.calculator');
    if(!calcForm) return;
    // Create sticky CTA
    var sticky=document.createElement('div');
    sticky.className='sticky-cta';
    sticky.innerHTML='<button class="sticky-cta-btn" type="button">&#9650; Use Calculator</button>';
    document.body.appendChild(sticky);
    sticky.querySelector('button').addEventListener('click',function(){
      calcForm.scrollIntoView({behavior:'smooth',block:'start'});
      if(typeof hcTrackEvent==='function'){
        hcTrackEvent('sticky_cta_click',{event_category:'engagement',page:window.location.pathname});
      }
    });
    // Show/hide based on scroll position
    var ticking=false;
    window.addEventListener('scroll',function(){
      if(!ticking){
        requestAnimationFrame(function(){
          var rect=calcForm.getBoundingClientRect();
          // Show when calculator form is above viewport
          if(rect.bottom<0){
            sticky.classList.add('visible');
          } else {
            sticky.classList.remove('visible');
          }
          ticking=false;
        });
        ticking=true;
      }
    });
  })();
  // Auto-generate FAQPage schema from .faq-item elements
  // Skip if a hardcoded FAQPage schema already exists in the page
  (function(){
    var existing=document.querySelectorAll('script[type="application/ld+json"]');
    for(var i=0;i<existing.length;i++){
      try{
        var d=JSON.parse(existing[i].textContent);
        if(d['@type']==='FAQPage'||(d['@graph']&&d['@graph'].some(function(g){return g['@type']==='FAQPage';}))) return;
      }catch(e){}
    }
    var items=document.querySelectorAll('.faq-item');
    if(items.length<2) return;
    var faqEntities=[];
    items.forEach(function(item){
      var h=item.querySelector('h4,h3');
      var body=item.querySelector('.faq-body,.faq-answer');
      if(h&&body){
        var answer=body.textContent.trim();
        if(answer.length>10){
          faqEntities.push({
            '@type':'Question',
            'name':h.textContent.trim(),
            'acceptedAnswer':{'@type':'Answer','text':answer}
          });
        }
      }
    });
    if(faqEntities.length>=2){
      var script=document.createElement('script');
      script.type='application/ld+json';
      script.textContent=JSON.stringify({
        '@context':'https://schema.org',
        '@type':'FAQPage',
        'mainEntity':faqEntities
      });
      document.head.appendChild(script);
    }
  })();
  // Consent-aware event queue: buffers events until analytics consent is resolved
  // Non-EU visitors: consent auto-granted, events fire immediately
  // EU visitors: events queue until Accept/Decline on cookie banner
  window._hcEventQueue=[];
  window._hcConsentResolved=false;
  function hcTrackEvent(eventName,params){
    if(typeof gtag!=='function') return;
    if(window._hcConsentResolved){
      gtag('event',eventName,params);
    } else {
      window._hcEventQueue.push({name:eventName,params:params});
    }
  }
  function hcFlushEvents(granted){
    window._hcConsentResolved=true;
    if(!granted){window._hcEventQueue=[];return;}
    window._hcEventQueue.forEach(function(e){
      gtag('event',e.name,e.params);
    });
    window._hcEventQueue=[];
  }
  // Resolve consent state: non-EU or returning visitors resolve immediately
  (function(){
    var stored=localStorage.getItem('hc_consent');
    if(stored!=null){hcFlushEvents(stored==='granted');return;}
    var tz;
    try{tz=Intl.DateTimeFormat().resolvedOptions().timeZone||'';}catch(e){tz='';}
    if(!/^(Europe|Atlantic)\//.test(tz)){hcFlushEvents(true);return;}
    // EU first visit: consent pending, events will queue until banner action
  })();
  // UTM parameter tracking: capture campaign source and pass to GA4
  (function(){
    var params=new URLSearchParams(window.location.search);
    var utmFields=['utm_source','utm_medium','utm_campaign','utm_content','utm_term'];
    var campaign={};
    var hasUtm=false;
    utmFields.forEach(function(f){
      var v=params.get(f);
      if(v){campaign[f]=v;hasUtm=true;}
    });
    if(hasUtm){
      // Store UTM params in sessionStorage for cross-page attribution
      sessionStorage.setItem('hc_utm',JSON.stringify(campaign));
      if(typeof gtag==='function'){
        gtag('set',{
          campaign_source:campaign.utm_source||'(not set)',
          campaign_medium:campaign.utm_medium||'(not set)',
          campaign_name:campaign.utm_campaign||'(not set)',
          campaign_content:campaign.utm_content||undefined,
          campaign_term:campaign.utm_term||undefined
        });
      }
    } else {
      // Restore UTM from sessionStorage for subsequent pages in same session
      var stored=sessionStorage.getItem('hc_utm');
      if(stored){
        try{
          var c=JSON.parse(stored);
          if(typeof gtag==='function'){
            gtag('set',{
              campaign_source:c.utm_source||'(not set)',
              campaign_medium:c.utm_medium||'(not set)',
              campaign_name:c.utm_campaign||'(not set)',
              campaign_content:c.utm_content||undefined,
              campaign_term:c.utm_term||undefined
            });
          }
        }catch(e){}
      }
    }
  })();
  // Track calculator_complete: fires when a result renders on any calculator page
  (function(){
    var resultsEl=document.getElementById('results')||document.getElementById('result');
    if(!resultsEl) return;
    var fired=false;
    var observer=new MutationObserver(function(){
      if(fired) return;
      // Check if results container now has visible content
      if(resultsEl.offsetHeight>50 && resultsEl.textContent.trim().length>10){
        fired=true;
        var h1=document.querySelector('h1');
        hcTrackEvent('calculator_complete',{
          calculator_name: h1?h1.textContent.trim():'Unknown',
          page_path: window.location.pathname
        });
      }
    });
    observer.observe(resultsEl,{childList:true,subtree:true,attributes:true});
  })();
  // GDPR consent banner for EU visitors
  (function(){
    if(localStorage.getItem('hc_consent')!=null) {
      if(localStorage.getItem('hc_consent')==='granted'){
        gtag('consent','update',{'analytics_storage':'granted','ad_storage':'granted','ad_user_data':'granted','ad_personalization':'granted'});
      }
      return;
    }
    var tz;
    try{tz=Intl.DateTimeFormat().resolvedOptions().timeZone||'';}catch(e){tz='';}
    var euZones=/^(Europe|Atlantic)\//;
    if(!euZones.test(tz)) return; // Only show banner to likely-EU visitors
    var bar=document.createElement('div');
    bar.id='consent-bar';
    bar.style.cssText='position:fixed;bottom:0;left:0;right:0;background:#1a1a1a;color:#fff;padding:14px 20px;display:flex;align-items:center;justify-content:center;gap:16px;font-size:14px;z-index:9999;font-family:DM Sans,system-ui,sans-serif;flex-wrap:wrap;';
    bar.innerHTML='<span>We use cookies for analytics and ads. </span><button id="consent-accept" style="background:#0a7e8c;color:#fff;border:none;padding:8px 20px;border-radius:6px;cursor:pointer;font-size:14px;font-weight:600;">Accept</button><button id="consent-deny" style="background:transparent;color:#aaa;border:1px solid #555;padding:8px 20px;border-radius:6px;cursor:pointer;font-size:14px;">Decline</button>';
    document.body.appendChild(bar);
    document.getElementById('consent-accept').addEventListener('click',function(){
      localStorage.setItem('hc_consent','granted');
      gtag('consent','update',{'analytics_storage':'granted','ad_storage':'granted','ad_user_data':'granted','ad_personalization':'granted'});
      hcFlushEvents(true);
      bar.remove();
    });
    document.getElementById('consent-deny').addEventListener('click',function(){
      localStorage.setItem('hc_consent','denied');
      hcFlushEvents(false);
      bar.remove();
    });
  })();
});
</script>
