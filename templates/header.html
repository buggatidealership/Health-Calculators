<!-- BEGIN HEADER -->
<header class="site-header">
  <div class="header-inner">
    <a href="/" class="logo-link" style="display: flex; align-items: center;">
      <img src="{{ url_for('static', filename='site-logo.png') }}" alt="HealthCalculators.xyz logo" width="40" height="40" style="margin-right: 8px;">
      <span class="logo-text">HealthCalculators.xyz</span>
    </a>
    <nav class="site-nav">
      <a href="/" class="nav-link">Calculators</a>
      <a href="/resources" class="nav-link">Resources</a>
    </nav>
  </div>
</header>

{% if not is_homepage and request.path != '/resources' %}
<!-- Optional subpage nav -->
<div class="back-link-wrapper">
  <a href="/" class="back-home-link">← Back to Homepage</a>
  {% if request.path.startswith('/resources/') %}
  <div style="margin-top: 10px;">
    <a href="/" class="back-calculators-link" style="color: #d63384;">← Back to All Calculators</a>
  </div>
  {% endif %}
</div>
{% endif %}
<!-- END HEADER -->
