<!-- BEGIN HEADER -->
<header class="site-header">
  <div class="header-inner">
    <a href="/" class="logo-link">
      <span class="logo-icon">🧮❤️</span>
      <span class="logo-text">HealthCalculators.xyz</span>
    </a>
    <nav class="site-nav">
      <a href="/" class="nav-link">Calculators</a>
      <a href="/resources" class="nav-link">Resources</a>
      {% if current_user.is_authenticated %}
        <a href="{{ url_for('dashboard') }}" class="nav-link">My Dashboard</a>
        <a href="{{ url_for('logout') }}" class="nav-link">Logout</a>
      {% else %}
        <a href="{{ url_for('login') }}" class="nav-link">Login</a>
        <a href="{{ url_for('register') }}" class="nav-link nav-highlight">Register</a>
      {% endif %}
    </nav>
  </div>
</header>

{% if not is_homepage %}
<!-- Optional subpage nav -->
<div class="back-link-wrapper">
  <a href="/" class="back-home-link">← Back to Homepage</a>
</div>
{% endif %}

<style>
  .nav-highlight {
    background-color: #d63384;
    color: white !important;
    padding: 5px 12px;
    border-radius: 4px;
    transition: background-color 0.2s;
  }
  
  .nav-highlight:hover {
    background-color: #be2d73;
  }
</style>
<!-- END HEADER -->
