<style>
      body {
        background-color: #090e19;
        margin: 0;
        padding: 0;
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
      }
      .canvas-1080 {
        width: 1080px;
        height: 1080px;
        background-color: #090e19;
        display: flex;
        flex-direction: column;
        justify-content: center;
        padding: 80px;
        position: relative;
        overflow: hidden;
      }
      .monospace {
        font-family: 'Space Grotesk', monospace;
      }
      .data-row {
        border-bottom: 1px solid rgba(56, 72, 105, 0.4);
      }
      .data-row:last-child {
        border-bottom: none;
      }
      .stamp {
        border: 2px solid #94efc0;
        color: #94efc0;
        padding: 4px 12px;
        font-family: 'Space Grotesk', sans-serif;
        font-weight: 700;
        font-size: 1.25rem;
        letter-spacing: 0.1em;
        transform: rotate(-8deg);
        display: inline-block;
        mix-blend-mode: lighten;
      }
      .scanline {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: linear-gradient(to bottom, transparent 50%, rgba(255, 255, 255, 0.02) 50%);
        background-size: 100% 4px;
        pointer-events: none;
      }
      .grain {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        opacity: 0.03;
        pointer-events: none;

<style>
