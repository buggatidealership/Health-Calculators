<style>
        .glow-dot {
            box-shadow: 0 0 15px 2px rgba(110, 200, 155, 0.6);
        }
        .text-glow {
            text-shadow: 0 0 30px rgba(110, 200, 155, 0.2);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>

<body class="bg-[#0a0f1a] text-on-surface font-body overflow-hidden flex items-center justify-center min-h-screen">
<!-- 1080x1080 Social Media Square Canvas -->
<main class="relative aspect-square w-full max-w-[1080px] h-full flex flex-col items-center justify-center px-12 text-center bg-[#0a0f1a]">
<!-- Background Subtle Gradient Ray (Clinical Glow) -->
<div class="absolute inset-0 pointer-events-none opacity-20" style="background: radial-gradient(circle at 50% 50%, #6ec89b 0%, transparent 60%);">
</div>
<!-- Typography Stack -->
<div class="relative z-10 flex flex-col items-center space-y-2">
<!-- Contextual Lead-in -->
<p class="font-body text-xl md:text-2xl tracking-[0.15em] text-[#6b7280] mb-8">
                The number was never wrong.
            </p>
<!-- Headline Group -->
<div class="flex flex-col items-center leading-none">
<span class="font-headline font-light italic text-4xl md:text-6xl text-on-background mb-1">
                    The
                </span>
<h1 class="font-headline font-bold text-primary-container text-[120px] md:text-[180px] tracking-tight text-glow mb-2">
                    context
                </h1>
<span class="font-headline font-light italic text-4xl md:text-6xl text-on-background">
                    was missing.
                </span>
</div>
<!-- Signature Illumination Signature -->
<div class="mt-20 flex flex-col items-center">
<!-- The Illumination Dot -->
<div class="w-[14px] h-[14px] bg-primary-container rounded-full glow-dot mb-4"></div>
<!-- Clinical Gradient Divider -->
<div class="w-[60px] h-[1.5px] bg-gradient-to-r from-transparent via-primary-container to-transparent opacity-80"></div>
</div>
</div>
<!-- Aesthetic Branding Overlay (Optional - High End Editorial feel) -->
<div class="absolute bottom-12 right-12 opacity-30">
<p class="font-label text-[10px] uppercase tracking-[0.5em] text-secondary">
                Clinical Precision — Emotional Insight
            </p>
</div>
</main>
<!-- Invisible Metadata for Content Generation -->
<div class="hidden">
<div data-alt="minimalist cinematic studio shot with deep navy background and soft teal atmospheric lighting reflecting clinical precision and medical tech elegance"></div>
</div>
