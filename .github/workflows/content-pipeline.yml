name: Automated Content Pipeline

on:
  schedule:
    # 10:03 AM Berlin (9:03 AM UTC) — morning run
    - cron: '3 9 * * *'
    # 10:03 PM Berlin (9:03 PM UTC) — evening run
    - cron: '3 21 * * *'
  workflow_dispatch: # Allow manual trigger from GitHub UI

permissions:
  contents: write

jobs:
  build-content:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Python dependencies
        run: |
          pip install flask google-auth google-api-python-client

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Claude Code CLI
        run: npm install -g @anthropic-ai/claude-code

      - name: Write Google service account key
        run: |
          mkdir -p /home/runner/.config/gcloud
          echo '${{ secrets.GOOGLE_SA_KEY }}' > /home/runner/.config/gcloud/healthcalc-sa-key.json

      - name: Configure git
        run: |
          git config user.name "Claude"
          git config user.email "noreply@anthropic.com"

      - name: Write pipeline prompt
        run: |
          cat > /tmp/pipeline-prompt.txt <<'PROMPT'
          You are executing an automated content pipeline for healthcalculators.xyz.
          No human in the loop. Quality over quantity.

          Google SA key: /home/runner/.config/gcloud/healthcalc-sa-key.json

          Read the full pipeline instructions at tools/content_pipeline_prompt.md and follow every phase:

          PHASE 1 - RESEARCH:
          1. List existing calculator routes to avoid duplicates:
             python3 -c "from app import app; routes = sorted([r.rule for r in app.url_map.iter_rules() if 'GET' in r.methods and not r.rule.startswith('/static')]); [print(r) for r in routes]"
          2. Use the Bash tool to query Keywords Everywhere API for candidate keywords:
             curl -s -X POST https://api.keywordseverywhere.com/v1/get_keyword_data -H "Authorization: Bearer $KEYWORDS_EVERYWHERE_KEY" -H "Content-Type: application/json" -d '{"country":"us","currency":"USD","dataSource":"gkp","kw":["keyword1","keyword2"]}'
          3. Use WebSearch to find trending niche health calculator ideas and check SERPs
          4. Pick ONE calculator (vol>100, comp<0.15, indie SERP, not already built) + one companion guide

          PHASE 2 - BUILD CALCULATOR:
          - Create JS file at static/js/{name}.js with proper calculation logic
          - Create Jinja2 template at templates/{name}.html (use templates/caffeine_half_life_calculator.html as quality reference)
          - Add Flask route to app.py with schema_type, breadcrumb_category, date_modified
          - Add card entry to app.py cards array
          - Add node to static/js/content-loops.js with 3-5 cross-links
          - Add to static/public/sitemap.xml
          - Verify: python3 -c "from app import app; c=app.test_client(); r=c.get('/url'); assert r.status_code==200"

          PHASE 3 - BUILD COMPANION GUIDE:
          - Create template at templates/resources/{name}.html (1000-2000 words, real citations)
          - Add Flask route + articles entry in app.py
          - Add to sitemap.xml
          - Verify 200 status

          PHASE 3.5 - SMOKE TEST (MANDATORY before push):
          - Run: python3 tools/smoke_test.py
          - If ANY route fails, fix the issue, do NOT push broken code.

          PHASE 4 - PUBLISH:
          - git add the specific new/changed files (NOT git add -A)
          - git commit with message including "Co-Authored-By: Claude Opus 4.6 <noreply@anthropic.com>"
          - git push origin main
          - Submit new URLs to Google Indexing API using the service account key at /home/runner/.config/gcloud/healthcalc-sa-key.json
          - Run: python3 tools/indexnow_submit.py
          - Log to tools/pipeline_log.txt

          PHASE 5 - NOTIFY:
          Run: python3 tools/notify.py "HealthCalc Pipeline: New content built" "Summary of what was built. Render will auto-deploy."

          CRITICAL RULES:
          - Quality over quantity. Skip if no good topic found. Log why.
          - Real medical/scientific sources only.
          - Every calculator needs input validation, FAQ section, methodology.
          - If any phase fails, log the error and stop.
          PROMPT

      - name: Run content pipeline
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          KEYWORDS_EVERYWHERE_KEY: ${{ secrets.KEYWORDS_EVERYWHERE_KEY }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
        run: |
          cat /tmp/pipeline-prompt.txt | claude --dangerously-skip-permissions -p

      - name: Push any remaining changes
        run: |
          git diff --quiet && git diff --cached --quiet || (git add -A && git commit -m "Pipeline: auto-commit remaining changes" && git push origin main) || echo "Nothing additional to push"
