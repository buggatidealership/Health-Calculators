<svg width="800" height="400" xmlns="http://www.w3.org/2000/svg">
  <rect width="100%" height="100%" fill="#f0f0f0"/>
  <text x="50%" y="50%" font-family="Arial, sans-serif" font-size="24" text-anchor="middle" fill="#666">Ozempic Weight Loss Curve</text>
  <text x="50%" y="54%" font-family="Arial, sans-serif" font-size="16" text-anchor="middle" fill="#999">(Placeholder Image)</text>
  
  <!-- Graph elements -->
  <line x1="100" y1="300" x2="700" y2="300" stroke="#333" stroke-width="2"/>
  <line x1="100" y1="300" x2="100" y2="100" stroke="#333" stroke-width="2"/>
  
  <!-- Curve representing weight loss -->
  <path d="M100,300 Q250,280 300,240 T500,150 T700,100" stroke="#d63384" stroke-width="4" fill="none"/>
  
  <!-- X-axis labels -->
  <text x="100" y="330" font-family="Arial, sans-serif" font-size="14" text-anchor="middle" fill="#666">0</text>
  <text x="250" y="330" font-family="Arial, sans-serif" font-size="14" text-anchor="middle" fill="#666">20</text>
  <text x="400" y="330" font-family="Arial, sans-serif" font-size="14" text-anchor="middle" fill="#666">40</text>
  <text x="550" y="330" font-family="Arial, sans-serif" font-size="14" text-anchor="middle" fill="#666">60</text>
  <text x="700" y="330" font-family="Arial, sans-serif" font-size="14" text-anchor="middle" fill="#666">80</text>
  <text x="400" y="360" font-family="Arial, sans-serif" font-size="16" text-anchor="middle" fill="#666">Weeks on Treatment</text>
  
  <!-- Y-axis labels -->
  <text x="80" y="300" font-family="Arial, sans-serif" font-size="14" text-anchor="end" fill="#666">0%</text>
  <text x="80" y="250" font-family="Arial, sans-serif" font-size="14" text-anchor="end" fill="#666">-5%</text>
  <text x="80" y="200" font-family="Arial, sans-serif" font-size="14" text-anchor="end" fill="#666">-10%</text>
  <text x="80" y="150" font-family="Arial, sans-serif" font-size="14" text-anchor="end" fill="#666">-15%</text>
  <text x="80" y="100" font-family="Arial, sans-serif" font-size="14" text-anchor="end" fill="#666">-20%</text>
  <text x="50" y="200" font-family="Arial, sans-serif" font-size="16" text-anchor="middle" fill="#666" transform="rotate(-90 50,200)">Weight Loss (%)</text>
</svg>