<svg width="800" height="400" xmlns="http://www.w3.org/2000/svg">
  <rect width="100%" height="100%" fill="#f0f0f0"/>
  <text x="50%" y="50%" font-family="Arial, sans-serif" font-size="24" text-anchor="middle" fill="#666">Ozempic Dosage Progression</text>
  <text x="50%" y="54%" font-family="Arial, sans-serif" font-size="16" text-anchor="middle" fill="#999">(Placeholder Image)</text>
  
  <!-- Timeline elements -->
  <line x1="100" y1="200" x2="700" y2="200" stroke="#333" stroke-width="2"/>
  
  <!-- Dosage markers -->
  <circle cx="150" cy="200" r="8" fill="#be2d73"/>
  <circle cx="300" cy="200" r="8" fill="#be2d73"/>
  <circle cx="450" cy="200" r="8" fill="#be2d73"/>
  <circle cx="600" cy="200" r="8" fill="#be2d73"/>
  
  <!-- Dosage labels -->
  <text x="150" y="180" font-family="Arial, sans-serif" font-size="14" text-anchor="middle" fill="#666">0.25mg</text>
  <text x="300" y="180" font-family="Arial, sans-serif" font-size="14" text-anchor="middle" fill="#666">0.5mg</text>
  <text x="450" y="180" font-family="Arial, sans-serif" font-size="14" text-anchor="middle" fill="#666">1.0mg</text>
  <text x="600" y="180" font-family="Arial, sans-serif" font-size="14" text-anchor="middle" fill="#666">2.4mg</text>
  
  <!-- Week labels -->
  <text x="150" y="230" font-family="Arial, sans-serif" font-size="14" text-anchor="middle" fill="#666">Week 1-4</text>
  <text x="300" y="230" font-family="Arial, sans-serif" font-size="14" text-anchor="middle" fill="#666">Week 5-8</text>
  <text x="450" y="230" font-family="Arial, sans-serif" font-size="14" text-anchor="middle" fill="#666">Week 9-16</text>
  <text x="600" y="230" font-family="Arial, sans-serif" font-size="14" text-anchor="middle" fill="#666">Week 17+</text>
  
  <!-- Weight loss indicators -->
  <text x="150" y="260" font-family="Arial, sans-serif" font-size="14" text-anchor="middle" fill="#666">-1.5%</text>
  <text x="300" y="260" font-family="Arial, sans-serif" font-size="14" text-anchor="middle" fill="#666">-4.8%</text>
  <text x="450" y="260" font-family="Arial, sans-serif" font-size="14" text-anchor="middle" fill="#666">-9.6%</text>
  <text x="600" y="260" font-family="Arial, sans-serif" font-size="14" text-anchor="middle" fill="#666">-15.3%</text>
  
  <!-- Vertical lines -->
  <line x1="150" y1="160" x2="150" y2="270" stroke="#999" stroke-width="1" stroke-dasharray="5,5"/>
  <line x1="300" y1="160" x2="300" y2="270" stroke="#999" stroke-width="1" stroke-dasharray="5,5"/>
  <line x1="450" y1="160" x2="450" y2="270" stroke="#999" stroke-width="1" stroke-dasharray="5,5"/>
  <line x1="600" y1="160" x2="600" y2="270" stroke="#999" stroke-width="1" stroke-dasharray="5,5"/>
  
  <!-- Title at the bottom -->
  <text x="400" y="320" font-family="Arial, sans-serif" font-size="16" text-anchor="middle" fill="#666">Typical Weight Loss Timeline with Ozempic/Wegovy</text>
</svg>