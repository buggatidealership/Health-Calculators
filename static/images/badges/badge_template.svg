  <!-- Inner Circle -->
  <circle cx="100" cy="100" r="78" fill="#ffffff" />
  
  <!-- Badge Content Placeholder -->
  <circle cx="100" cy="100" r="70" fill="#f5f5f5" />
  
  <!-- Badge Icon Placeholder -->
  <text x="100" y="115" font-family="Arial, sans-serif" font-size="60" text-anchor="middle" fill="#d63384">
    🏆
  </text>
  
  <!-- Badge Border Decoration -->
  <circle cx="100" cy="100" r="90" fill="none" stroke="#d63384" stroke-width="3" />
  
  <!-- Badge Shine Effect -->
