<?xml version="1.0" encoding="UTF-8"?>
<svg width="200" height="200" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <!-- Badge Circle -->
  <circle cx="100" cy="100" r="90" fill="#d63384" />
  
  <!-- Inner Circle -->
  <circle cx="100" cy="100" r="78" fill="#ffffff" />
  
  <!-- Badge Content -->
  <circle cx="100" cy="100" r="70" fill="#ffeef4" />
  
  <!-- Badge Icon: Clock -->
  <g transform="translate(50, 50)">
    <!-- Clock Base -->
    <circle cx="50" cy="50" r="45" fill="#f5f5f5" stroke="#333" stroke-width="2" />
    
    <!-- Clock Markings -->
    <line x1="50" y1="15" x2="50" y2="25" stroke="#333" stroke-width="2" stroke-linecap="round" />
    <line x1="50" y1="75" x2="50" y2="85" stroke="#333" stroke-width="2" stroke-linecap="round" />
    <line x1="15" y1="50" x2="25" y2="50" stroke="#333" stroke-width="2" stroke-linecap="round" />
    <line x1="75" y1="50" x2="85" y2="50" stroke="#333" stroke-width="2" stroke-linecap="round" />
    
    <!-- Clock Hands -->
    <line x1="50" y1="50" x2="50" y2="30" stroke="#d63384" stroke-width="4" stroke-linecap="round" />
    <line x1="50" y1="50" x2="70" y2="50" stroke="#333" stroke-width="2" stroke-linecap="round" />
    
    <!-- Center Point -->
    <circle cx="50" cy="50" r="3" fill="#333" />
  </g>
  
  <!-- Badge Border -->
  <circle cx="100" cy="100" r="90" fill="none" stroke="#d63384" stroke-width="3" />
  
  <!-- Badge Shine -->
  <ellipse cx="75" cy="65" rx="60" ry="40" fill="#ffffff" opacity="0.2" />
  
  <!-- Badge Text -->
  <text x="100" y="150" font-family="Arial, sans-serif" font-size="16" font-weight="bold" text-anchor="middle" fill="#d63384">
    FASTING EXPLORER
  </text>
</svg>