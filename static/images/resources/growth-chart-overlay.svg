<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg width="800" height="400" viewBox="0 0 800 400" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="800" height="400" fill="#f5f5f5" rx="8" ry="8" />
  
  <!-- Grid Lines -->
  <g stroke="#ddd" stroke-width="1">
    <!-- Vertical grid lines -->
    <line x1="100" y1="40" x2="100" y2="320" />
    <line x1="200" y1="40" x2="200" y2="320" />
    <line x1="300" y1="40" x2="300" y2="320" />
    <line x1="400" y1="40" x2="400" y2="320" />
    <line x1="500" y1="40" x2="500" y2="320" />
    <line x1="600" y1="40" x2="600" y2="320" />
    <line x1="700" y1="40" x2="700" y2="320" />
    
    <!-- Horizontal grid lines -->
    <line x1="100" y1="80" x2="700" y2="80" />
    <line x1="100" y1="120" x2="700" y2="120" />
    <line x1="100" y1="160" x2="700" y2="160" />
    <line x1="100" y1="200" x2="700" y2="200" />
    <line x1="100" y1="240" x2="700" y2="240" />
    <line x1="100" y1="280" x2="700" y2="280" />
  </g>
  
  <!-- Growth Chart Axes -->
  <line x1="100" y1="320" x2="700" y2="320" stroke="#333" stroke-width="2" />
  <line x1="100" y1="40" x2="100" y2="320" stroke="#333" stroke-width="2" />
  
  <!-- X Axis Labels (Age) -->
  <text x="100" y="345" text-anchor="middle" font-family="Arial" font-size="12" fill="#333">0</text>
  <text x="200" y="345" text-anchor="middle" font-family="Arial" font-size="12" fill="#333">2</text>
  <text x="300" y="345" text-anchor="middle" font-family="Arial" font-size="12" fill="#333">4</text>
  <text x="400" y="345" text-anchor="middle" font-family="Arial" font-size="12" fill="#333">6</text>
  <text x="500" y="345" text-anchor="middle" font-family="Arial" font-size="12" fill="#333">8</text>
  <text x="600" y="345" text-anchor="middle" font-family="Arial" font-size="12" fill="#333">10</text>
  <text x="700" y="345" text-anchor="middle" font-family="Arial" font-size="12" fill="#333">12</text>
  <text x="400" y="370" text-anchor="middle" font-family="Arial" font-size="14" fill="#333" font-weight="bold">Age (Years)</text>
  
  <!-- Y Axis Labels (Height) -->
  <text x="90" y="320" text-anchor="end" font-family="Arial" font-size="12" fill="#333">80</text>
  <text x="90" y="280" text-anchor="end" font-family="Arial" font-size="12" fill="#333">90</text>
  <text x="90" y="240" text-anchor="end" font-family="Arial" font-size="12" fill="#333">100</text>
  <text x="90" y="200" text-anchor="end" font-family="Arial" font-size="12" fill="#333">110</text>
  <text x="90" y="160" text-anchor="end" font-family="Arial" font-size="12" fill="#333">120</text>
  <text x="90" y="120" text-anchor="end" font-family="Arial" font-size="12" fill="#333">130</text>
  <text x="90" y="80" text-anchor="end" font-family="Arial" font-size="12" fill="#333">140</text>
  <text x="90" y="40" text-anchor="end" font-family="Arial" font-size="12" fill="#333">150</text>
  <text x="50" y="180" text-anchor="middle" font-family="Arial" font-size="14" fill="#333" font-weight="bold" transform="rotate(-90, 50, 180)">Height (cm)</text>
  
  <!-- Percentile Curves -->
  <!-- 95th percentile (blue) -->
  <path d="M100,280 Q150,270 200,245 Q250,220 300,195 Q350,170 400,145 Q450,120 500,95 Q550,70 600,50 Q650,35 700,25" stroke="#2196F3" stroke-width="3" fill="none" />
  
  <!-- 75th percentile (light blue) -->
  <path d="M100,290 Q150,280 200,260 Q250,240 300,220 Q350,200 400,180 Q450,160 500,140 Q550,120 600,100 Q650,85 700,70" stroke="#64B5F6" stroke-width="2" fill="none" />
  
  <!-- 50th percentile (green) -->
  <path d="M100,300 Q150,290 200,275 Q250,260 300,240 Q350,220 400,200 Q450,180 500,160 Q550,140 600,120 Q650,100 700,90" stroke="#4CAF50" stroke-width="3" fill="none" />
  
  <!-- 25th percentile (orange) -->
  <path d="M100,305 Q150,295 200,285 Q250,275 300,255 Q350,235 400,215 Q450,195 500,175 Q550,155 600,135 Q650,120 700,110" stroke="#FFA726" stroke-width="2" fill="none" />
  
  <!-- 5th percentile (red) -->
  <path d="M100,310 Q150,305 200,295 Q250,285 300,270 Q350,255 400,235 Q450,215 500,195 Q550,175 600,155 Q650,140 700,130" stroke="#F44336" stroke-width="3" fill="none" />
  
  <!-- Individual Child's Growth Track (with dots at measurement points) -->
  <path d="M100,302 L200,278 L300,245 L400,207 L500,166 L600,125 L700,94" stroke="#9C27B0" stroke-width="2.5" stroke-dasharray="5,5" fill="none" />
  
  <!-- Measurement points -->
  <circle cx="100" cy="302" r="5" fill="#9C27B0" />
  <circle cx="200" cy="278" r="5" fill="#9C27B0" />
  <circle cx="300" cy="245" r="5" fill="#9C27B0" />
  <circle cx="400" cy="207" r="5" fill="#9C27B0" />
  <circle cx="500" cy="166" r="5" fill="#9C27B0" />
  <circle cx="600" cy="125" r="5" fill="#9C27B0" />
  <circle cx="700" cy="94" r="5" fill="#9C27B0" />
  
  <!-- Future Growth Prediction (dotted extension) -->
  <path d="M700,94 Q725,80 750,68 Q775,55 800,42" stroke="#9C27B0" stroke-width="2.5" stroke-dasharray="5,5" fill="none" />
  
  <!-- Prediction Range (light purple shading) -->
  <path d="M700,94 Q725,80 750,68 Q775,55 800,42 L800,62 Q775,75 750,85 Q725,97 700,110 Z" fill="#CE93D8" fill-opacity="0.3" />
  
  <!-- Legend -->
  <rect x="550" y="15" width="180" height="130" fill="white" stroke="#ddd" rx="5" ry="5" />
  
  <!-- Legend Title -->
  <text x="640" y="35" text-anchor="middle" font-family="Arial" font-size="14" fill="#333" font-weight="bold">Percentiles</text>
  
  <!-- Legend Items -->
  <line x1="560" y1="50" x2="580" y2="50" stroke="#F44336" stroke-width="3" />
  <text x="585" y="54" font-family="Arial" font-size="12" fill="#333">5th</text>
  
  <line x1="560" y1="70" x2="580" y2="70" stroke="#FFA726" stroke-width="2" />
  <text x="585" y="74" font-family="Arial" font-size="12" fill="#333">25th</text>
  
  <line x1="560" y1="90" x2="580" y2="90" stroke="#4CAF50" stroke-width="3" />
  <text x="585" y="94" font-family="Arial" font-size="12" fill="#333">50th (Median)</text>
  
  <line x1="560" y1="110" x2="580" y2="110" stroke="#64B5F6" stroke-width="2" />
  <text x="585" y="114" font-family="Arial" font-size="12" fill="#333">75th</text>
  
  <line x1="560" y1="130" x2="580" y2="130" stroke="#2196F3" stroke-width="3" />
  <text x="585" y="134" font-family="Arial" font-size="12" fill="#333">95th</text>
  
  <line x1="630" y1="50" x2="650" y2="50" stroke="#9C27B0" stroke-width="2.5" stroke-dasharray="5,5" />
  <circle cx="640" cy="50" r="3" fill="#9C27B0" />
  <text x="655" y="54" font-family="Arial" font-size="12" fill="#333">Child's Growth</text>
  
  <!-- Prediction arrow and label -->
  <path d="M715,94 L740,60" stroke="#333" stroke-width="1" />
  <text x="715" y="50" font-family="Arial" font-size="11" fill="#333" font-weight="bold">Predicted Height</text>
  <text x="715" y="65" font-family="Arial" font-size="11" fill="#333" font-weight="bold">Range</text>
  
  <!-- Chart Title -->
  <text x="400" y="25" text-anchor="middle" font-family="Arial" font-size="18" fill="#333" font-weight="bold">Child Growth Chart with Height Prediction</text>
</svg>