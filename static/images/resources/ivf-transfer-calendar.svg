<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg width="800" height="500" viewBox="0 0 800 500" xmlns="http://www.w3.org/2000/svg">
  <style>
    .title { font-family: Arial, sans-serif; font-size: 24px; font-weight: bold; fill: #333; }
    .subtitle { font-family: Arial, sans-serif; font-size: 16px; fill: #666; }
    .timeline { stroke: #d63384; stroke-width: 4; }
    .timeline-bg { fill: #f8f2f6; }
    .milestone { fill: #d63384; }
    .milestone-text { font-family: Arial, sans-serif; font-size: 14px; font-weight: bold; fill: #333; }
    .milestone-day { font-family: Arial, sans-serif; font-size: 12px; fill: #666; }
    .milestone-date { font-family: Arial, sans-serif; font-size: 12px; fill: #666; }
    .legend-title { font-family: Arial, sans-serif; font-size: 16px; font-weight: bold; fill: #333; }
    .legend-text { font-family: Arial, sans-serif; font-size: 14px; fill: #333; }
    .comparison-title { font-family: Arial, sans-serif; font-size: 18px; font-weight: bold; fill: #333; }
    .comparison-cell-header { font-family: Arial, sans-serif; font-size: 14px; font-weight: bold; fill: #fff; }
    .comparison-cell { font-family: Arial, sans-serif; font-size: 14px; fill: #333; }
    .fresh-color { fill: #20c997; }
    .frozen-color { fill: #6f42c1; }
    .note-text { font-family: Arial, sans-serif; font-size: 12px; font-style: italic; fill: #666; }
  </style>
  
  <!-- Title and Subtitle -->
  <text x="400" y="40" class="title" text-anchor="middle">IVF Due Date Calculation Timeline</text>
  <text x="400" y="70" class="subtitle" text-anchor="middle">How embryo transfer days affect your pregnancy timeline and due date</text>
  
  <!-- Timeline Background -->
  <rect x="100" y="120" width="600" height="100" rx="10" class="timeline-bg" />
  
  <!-- Timeline Line -->
  <line x1="150" y1="170" x2="650" y2="170" class="timeline" />
  
  <!-- Milestones for FET Day 5 Timeline -->
  <!-- Transfer Day -->
  <circle cx="150" cy="170" r="10" class="milestone" />
  <text x="150" y="140" class="milestone-text" text-anchor="middle">Embryo Transfer</text>
  <text x="150" y="155" class="milestone-day" text-anchor="middle">Day 0</text>
  <text x="150" y="200" class="milestone-date" text-anchor="middle">Mar 1, 2023</text>
  
  <!-- Implantation -->
  <circle cx="220" cy="170" r="8" class="milestone" />
  <text x="220" y="140" class="milestone-text" text-anchor="middle">Implantation</text>
  <text x="220" y="155" class="milestone-day" text-anchor="middle">Days 1-5</text>
  <text x="220" y="200" class="milestone-date" text-anchor="middle">Mar 2-6</text>
  
  <!-- Beta hCG Test -->
  <circle cx="290" cy="170" r="8" class="milestone" />
  <text x="290" y="140" class="milestone-text" text-anchor="middle">Beta hCG Test</text>
  <text x="290" y="155" class="milestone-day" text-anchor="middle">Days 9-12</text>
  <text x="290" y="200" class="milestone-date" text-anchor="middle">Mar 10-13</text>
  
  <!-- First Ultrasound -->
  <circle cx="360" cy="170" r="8" class="milestone" />
  <text x="360" y="140" class="milestone-text" text-anchor="middle">First Ultrasound</text>
  <text x="360" y="155" class="milestone-day" text-anchor="middle">Weeks 6-7</text>
  <text x="360" y="200" class="milestone-date" text-anchor="middle">Apr 12-19</text>
  
  <!-- NIPT Test Window -->
  <circle cx="430" cy="170" r="8" class="milestone" />
  <text x="430" y="140" class="milestone-text" text-anchor="middle">NIPT Testing</text>
  <text x="430" y="155" class="milestone-day" text-anchor="middle">Weeks 10-13</text>
  <text x="430" y="200" class="milestone-date" text-anchor="middle">May 10-31</text>
  
  <!-- Anatomy Scan -->
  <circle cx="500" cy="170" r="8" class="milestone" />
  <text x="500" y="140" class="milestone-text" text-anchor="middle">Anatomy Scan</text>
  <text x="500" y="155" class="milestone-day" text-anchor="middle">Weeks 18-22</text>
  <text x="500" y="200" class="milestone-date" text-anchor="middle">Jul 5-Aug 2</text>
  
  <!-- Due Date -->
  <circle cx="650" cy="170" r="10" class="milestone" />
  <text x="650" y="140" class="milestone-text" text-anchor="middle">Due Date</text>
  <text x="650" y="155" class="milestone-day" text-anchor="middle">Week 40</text>
  <text x="650" y="200" class="milestone-date" text-anchor="middle">Nov 22, 2023</text>
  
  <!-- Legend -->
  <rect x="100" y="250" width="600" height="80" rx="8" fill="#f8f8f8" stroke="#ddd" stroke-width="1" />
  <text x="120" y="280" class="legend-title">How to Calculate:</text>
  <text x="120" y="305" class="legend-text">• For Day 5 FET: Transfer date + 261 days = due date (37 weeks + 2 days from transfer)</text>
  <text x="120" y="330" class="legend-text">• For Day 3 FET: Transfer date + 263 days = due date (37 weeks + 4 days from transfer)</text>
  
  <!-- Comparison Table -->
  <text x="400" y="370" class="comparison-title" text-anchor="middle">Due Date Calculation: Fresh vs. Frozen Embryo Transfer</text>
  
  <!-- Table Headers -->
  <rect x="150" y="390" width="150" height="30" rx="4" fill="#f8f8f8" stroke="#ddd" stroke-width="1" />
  <text x="225" y="410" class="comparison-cell" text-anchor="middle">Transfer Type</text>
  
  <rect x="300" y="390" width="150" height="30" rx="4" class="fresh-color" />
  <text x="375" y="410" class="comparison-cell-header" text-anchor="middle">Fresh Transfer</text>
  
  <rect x="450" y="390" width="150" height="30" rx="4" class="frozen-color" />
  <text x="525" y="410" class="comparison-cell-header" text-anchor="middle">Frozen Transfer (FET)</text>
  
  <!-- Table Rows -->
  <!-- Day 3 Embryo -->
  <rect x="150" y="420" width="150" height="30" rx="0" fill="#f8f8f8" stroke="#ddd" stroke-width="1" />
  <text x="225" y="440" class="comparison-cell" text-anchor="middle">Day 3 Embryo</text>
  
  <rect x="300" y="420" width="150" height="30" rx="0" fill="#ffffff" stroke="#ddd" stroke-width="1" />
  <text x="375" y="440" class="comparison-cell" text-anchor="middle">Retrieval + 266 days</text>
  
  <rect x="450" y="420" width="150" height="30" rx="0" fill="#ffffff" stroke="#ddd" stroke-width="1" />
  <text x="525" y="440" class="comparison-cell" text-anchor="middle">Transfer + 263 days</text>
  
  <!-- Day 5 Embryo -->
  <rect x="150" y="450" width="150" height="30" rx="0" fill="#f8f8f8" stroke="#ddd" stroke-width="1" />
  <text x="225" y="470" class="comparison-cell" text-anchor="middle">Day 5 Embryo</text>
  
  <rect x="300" y="450" width="150" height="30" rx="0" fill="#ffffff" stroke="#ddd" stroke-width="1" />
  <text x="375" y="470" class="comparison-cell" text-anchor="middle">Retrieval + 266 days</text>
  
  <rect x="450" y="450" width="150" height="30" rx="0" fill="#ffffff" stroke="#ddd" stroke-width="1" />
  <text x="525" y="470" class="comparison-cell" text-anchor="middle">Transfer + 261 days</text>
  
  <!-- Note -->
  <text x="400" y="495" class="note-text" text-anchor="middle">Note: These calculations reflect standard obstetric dating conventions. Individual clinical guidance may vary.</text>
</svg>