<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg width="800" height="500" viewBox="0 0 800 500" xmlns="http://www.w3.org/2000/svg">
  <style>
    .title { font-family: Arial, sans-serif; font-size: 24px; font-weight: bold; fill: #333; }
    .subtitle { font-family: Arial, sans-serif; font-size: 16px; fill: #666; }
    .timeline-header { font-family: Arial, sans-serif; font-size: 18px; font-weight: bold; fill: #333; }
    .method-label { font-family: Arial, sans-serif; font-size: 16px; font-weight: bold; fill: #333; }
    .date-label { font-family: Arial, sans-serif; font-size: 14px; fill: #666; }
    .event-label { font-family: Arial, sans-serif; font-size: 14px; fill: #444; }
    .note-text { font-family: Arial, sans-serif; font-size: 12px; fill: #888; font-style: italic; }
    .timeline-line { stroke: #ddd; stroke-width: 2; }
    .timeline-dot { fill: #d63384; stroke: none; }
    .timeline-arrow { fill: #d63384; stroke: none; }
    .fresh-transfer { fill: #d63384; fill-opacity: 0.1; stroke: #d63384; stroke-width: 1; }
    .frozen-transfer { fill: #0d6efd; fill-opacity: 0.1; stroke: #0d6efd; stroke-width: 1; }
    .milestone-label { font-family: Arial, sans-serif; font-size: 13px; fill: #333; }
    .fresh-section-title { font-family: Arial, sans-serif; font-size: 16px; fill: #d63384; font-weight: bold; }
    .frozen-section-title { font-family: Arial, sans-serif; font-size: 16px; fill: #0d6efd; font-weight: bold; }
    .legend-text { font-family: Arial, sans-serif; font-size: 14px; fill: #333; }
  </style>
  
  <!-- Title and Subtitle -->
  <text x="400" y="40" class="title" text-anchor="middle">IVF Due Date Timeline Comparison</text>
  <text x="400" y="70" class="subtitle" text-anchor="middle">Fresh vs. Frozen Embryo Transfers and Key Pregnancy Milestones</text>
  
  <!-- Legend -->
  <g transform="translate(40, 100)">
    <rect x="0" y="0" width="20" height="10" fill="#d63384" fill-opacity="0.1" stroke="#d63384" stroke-width="1" />
    <text x="30" y="9" class="legend-text">Fresh Embryo Transfer</text>
    
    <rect x="220" y="0" width="20" height="10" fill="#0d6efd" fill-opacity="0.1" stroke="#0d6efd" stroke-width="1" />
    <text x="250" y="9" class="legend-text">Frozen Embryo Transfer</text>
    
    <rect x="470" y="0" width="20" height="10" fill="#fff" stroke="#bbb" stroke-width="1" />
    <text x="500" y="9" class="legend-text">Key Pregnancy Milestones</text>
  </g>
  
  <!-- Timeline Headers -->
  <text x="250" y="150" class="timeline-header">Fresh IVF Cycle</text>
  <text x="600" y="150" class="timeline-header">Frozen Embryo Transfer (FET)</text>
  
  <!-- Fresh Transfer Timeline -->
  <g transform="translate(40, 180)">
    <!-- Timeline Line -->
    <line x1="0" y1="0" x2="400" y2="0" class="timeline-line" />
    
    <!-- Timeline Events -->
    <g transform="translate(0, 0)">
      <circle cx="0" cy="0" r="6" class="timeline-dot" />
      <text x="0" y="-20" class="event-label" text-anchor="middle">Egg Retrieval</text>
      <text x="0" y="-35" class="date-label" text-anchor="middle">(Start Date)</text>
    </g>
    
    <g transform="translate(60, 0)">
      <circle cx="0" cy="0" r="6" class="timeline-dot" />
      <text x="0" y="25" class="event-label" text-anchor="middle">3-Day Transfer</text>
      <text x="0" y="40" class="date-label" text-anchor="middle">(+3 days)</text>
    </g>
    
    <g transform="translate(100, 0)">
      <circle cx="0" cy="0" r="6" class="timeline-dot" />
      <text x="0" y="-20" class="event-label" text-anchor="middle">5-Day Transfer</text>
      <text x="0" y="-35" class="date-label" text-anchor="middle">(+5 days)</text>
    </g>
    
    <g transform="translate(180, 0)">
      <circle cx="0" cy="0" r="6" class="timeline-dot" />
      <text x="0" y="25" class="event-label" text-anchor="middle">First Ultrasound</text>
      <text x="0" y="40" class="date-label" text-anchor="middle">(~4-6 weeks)</text>
    </g>
    
    <g transform="translate(300, 0)">
      <circle cx="0" cy="0" r="6" class="timeline-dot" />
      <text x="0" y="-20" class="event-label" text-anchor="middle">NIPT Testing</text>
      <text x="0" y="-35" class="date-label" text-anchor="middle">(10-14 weeks)</text>
    </g>
    
    <g transform="translate(400, 0)">
      <circle cx="0" cy="0" r="6" class="timeline-dot" />
      <text x="0" y="25" class="event-label" text-anchor="middle">Due Date</text>
      <text x="0" y="40" class="date-label" text-anchor="middle">(266 days from retrieval)</text>
    </g>
    
    <!-- Conception to Delivery Period -->
    <rect x="0" y="-10" width="400" height="20" rx="5" class="fresh-transfer" />
    <text x="200" y="-50" class="fresh-section-title" text-anchor="middle">Fresh Embryo Timeline: 38 weeks (266 days) from Retrieval</text>
  </g>
  
  <!-- Frozen Transfer Timeline -->
  <g transform="translate(40, 300)">
    <!-- Timeline Line -->
    <line x1="0" y1="0" x2="400" y2="0" class="timeline-line" />
    
    <!-- Timeline Events -->
    <g transform="translate(0, 0)">
      <circle cx="0" cy="0" r="6" class="timeline-dot" />
      <text x="0" y="-20" class="event-label" text-anchor="middle">FET Date</text>
      <text x="0" y="-35" class="date-label" text-anchor="middle">(Start Date)</text>
    </g>
    
    <g transform="translate(80, 0)">
      <circle cx="0" cy="0" r="6" class="timeline-dot" />
      <text x="0" y="25" class="event-label" text-anchor="middle">First Ultrasound</text>
      <text x="0" y="40" class="date-label" text-anchor="middle">(~4 weeks)</text>
    </g>
    
    <g transform="translate(200, 0)">
      <circle cx="0" cy="0" r="6" class="timeline-dot" />
      <text x="0" y="-20" class="event-label" text-anchor="middle">NIPT Testing</text>
      <text x="0" y="-35" class="date-label" text-anchor="middle">(10-14 weeks)</text>
    </g>
    
    <g transform="translate(400, 0)">
      <circle cx="0" cy="0" r="6" class="timeline-dot" />
      <text x="0" y="25" class="event-label" text-anchor="middle">Due Date</text>
      <text x="0" y="40" class="date-label" text-anchor="middle">For Day 5 Embryo: 261 days</text>
    </g>
    
    <!-- FET to Delivery Period -->
    <rect x="0" y="-10" width="400" height="20" rx="5" class="frozen-transfer" />
    <text x="200" y="-50" class="frozen-section-title" text-anchor="middle">FET Timeline: Adjusted Based on Embryo Age (Day 3 vs. Day 5)</text>
  </g>
  
  <!-- Day 3 vs Day 5 Embryo Comparison -->
  <g transform="translate(500, 360)">
    <rect x="-110" y="0" width="220" height="100" rx="5" fill="#f8f8f8" stroke="#ddd" stroke-width="1" />
    <text x="0" y="25" class="method-label" text-anchor="middle">Due Date Formulas</text>
    
    <text x="-95" y="50" class="event-label" text-anchor="start">Day 3 Embryo:</text>
    <text x="95" y="50" class="date-label" text-anchor="end">266 days from transfer</text>
    
    <text x="-95" y="75" class="event-label" text-anchor="start">Day 5 Embryo:</text>
    <text x="95" y="75" class="date-label" text-anchor="end">261 days from transfer</text>
    
    <text x="-95" y="95" class="event-label" text-anchor="start">Day 6 Embryo:</text>
    <text x="95" y="95" class="date-label" text-anchor="end">260 days from transfer</text>
  </g>
  
  <!-- Notes -->
  <text x="40" y="460" class="note-text">Note: IVF due dates are calculated based on embryo age and transfer date, providing more precision than natural conception dating.</text>
  <text x="40" y="480" class="note-text">OB-GYNs may adjust estimated due dates based on early ultrasound measurements for the most accurate predictions.</text>
</svg>
