<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg width="800" height="500" viewBox="0 0 800 500" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="800" height="500" fill="#f8fbff" rx="8" ry="8"/>
  
  <!-- Timeline background -->
  <rect x="50" y="180" width="700" height="140" rx="70" ry="70" fill="#e9effd"/>
  
  <!-- Timeline line -->
  <line x1="100" y1="250" x2="700" y2="250" stroke="#3f51b5" stroke-width="4" stroke-linecap="round"/>
  
  <!-- Title -->
  <text x="400" y="60" font-family="Arial, sans-serif" font-size="28" font-weight="bold" text-anchor="middle" fill="#333">IVF Pregnancy Timeline</text>
  <text x="400" y="90" font-family="Arial, sans-serif" font-size="16" text-anchor="middle" fill="#666">Key milestones from egg retrieval to birth</text>
  
  <!-- Timeline points -->
  <!-- Egg Retrieval -->
  <circle cx="100" cy="250" r="20" fill="#d63384"/>
  <text x="100" y="250" font-family="Arial, sans-serif" font-size="12" font-weight="bold" text-anchor="middle" fill="white">Day 0</text>
  <text x="100" y="200" font-family="Arial, sans-serif" font-size="14" font-weight="bold" text-anchor="middle" fill="#333">Egg Retrieval</text>
  <text x="100" y="170" font-family="Arial, sans-serif" font-size="12" text-anchor="middle" fill="#666">Fertilization begins</text>
  
  <!-- Embryo Transfer -->
  <circle cx="200" cy="250" r="20" fill="#3f51b5"/>
  <text x="200" y="250" font-family="Arial, sans-serif" font-size="12" font-weight="bold" text-anchor="middle" fill="white">D3/5</text>
  <text x="200" y="200" font-family="Arial, sans-serif" font-size="14" font-weight="bold" text-anchor="middle" fill="#333">Embryo Transfer</text>
  <text x="200" y="170" font-family="Arial, sans-serif" font-size="12" text-anchor="middle" fill="#666">Day 3 or Day 5</text>
  
  <!-- First hCG Test -->
  <circle cx="300" cy="250" r="20" fill="#3f51b5"/>
  <text x="300" y="250" font-family="Arial, sans-serif" font-size="12" font-weight="bold" text-anchor="middle" fill="white">D14</text>
  <text x="300" y="200" font-family="Arial, sans-serif" font-size="14" font-weight="bold" text-anchor="middle" fill="#333">First hCG Test</text>
  <text x="300" y="170" font-family="Arial, sans-serif" font-size="12" text-anchor="middle" fill="#666">Pregnancy confirmation</text>
  
  <!-- First Ultrasound -->
  <circle cx="400" cy="250" r="20" fill="#3f51b5"/>
  <text x="400" y="250" font-family="Arial, sans-serif" font-size="12" font-weight="bold" text-anchor="middle" fill="white">6w</text>
  <text x="400" y="300" font-family="Arial, sans-serif" font-size="14" font-weight="bold" text-anchor="middle" fill="#333">First Ultrasound</text>
  <text x="400" y="330" font-family="Arial, sans-serif" font-size="12" text-anchor="middle" fill="#666">Heartbeat visible</text>
  
  <!-- Graduation from RE -->
  <circle cx="500" cy="250" r="20" fill="#3f51b5"/>
  <text x="500" y="250" font-family="Arial, sans-serif" font-size="12" font-weight="bold" text-anchor="middle" fill="white">12w</text>
  <text x="500" y="300" font-family="Arial, sans-serif" font-size="14" font-weight="bold" text-anchor="middle" fill="#333">Graduate to OB</text>
  <text x="500" y="330" font-family="Arial, sans-serif" font-size="12" text-anchor="middle" fill="#666">End of first trimester</text>
  
  <!-- Anatomy Scan -->
  <circle cx="600" cy="250" r="20" fill="#3f51b5"/>
  <text x="600" y="250" font-family="Arial, sans-serif" font-size="12" font-weight="bold" text-anchor="middle" fill="white">20w</text>
  <text x="600" y="200" font-family="Arial, sans-serif" font-size="14" font-weight="bold" text-anchor="middle" fill="#333">Anatomy Scan</text>
  <text x="600" y="170" font-family="Arial, sans-serif" font-size="12" text-anchor="middle" fill="#666">Mid-pregnancy ultrasound</text>
  
  <!-- Due Date -->
  <circle cx="700" cy="250" r="20" fill="#d63384"/>
  <text x="700" y="250" font-family="Arial, sans-serif" font-size="12" font-weight="bold" text-anchor="middle" fill="white">40w</text>
  <text x="700" y="200" font-family="Arial, sans-serif" font-size="14" font-weight="bold" text-anchor="middle" fill="#333">Due Date</text>
  <text x="700" y="170" font-family="Arial, sans-serif" font-size="12" text-anchor="middle" fill="#666">Expected delivery</text>
  
  <!-- Legend -->
  <rect x="260" y="400" width="280" height="70" rx="8" ry="8" fill="white" stroke="#ddd" stroke-width="1"/>
  <text x="400" y="425" font-family="Arial, sans-serif" font-size="16" font-weight="bold" text-anchor="middle" fill="#333">Legend</text>
  
  <circle cx="300" cy="450" r="8" fill="#d63384"/>
  <text x="320" y="455" font-family="Arial, sans-serif" font-size="14" text-anchor="start" fill="#333">Key milestone</text>
  
  <circle cx="440" cy="450" r="8" fill="#3f51b5"/>
  <text x="460" y="455" font-family="Arial, sans-serif" font-size="14" text-anchor="start" fill="#333">Progress check</text>
  
  <!-- Footer note -->
  <text x="400" y="490" font-family="Arial, sans-serif" font-size="12" text-anchor="middle" fill="#666">*Timeline shows standard progression; individual experiences may vary</text>
</svg>
