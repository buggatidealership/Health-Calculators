<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg width="800" height="500" viewBox="0 0 800 500" xmlns="http://www.w3.org/2000/svg">
  <style>
    .title { font-family: Arial, sans-serif; font-size: 24px; font-weight: bold; fill: #333; }
    .subtitle { font-family: Arial, sans-serif; font-size: 16px; fill: #666; }
    .table-header { font-family: Arial, sans-serif; font-size: 18px; font-weight: bold; fill: #fff; }
    .category-header { font-family: Arial, sans-serif; font-size: 16px; font-weight: bold; fill: #333; }
    .row-label { font-family: Arial, sans-serif; font-size: 14px; font-weight: bold; fill: #333; }
    .cell-text { font-family: Arial, sans-serif; font-size: 14px; fill: #444; }
    .fresh-header { fill: #d63384; }
    .frozen-header { fill: #0d6efd; }
    .fresh-row { fill: #fce7f3; }
    .frozen-row { fill: #e1ecff; }
    .neutral-row { fill: #f8f9fa; }
    .border { fill: none; stroke: #ddd; stroke-width: 1; }
  </style>
  
  <!-- Title and Subtitle -->
  <text x="400" y="40" class="title" text-anchor="middle">Fresh vs. Frozen Embryo Transfer Comparison</text>
  <text x="400" y="70" class="subtitle" text-anchor="middle">Key differences affecting due date calculations and pregnancy planning</text>
  
  <!-- Comparison Table -->
  <g transform="translate(50, 100)">
    <!-- Table Headers -->
    <rect x="0" y="0" width="180" height="50" class="neutral-row border" />
    <rect x="180" y="0" width="250" height="50" class="fresh-header border" />
    <rect x="430" y="0" width="250" height="50" class="frozen-header border" />
    
    <text x="90" y="30" class="category-header" text-anchor="middle">Category</text>
    <text x="305" y="30" class="table-header" text-anchor="middle">Fresh Embryo Transfer</text>
    <text x="555" y="30" class="table-header" text-anchor="middle">Frozen Embryo Transfer (FET)</text>
    
    <!-- Process Row -->
    <rect x="0" y="50" width="180" height="50" class="neutral-row border" />
    <rect x="180" y="50" width="250" height="50" class="fresh-row border" />
    <rect x="430" y="50" width="250" height="50" class="frozen-row border" />
    
    <text x="90" y="80" class="row-label" text-anchor="middle">Process</text>
    <text x="305" y="75" class="cell-text" text-anchor="middle">Eggs retrieved, fertilized, and</text>
    <text x="305" y="95" class="cell-text" text-anchor="middle">transferred in same cycle</text>
    <text x="555" y="75" class="cell-text" text-anchor="middle">Embryos frozen after retrieval,</text>
    <text x="555" y="95" class="cell-text" text-anchor="middle">transferred in a later cycle</text>
    
    <!-- Timing Row -->
    <rect x="0" y="100" width="180" height="50" class="neutral-row border" />
    <rect x="180" y="100" width="250" height="50" class="fresh-row border" />
    <rect x="430" y="100" width="250" height="50" class="frozen-row border" />
    
    <text x="90" y="130" class="row-label" text-anchor="middle">Timing from Retrieval</text>
    <text x="305" y="125" class="cell-text" text-anchor="middle">3-5 days after</text>
    <text x="305" y="145" class="cell-text" text-anchor="middle">egg retrieval</text>
    <text x="555" y="125" class="cell-text" text-anchor="middle">Weeks to years after</text>
    <text x="555" y="145" class="cell-text" text-anchor="middle">egg retrieval</text>
    
    <!-- Due Date Calculation Row -->
    <rect x="0" y="150" width="180" height="70" class="neutral-row border" />
    <rect x="180" y="150" width="250" height="70" class="fresh-row border" />
    <rect x="430" y="150" width="250" height="70" class="frozen-row border" />
    
    <text x="90" y="185" class="row-label" text-anchor="middle">Due Date Calculation</text>
    <text x="305" y="165" class="cell-text" text-anchor="middle">From retrieval date:</text>
    <text x="305" y="185" class="cell-text" text-anchor="middle">• Day 3 embryo: +266 days</text>
    <text x="305" y="205" class="cell-text" text-anchor="middle">• Day 5 embryo: +264 days</text>
    <text x="555" y="165" class="cell-text" text-anchor="middle">From transfer date:</text>
    <text x="555" y="185" class="cell-text" text-anchor="middle">• Day 3 embryo: +266 days</text>
    <text x="555" y="205" class="cell-text" text-anchor="middle">• Day 5 embryo: +261 days</text>
    
    <!-- Hormone Environment Row -->
    <rect x="0" y="220" width="180" height="50" class="neutral-row border" />
    <rect x="180" y="220" width="250" height="50" class="fresh-row border" />
    <rect x="430" y="220" width="250" height="50" class="frozen-row border" />
    
    <text x="90" y="250" class="row-label" text-anchor="middle">Hormone Environment</text>
    <text x="305" y="245" class="cell-text" text-anchor="middle">Higher estrogen from</text>
    <text x="305" y="265" class="cell-text" text-anchor="middle">stimulation medications</text>
    <text x="555" y="245" class="cell-text" text-anchor="middle">More natural or controlled</text>
    <text x="555" y="265" class="cell-text" text-anchor="middle">hormone environment</text>
    
    <!-- Ultrasound Dating Row -->
    <rect x="0" y="270" width="180" height="50" class="neutral-row border" />
    <rect x="180" y="270" width="250" height="50" class="fresh-row border" />
    <rect x="430" y="270" width="250" height="50" class="frozen-row border" />
    
    <text x="90" y="300" class="row-label" text-anchor="middle">First Ultrasound</text>
    <text x="305" y="295" class="cell-text" text-anchor="middle">~4-6 weeks after</text>
    <text x="305" y="315" class="cell-text" text-anchor="middle">egg retrieval</text>
    <text x="555" y="295" class="cell-text" text-anchor="middle">~4-6 weeks after</text>
    <text x="555" y="315" class="cell-text" text-anchor="middle">embryo transfer</text>
    
    <!-- Benefits Row -->
    <rect x="0" y="320" width="180" height="50" class="neutral-row border" />
    <rect x="180" y="320" width="250" height="50" class="fresh-row border" />
    <rect x="430" y="320" width="250" height="50" class="frozen-row border" />
    
    <text x="90" y="350" class="row-label" text-anchor="middle">Key Benefits</text>
    <text x="305" y="345" class="cell-text" text-anchor="middle">Shorter overall treatment time;</text>
    <text x="305" y="365" class="cell-text" text-anchor="middle">fewer procedures</text>
    <text x="555" y="345" class="cell-text" text-anchor="middle">More physiologic uterine environment;</text>
    <text x="555" y="365" class="cell-text" text-anchor="middle">allows genetic testing of embryos</text>
  </g>
  
  <!-- Notes -->
  <g transform="translate(50, 440)">
    <rect x="0" y="0" width="680" height="60" rx="5" fill="#f8f9fa" stroke="#ddd" />
    <text x="15" y="20" class="row-label">Note on Calculations:</text>
    <text x="15" y="45" class="cell-text">Due dates can be more precisely calculated with IVF because fertilization and implantation dates are known.</text>
    <text x="15" y="65" class="cell-text">OB-GYNs may adjust these calculations based on early ultrasound measurements.</text>
  </g>
</svg>
