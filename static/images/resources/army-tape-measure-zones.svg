<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg width="800" height="500" viewBox="0 0 800 500" xmlns="http://www.w3.org/2000/svg">
  <style>
    .diagram-title { font-family: Arial, sans-serif; font-size: 24px; font-weight: bold; fill: #333; }
    .body-outline { fill: #f4f4f4; stroke: #666; stroke-width: 2; }
    .measurement-zone { fill: #d63384; fill-opacity: 0.2; stroke: #d63384; stroke-width: 2; }
    .tape-measure { fill: none; stroke: #d63384; stroke-width: 3; stroke-dasharray: 5,5; }
    .zone-label { font-family: Arial, sans-serif; font-size: 16px; font-weight: bold; fill: #333; }
    .instruction-text { font-family: Arial, sans-serif; font-size: 14px; fill: #666; }
  </style>
  
  <!-- Title -->
  <text x="400" y="40" class="diagram-title" text-anchor="middle">Army Body Fat Test Measurement Zones</text>
  
  <!-- Male Figure -->
  <g transform="translate(200, 120)">
    <!-- Body Outline -->
    <path class="body-outline" d="M100,50 C130,50 130,30 100,30 C70,30 70,50 100,50 Z" /> <!-- Head -->
    <rect x="90" y="50" width="20" height="40" class="body-outline" /> <!-- Neck -->
    <rect x="60" y="90" width="80" height="120" rx="10" class="body-outline" /> <!-- Torso -->
    <rect x="60" y="210" width="30" height="120" rx="5" class="body-outline" /> <!-- Left Leg -->
    <rect x="110" y="210" width="30" height="120" rx="5" class="body-outline" /> <!-- Right Leg -->
    <rect x="35" y="90" width="25" height="100" rx="5" class="body-outline" /> <!-- Left Arm -->
    <rect x="140" y="90" width="25" height="100" rx="5" class="body-outline" /> <!-- Right Arm -->
    
    <!-- Measurement Zones -->
    <ellipse cx="100" cy="70" rx="15" ry="10" class="measurement-zone" /> <!-- Neck -->
    <path class="tape-measure" d="M80,70 C50,60 30,90 80,80" />
    <rect x="65" y="150" width="70" height="20" class="measurement-zone" /> <!-- Waist -->
    <path class="tape-measure" d="M65,160 C40,150 20,170 45,180" />
    
    <!-- Labels -->
    <text x="40" y="60" class="zone-label" text-anchor="end">Neck</text>
    <text x="40" y="160" class="zone-label" text-anchor="end">Waist</text>
    <text x="100" y="350" class="zone-label" text-anchor="middle">Male</text>
    <text x="100" y="370" class="instruction-text" text-anchor="middle">Measure at neck and waist</text>
  </g>
  
  <!-- Female Figure -->
  <g transform="translate(500, 120)">
    <!-- Body Outline -->
    <path class="body-outline" d="M100,50 C130,50 130,30 100,30 C70,30 70,50 100,50 Z" /> <!-- Head -->
    <rect x="90" y="50" width="20" height="40" class="body-outline" /> <!-- Neck -->
    <path class="body-outline" d="M60,90 C60,100 50,110 60,120 C70,135 80,140 100,140 C120,140 130,135 140,120 C150,110 140,100 140,90 Z" /> <!-- Upper Torso -->
    <rect x="60" y="140" width="80" height="70" rx="15" class="body-outline" /> <!-- Lower Torso -->
    <rect x="60" y="210" width="30" height="120" rx="10" class="body-outline" /> <!-- Left Leg -->
    <rect x="110" y="210" width="30" height="120" rx="10" class="body-outline" /> <!-- Right Leg -->
    <rect x="35" y="90" width="25" height="100" rx="5" class="body-outline" /> <!-- Left Arm -->
    <rect x="140" y="90" width="25" height="100" rx="5" class="body-outline" /> <!-- Right Arm -->
    
    <!-- Measurement Zones -->
    <ellipse cx="100" cy="70" rx="15" ry="10" class="measurement-zone" /> <!-- Neck -->
    <path class="tape-measure" d="M80,70 C50,60 30,90 80,80" />
    <rect x="65" y="150" width="70" height="20" class="measurement-zone" /> <!-- Waist -->
    <path class="tape-measure" d="M65,160 C40,150 20,170 45,180" />
    <rect x="65" y="200" width="70" height="20" class="measurement-zone" /> <!-- Hips -->
    <path class="tape-measure" d="M65,210 C40,200 20,220 45,230" />
    
    <!-- Labels -->
    <text x="40" y="60" class="zone-label" text-anchor="end">Neck</text>
    <text x="40" y="160" class="zone-label" text-anchor="end">Waist</text>
    <text x="40" y="210" class="zone-label" text-anchor="end">Hips</text>
    <text x="100" y="350" class="zone-label" text-anchor="middle">Female</text>
    <text x="100" y="370" class="instruction-text" text-anchor="middle">Measure at neck, waist, and hips</text>
  </g>
  
  <!-- Instructions -->
  <g transform="translate(400, 430)">
    <text x="0" y="0" class="instruction-text" text-anchor="middle">Neck: Measure just below the larynx (Adam's apple)</text>
    <text x="0" y="20" class="instruction-text" text-anchor="middle">Waist: Measure at the narrowest point (usually at navel level)</text>
    <text x="0" y="40" class="instruction-text" text-anchor="middle">Hips (females only): Measure at the widest point around the buttocks</text>
  </g>
</svg>
