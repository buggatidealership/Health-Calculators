<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg xmlns="http://www.w3.org/2000/svg" width="800" height="500" viewBox="0 0 800 500">
  <!-- Background -->
  <rect width="800" height="500" fill="#f8f9fa" rx="10" ry="10" />
  
  <!-- Title -->
  <text x="400" y="40" font-family="Arial, sans-serif" font-size="24" font-weight="bold" text-anchor="middle" fill="#333333">BAC Levels and Effects Chart</text>
  
  <!-- Gradient Bar -->
  <defs>
    <linearGradient id="bac-gradient" x1="0%" y1="0%" x2="100%" y1="0%">
      <stop offset="0%" stop-color="#4caf50" /> <!-- Green - Minimal -->
      <stop offset="20%" stop-color="#8bc34a" /> <!-- Light Green - Mild -->
      <stop offset="40%" stop-color="#ffeb3b" /> <!-- Yellow - Moderate -->
      <stop offset="60%" stop-color="#ff9800" /> <!-- Orange - Significant -->
      <stop offset="80%" stop-color="#f44336" /> <!-- Red - Severe -->
      <stop offset="100%" stop-color="#9c27b0" /> <!-- Purple - Critical -->
    </linearGradient>
  </defs>
  
  <rect x="50" y="80" width="700" height="30" fill="url(#bac-gradient)" rx="5" ry="5" />
  
  <!-- BAC Markers -->
  <line x1="50" y1="110" x2="50" y2="120" stroke="#333" stroke-width="2" />
  <text x="50" y="135" font-family="Arial, sans-serif" font-size="12" text-anchor="middle" fill="#333">0.00%</text>
  
  <line x1="190" y1="110" x2="190" y2="120" stroke="#333" stroke-width="2" />
  <text x="190" y="135" font-family="Arial, sans-serif" font-size="12" text-anchor="middle" fill="#333">0.04%</text>
  
  <line x1="330" y1="110" x2="330" y2="120" stroke="#333" stroke-width="2" />
  <text x="330" y="135" font-family="Arial, sans-serif" font-size="12" text-anchor="middle" fill="#333">0.08%</text>
  
  <line x1="470" y1="110" x2="470" y2="120" stroke="#333" stroke-width="2" />
  <text x="470" y="135" font-family="Arial, sans-serif" font-size="12" text-anchor="middle" fill="#333">0.15%</text>
  
  <line x1="610" y1="110" x2="610" y2="120" stroke="#333" stroke-width="2" />
  <text x="610" y="135" font-family="Arial, sans-serif" font-size="12" text-anchor="middle" fill="#333">0.25%</text>
  
  <line x1="750" y1="110" x2="750" y2="120" stroke="#333" stroke-width="2" />
  <text x="750" y="135" font-family="Arial, sans-serif" font-size="12" text-anchor="middle" fill="#333">0.40%+</text>
  
  <!-- Legal limit marker -->
  <line x1="330" y1="70" x2="330" y2="150" stroke="#000" stroke-width="1" stroke-dasharray="5,5" />
  <rect x="280" y="150" width="100" height="20" fill="#dc3545" rx="5" ry="5" />
  <text x="330" y="165" font-family="Arial, sans-serif" font-size="12" font-weight="bold" text-anchor="middle" fill="white">Legal Limit</text>
  
  <!-- Impairment Levels with Descriptions -->
  <g transform="translate(0, 180)">
    <!-- Level 1: Subtle/Mild -->
    <rect x="50" y="0" width="160" height="60" fill="#e8f5e9" rx="5" ry="5" stroke="#4caf50" stroke-width="1" />
    <text x="130" y="20" font-family="Arial, sans-serif" font-size="14" font-weight="bold" text-anchor="middle" fill="#2e7d32">0.01-0.04%</text>
    <text x="130" y="40" font-family="Arial, sans-serif" font-size="12" text-anchor="middle" fill="#333">Subtle mood changes</text>
    <text x="130" y="55" font-family="Arial, sans-serif" font-size="12" text-anchor="middle" fill="#333">Mild relaxation</text>
    
    <!-- Level 2: Relaxed -->
    <rect x="50" y="70" width="160" height="60" fill="#f0f4c3" rx="5" ry="5" stroke="#cddc39" stroke-width="1" />
    <text x="130" y="90" font-family="Arial, sans-serif" font-size="14" font-weight="bold" text-anchor="middle" fill="#33691e">0.05-0.07%</text>
    <text x="130" y="110" font-family="Arial, sans-serif" font-size="12" text-anchor="middle" fill="#333">Reduced inhibitions</text>
    <text x="130" y="125" font-family="Arial, sans-serif" font-size="12" text-anchor="middle" fill="#333">Slight judgment impairment</text>
    
    <!-- Level 3: Legally Impaired -->
    <rect x="50" y="140" width="160" height="60" fill="#fff9c4" rx="5" ry="5" stroke="#ffc107" stroke-width="1" />
    <text x="130" y="160" font-family="Arial, sans-serif" font-size="14" font-weight="bold" text-anchor="middle" fill="#ff6f00">0.08-0.10%</text>
    <text x="130" y="180" font-family="Arial, sans-serif" font-size="12" text-anchor="middle" fill="#333">Legally impaired driving</text>
    <text x="130" y="195" font-family="Arial, sans-serif" font-size="12" text-anchor="middle" fill="#333">Poor coordination</text>
    
    <!-- Level 4: Significantly Impaired -->
    <rect x="320" y="0" width="160" height="60" fill="#ffecb3" rx="5" ry="5" stroke="#ff9800" stroke-width="1" />
    <text x="400" y="20" font-family="Arial, sans-serif" font-size="14" font-weight="bold" text-anchor="middle" fill="#e65100">0.11-0.15%</text>
    <text x="400" y="40" font-family="Arial, sans-serif" font-size="12" text-anchor="middle" fill="#333">Major balance issues</text>
    <text x="400" y="55" font-family="Arial, sans-serif" font-size="12" text-anchor="middle" fill="#333">Slurred speech</text>
    
    <!-- Level 5: Very Impaired -->
    <rect x="320" y="70" width="160" height="60" fill="#ffccbc" rx="5" ry="5" stroke="#ff5722" stroke-width="1" />
    <text x="400" y="90" font-family="Arial, sans-serif" font-size="14" font-weight="bold" text-anchor="middle" fill="#bf360c">0.16-0.20%</text>
    <text x="400" y="110" font-family="Arial, sans-serif" font-size="12" text-anchor="middle" fill="#333">Nausea, dysphoria</text>
    <text x="400" y="125" font-family="Arial, sans-serif" font-size="12" text-anchor="middle" fill="#333">Difficulty walking</text>
    
    <!-- Level 6: Severe Impairment -->
    <rect x="320" y="140" width="160" height="60" fill="#e1bee7" rx="5" ry="5" stroke="#9c27b0" stroke-width="1" />
    <text x="400" y="160" font-family="Arial, sans-serif" font-size="14" font-weight="bold" text-anchor="middle" fill="#4a148c">0.21-0.40%+</text>
    <text x="400" y="180" font-family="Arial, sans-serif" font-size="12" text-anchor="middle" fill="#333">Blackouts, unconsciousness</text>
    <text x="400" y="195" font-family="Arial, sans-serif" font-size="12" text-anchor="middle" fill="#333">Risk of alcohol poisoning</text>
    
    <!-- Critical Warning -->
    <rect x="590" y="0" width="160" height="90" fill="#ffebee" rx="5" ry="5" stroke="#d32f2f" stroke-width="2" />
    <text x="670" y="25" font-family="Arial, sans-serif" font-size="16" font-weight="bold" text-anchor="middle" fill="#b71c1c">DANGER</text>
    <text x="670" y="50" font-family="Arial, sans-serif" font-size="12" text-anchor="middle" fill="#333">BAC levels > 0.40%</text>
    <text x="670" y="70" font-family="Arial, sans-serif" font-size="12" text-anchor="middle" fill="#333">Coma, respiratory</text>
    <text x="670" y="85" font-family="Arial, sans-serif" font-size="12" text-anchor="middle" fill="#333">failure, possible death</text>
    
    <!-- Driver Safety Warning -->
    <rect x="590" y="110" width="160" height="90" fill="#e3f2fd" rx="5" ry="5" stroke="#1976d2" stroke-width="1" />
    <text x="670" y="135" font-family="Arial, sans-serif" font-size="14" font-weight="bold" text-anchor="middle" fill="#0d47a1">SAFETY INFO</text>
    <text x="670" y="155" font-family="Arial, sans-serif" font-size="12" text-anchor="middle" fill="#333">Crash risk doubles</text>
    <text x="670" y="170" font-family="Arial, sans-serif" font-size="12" text-anchor="middle" fill="#333">at just 0.02%</text>
    <text x="670" y="185" font-family="Arial, sans-serif" font-size="12" text-anchor="middle" fill="#333">Never drink and drive</text>
  </g>
  
  <!-- Source Note -->
  <text x="400" y="480" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="#666">Source: Based on data from National Highway Traffic Safety Administration (NHTSA) and National Institute on Alcohol Abuse and Alcoholism (NIAAA)</text>
</svg>
