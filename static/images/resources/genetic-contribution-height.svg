<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg width="800" height="400" viewBox="0 0 800 400" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="800" height="400" fill="#f5f5f5" rx="8" ry="8" />
  
  <!-- Title -->
  <text x="400" y="40" text-anchor="middle" font-family="Arial" font-size="24" fill="#333" font-weight="bold">Genetic vs. Environmental Factors in Height Determination</text>
  
  <!-- Main Visualization: Twin Study Results -->
  <g transform="translate(400, 200)">
    <!-- Circle representing 100% -->
    <circle cx="0" cy="0" r="120" fill="none" stroke="#ddd" stroke-width="2" />
    
    <!-- Genetic portion (70-80%) -->
    <path d="M 0 0 L 120 0 A 120 120 0 1 1 -73.5 94.5 Z" fill="#4CAF50" fill-opacity="0.7" />
    
    <!-- Environmental portion (20-30%) -->
    <path d="M 0 0 L -73.5 94.5 A 120 120 0 0 1 120 0 Z" fill="#2196F3" fill-opacity="0.7" />
    
    <!-- Labels -->
    <text x="60" y="-40" font-family="Arial" font-size="20" fill="#333" font-weight="bold">75%</text>
    <text x="60" y="-15" font-family="Arial" font-size="16" fill="#333">Genetic</text>
    <text x="60" y="10" font-family="Arial" font-size="14" fill="#333">Twin studies show</text>
    <text x="60" y="30" font-family="Arial" font-size="14" fill="#333">high heritability</text>
    
    <text x="-60" y="40" font-family="Arial" font-size="20" fill="#333" font-weight="bold">25%</text>
    <text x="-60" y="65" font-family="Arial" font-size="16" fill="#333">Environmental</text>
    <text x="-80" y="85" font-family="Arial" font-size="14" fill="#333">Nutrition, health, sleep</text>
  </g>
  
  <!-- Twin Studies Visualization -->
  <g transform="translate(150, 200)">
    <!-- Identical twins group -->
    <rect x="-80" y="-120" width="160" height="90" rx="5" ry="5" fill="white" stroke="#ddd" stroke-width="1" />
    <text x="0" y="-100" text-anchor="middle" font-family="Arial" font-size="16" fill="#333" font-weight="bold">Identical Twins</text>
    
    <!-- Twin figures -->
    <g transform="translate(-40, -60)">
      <circle cx="0" cy="0" r="15" fill="#4CAF50" />
      <rect x="-5" y="15" width="10" height="25" fill="#4CAF50" />
      <line x1="-5" y1="20" x2="-15" y2="35" stroke="#4CAF50" stroke-width="5" />
      <line x1="5" y1="20" x2="15" y2="35" stroke="#4CAF50" stroke-width="5" />
      <line x1="-5" y1="40" x2="-10" y2="65" stroke="#4CAF50" stroke-width="5" />
      <line x1="5" y1="40" x2="10" y2="65" stroke="#4CAF50" stroke-width="5" />
    </g>
    
    <g transform="translate(40, -60)">
      <circle cx="0" cy="0" r="15" fill="#4CAF50" />
      <rect x="-5" y="15" width="10" height="25" fill="#4CAF50" />
      <line x1="-5" y1="20" x2="-15" y2="35" stroke="#4CAF50" stroke-width="5" />
      <line x1="5" y1="20" x2="15" y2="35" stroke="#4CAF50" stroke-width="5" />
      <line x1="-5" y1="40" x2="-10" y2="65" stroke="#4CAF50" stroke-width="5" />
      <line x1="5" y1="40" x2="10" y2="65" stroke="#4CAF50" stroke-width="5" />
    </g>
    
    <!-- Height correlation -->
    <text x="0" y="-20" text-anchor="middle" font-family="Arial" font-size="14" fill="#333">Height correlation: ~0.9</text>
    
    <!-- Fraternal twins group -->
    <rect x="-80" y="30" width="160" height="90" rx="5" ry="5" fill="white" stroke="#ddd" stroke-width="1" />
    <text x="0" y="50" text-anchor="middle" font-family="Arial" font-size="16" fill="#333" font-weight="bold">Fraternal Twins</text>
    
    <!-- Twin figures with height difference -->
    <g transform="translate(-40, 90) scale(0.9, 1.0)">
      <circle cx="0" cy="0" r="15" fill="#2196F3" />
      <rect x="-5" y="15" width="10" height="25" fill="#2196F3" />
      <line x1="-5" y1="20" x2="-15" y2="35" stroke="#2196F3" stroke-width="5" />
      <line x1="5" y1="20" x2="15" y2="35" stroke="#2196F3" stroke-width="5" />
      <line x1="-5" y1="40" x2="-10" y2="65" stroke="#2196F3" stroke-width="5" />
      <line x1="5" y1="40" x2="10" y2="65" stroke="#2196F3" stroke-width="5" />
    </g>
    
    <g transform="translate(40, 90) scale(1.1, 1.0)">
      <circle cx="0" cy="0" r="15" fill="#2196F3" />
      <rect x="-5" y="15" width="10" height="25" fill="#2196F3" />
      <line x1="-5" y1="20" x2="-15" y2="35" stroke="#2196F3" stroke-width="5" />
      <line x1="5" y1="20" x2="15" y2="35" stroke="#2196F3" stroke-width="5" />
      <line x1="-5" y1="40" x2="-10" y2="65" stroke="#2196F3" stroke-width="5" />
      <line x1="5" y1="40" x2="10" y2="65" stroke="#2196F3" stroke-width="5" />
    </g>
    
    <!-- Height correlation -->
    <text x="0" y="130" text-anchor="middle" font-family="Arial" font-size="14" fill="#333">Height correlation: ~0.5</text>
  </g>
  
  <!-- Height Heritability Research Findings -->
  <g transform="translate(650, 180)">
    <rect x="-140" y="-130" width="280" height="260" rx="8" ry="8" fill="white" stroke="#ddd" stroke-width="1" />
    
    <text x="0" y="-100" text-anchor="middle" font-family="Arial" font-size="16" fill="#333" font-weight="bold">Twin Study Findings</text>
    
    <line x1="-130" y1="-85" x2="130" y2="-85" stroke="#ddd" stroke-width="1" />
    
    <text x="-120" y="-65" font-family="Arial" font-size="14" fill="#333">• 8 country study</text>
    <text x="-120" y="-40" font-family="Arial" font-size="14" fill="#333">• 45 twin cohorts</text>
    <text x="-120" y="-15" font-family="Arial" font-size="14" fill="#333">• Total of 68,782 pairs</text>
    
    <line x1="-130" y1="5" x2="130" y2="5" stroke="#ddd" stroke-width="1" />
    
    <text x="0" y="30" text-anchor="middle" font-family="Arial" font-size="14" fill="#333" font-weight="bold">Heritability Findings</text>
    
    <text x="-120" y="55" font-family="Arial" font-size="14" fill="#333">• Males: 87%-93%</text>
    <text x="-120" y="80" font-family="Arial" font-size="14" fill="#333">• Females: 68%-84%</text>
    <text x="-120" y="105" font-family="Arial" font-size="14" fill="#333">• Average: ~80%</text>
  </g>
  
  <!-- Environmental Factors -->
  <g transform="translate(150, 320)">
    <text x="0" y="0" text-anchor="middle" font-family="Arial" font-size="16" fill="#333" font-weight="bold">Key Environmental Factors</text>
    
    <g transform="translate(-90, 30)">
      <circle cx="0" cy="0" r="10" fill="#2196F3" />
      <text x="15" y="4" font-family="Arial" font-size="12" fill="#333">Nutrition</text>
    </g>
    
    <g transform="translate(0, 30)">
      <circle cx="0" cy="0" r="10" fill="#2196F3" />
      <text x="15" y="4" font-family="Arial" font-size="12" fill="#333">Health Status</text>
    </g>
    
    <g transform="translate(90, 30)">
      <circle cx="0" cy="0" r="10" fill="#2196F3" />
      <text x="15" y="4" font-family="Arial" font-size="12" fill="#333">Sleep Quality</text>
    </g>
  </g>
  
  <!-- Caption -->
  <text x="400" y="380" text-anchor="middle" font-family="Arial" font-size="14" fill="#666" font-style="italic">
    Sources: Silventoinen K, et al. "Heritability of adult body height: A comparative study of twin cohorts in eight countries."
  </text>
</svg>