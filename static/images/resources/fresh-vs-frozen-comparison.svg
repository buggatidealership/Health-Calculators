<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg width="800" height="550" viewBox="0 0 800 550" xmlns="http://www.w3.org/2000/svg">
  <style>
    .title { font-family: Arial, sans-serif; font-size: 24px; font-weight: bold; fill: #333; }
    .subtitle { font-family: Arial, sans-serif; font-size: 16px; fill: #666; }
    .axis-label { font-family: Arial, sans-serif; font-size: 14px; fill: #666; }
    .axis-title { font-family: Arial, sans-serif; font-size: 16px; font-weight: bold; fill: #444; }
    .legend-text { font-family: Arial, sans-serif; font-size: 14px; fill: #444; }
    .bar-label { font-family: Arial, sans-serif; font-size: 14px; font-weight: bold; fill: #fff; }
    .annotation { font-family: Arial, sans-serif; font-size: 14px; fill: #666; font-style: italic; }
    .source-text { font-family: Arial, sans-serif; font-size: 12px; fill: #888; }
    .fresh-bar { fill: #d63384; }
    .frozen-bar { fill: #0d6efd; }
  </style>
  
  <!-- Title and Subtitle -->
  <text x="400" y="40" class="title" text-anchor="middle">Fresh vs. Frozen Embryo Transfer Success Rates</text>
  <text x="400" y="70" class="subtitle" text-anchor="middle">Comparison of live birth rates by maternal age (2020-2021 data)</text>
  
  <!-- Legend -->
  <g transform="translate(400, 105)">
    <rect x="-100" y="-15" width="200" height="30" rx="5" fill="#f8f9fa" stroke="#ddd" />
    <rect x="-80" y="-7" width="20" height="14" class="fresh-bar" />
    <text x="-50" y="4" class="legend-text">Fresh Transfer</text>
    <rect x="20" y="-7" width="20" height="14" class="frozen-bar" />
    <text x="50" y="4" class="legend-text">Frozen Transfer</text>
  </g>
  
  <!-- Chart Area -->
  <g transform="translate(70, 150)">
    <!-- Y Axis -->
    <line x1="0" y1="0" x2="0" y2="300" stroke="#ccc" stroke-width="1" />
    <text x="-50" y="150" class="axis-title" text-anchor="middle" transform="rotate(-90, -50, 150)">Live Birth Rate (%)</text>
    
    <!-- Y Axis Labels -->
    <line x1="-5" y1="0" x2="0" y2="0" stroke="#ccc" stroke-width="1" />
    <text x="-10" y="5" class="axis-label" text-anchor="end">60%</text>
    
    <line x1="-5" y1="60" x2="0" y2="60" stroke="#ccc" stroke-width="1" />
    <text x="-10" y="65" class="axis-label" text-anchor="end">48%</text>
    
    <line x1="-5" y1="120" x2="0" y2="120" stroke="#ccc" stroke-width="1" />
    <text x="-10" y="125" class="axis-label" text-anchor="end">36%</text>
    
    <line x1="-5" y1="180" x2="0" y2="180" stroke="#ccc" stroke-width="1" />
    <text x="-10" y="185" class="axis-label" text-anchor="end">24%</text>
    
    <line x1="-5" y1="240" x2="0" y2="240" stroke="#ccc" stroke-width="1" />
    <text x="-10" y="245" class="axis-label" text-anchor="end">12%</text>
    
    <line x1="-5" y1="300" x2="0" y2="300" stroke="#ccc" stroke-width="1" />
    <text x="-10" y="305" class="axis-label" text-anchor="end">0%</text>
    
    <!-- X Axis -->
    <line x1="0" y1="300" x2="660" y2="300" stroke="#ccc" stroke-width="1" />
    <text x="330" y="340" class="axis-title" text-anchor="middle">Female Age Group</text>
    
    <!-- Background Grid -->
    <line x1="0" y1="60" x2="660" y2="60" stroke="#eee" stroke-width="1" stroke-dasharray="5,5" />
    <line x1="0" y1="120" x2="660" y2="120" stroke="#eee" stroke-width="1" stroke-dasharray="5,5" />
    <line x1="0" y1="180" x2="660" y2="180" stroke="#eee" stroke-width="1" stroke-dasharray="5,5" />
    <line x1="0" y1="240" x2="660" y2="240" stroke="#eee" stroke-width="1" stroke-dasharray="5,5" />
    
    <!-- Bar Groups -->
    <!-- Age <35 -->
    <g transform="translate(80, 0)">
      <rect x="-35" y="90" width="30" height="210" class="fresh-bar" />
      <rect x="5" y="75" width="30" height="225" class="frozen-bar" />
      <text x="-20" y="310" class="axis-label" text-anchor="middle">&lt;35</text>
      <text x="-20" y="100" class="bar-label" text-anchor="middle">35%</text>
      <text x="20" y="85" class="bar-label" text-anchor="middle">37.5%</text>
    </g>
    
    <!-- Age 35-37 -->
    <g transform="translate(200, 0)">
      <rect x="-35" y="120" width="30" height="180" class="fresh-bar" />
      <rect x="5" y="108" width="30" height="192" class="frozen-bar" />
      <text x="-20" y="310" class="axis-label" text-anchor="middle">35-37</text>
      <text x="-20" y="130" class="bar-label" text-anchor="middle">30%</text>
      <text x="20" y="118" class="bar-label" text-anchor="middle">32%</text>
    </g>
    
    <!-- Age 38-40 -->
    <g transform="translate(320, 0)">
      <rect x="-35" y="168" width="30" height="132" class="fresh-bar" />
      <rect x="5" y="150" width="30" height="150" class="frozen-bar" />
      <text x="-20" y="310" class="axis-label" text-anchor="middle">38-40</text>
      <text x="-20" y="178" class="bar-label" text-anchor="middle">22%</text>
      <text x="20" y="160" class="bar-label" text-anchor="middle">25%</text>
    </g>
    
    <!-- Age 41-42 -->
    <g transform="translate(440, 0)">
      <rect x="-35" y="216" width="30" height="84" class="fresh-bar" />
      <rect x="5" y="192" width="30" height="108" class="frozen-bar" />
      <text x="-20" y="310" class="axis-label" text-anchor="middle">41-42</text>
      <text x="-20" y="226" class="bar-label" text-anchor="middle">14%</text>
      <text x="20" y="202" class="bar-label" text-anchor="middle">18%</text>
    </g>
    
    <!-- Age >42 -->
    <g transform="translate(560, 0)">
      <rect x="-35" y="252" width="30" height="48" class="fresh-bar" />
      <rect x="5" y="234" width="30" height="66" class="frozen-bar" />
      <text x="-20" y="310" class="axis-label" text-anchor="middle">&gt;42</text>
      <text x="-20" y="262" class="bar-label" text-anchor="middle">8%</text>
      <text x="20" y="244" class="bar-label" text-anchor="middle">11%</text>
    </g>
    
    <!-- Annotation Arrow for Frozen Advantage -->
    <g transform="translate(500, 180)">
      <path d="M0,0 C20,-20 50,-20 70,0" fill="none" stroke="#666" stroke-width="1" stroke-dasharray="5,3" />
      <polygon points="70,0 65,-5 65,5" fill="#666" />
      <text x="35" y="-25" class="annotation" text-anchor="middle">Frozen transfers show higher</text>
      <text x="35" y="-10" class="annotation" text-anchor="middle">success rates across all ages</text>
    </g>
  </g>
  
  <!-- Footnotes -->
  <g transform="translate(70, 500)">
    <text x="0" y="0" class="source-text">Data sources: CDC ART Success Rates Reports and SART National Summary for 2020-2021</text>
    <text x="0" y="20" class="source-text">Note: Success rates may vary by clinic, patient factors, and embryo quality.</text>
    <text x="0" y="40" class="source-text">Frozen embryo transfers typically include preimplantation genetic testing, which may contribute to higher success rates.</text>
  </g>
</svg>
