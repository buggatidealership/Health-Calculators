<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg width="800" height="500" viewBox="0 0 800 500" xmlns="http://www.w3.org/2000/svg">
  <style>
    .title { font-family: Arial, sans-serif; font-size: 28px; font-weight: bold; fill: #333; }
    .subtitle { font-family: Arial, sans-serif; font-size: 18px; fill: #666; }
    .item-title { font-family: Arial, sans-serif; font-size: 22px; font-weight: bold; fill: #333; }
    .macro-label { font-family: Arial, sans-serif; font-size: 16px; fill: #666; }
    .macro-value { font-family: Arial, sans-serif; font-size: 18px; font-weight: bold; fill: #333; }
    .macro-unit { font-family: Arial, sans-serif; font-size: 14px; fill: #666; }
    .bowl { fill: #f8f8f8; stroke: #d63384; stroke-width: 3; }
    .burrito { fill: #f8f8f8; stroke: #20c997; stroke-width: 3; }
    .ingredients { font-family: Arial, sans-serif; font-size: 14px; fill: #666; }
    .protein-bar { fill: #d63384; }
    .carb-bar { fill: #20c997; }
    .fat-bar { fill: #fd7e14; }
    .calories-bar { fill: #6f42c1; }
    .vs-text { font-family: Arial, sans-serif; font-size: 24px; font-weight: bold; fill: #666; }
    .legend-box { fill: #f8f8f8; stroke: #ddd; stroke-width: 1; }
    .legend-text { font-family: Arial, sans-serif; font-size: 14px; fill: #666; }
  </style>
  
  <!-- Title and Subtitle -->
  <text x="400" y="40" class="title" text-anchor="middle">Chipotle Bowl vs Burrito Macro Comparison</text>
  <text x="400" y="70" class="subtitle" text-anchor="middle">Nutritional differences for similar ingredients but different formats</text>
  
  <!-- Bowl Image -->
  <g transform="translate(200, 150)">
    <ellipse cx="0" cy="0" rx="100" ry="40" class="bowl" />
    <ellipse cx="0" cy="0" rx="80" ry="30" fill="none" stroke="#d63384" stroke-width="1" stroke-dasharray="2,2" />
    
    <!-- Bowl Contents (simplified) -->
    <ellipse cx="-40" cy="-5" rx="15" ry="10" fill="#73c16c" /> <!-- Lettuce -->
    <ellipse cx="-15" cy="5" rx="20" ry="15" fill="#f2d35c" /> <!-- Rice -->
    <ellipse cx="15" cy="-5" rx="18" ry="12" fill="#8c5e3b" /> <!-- Beans -->
    <ellipse cx="40" cy="5" rx="22" ry="15" fill="#b25c3e" /> <!-- Protein -->
    <ellipse cx="0" cy="-10" rx="10" ry="8" fill="#f89b4d" /> <!-- Cheese -->
    
    <text x="0" y="60" class="item-title" text-anchor="middle">Burrito Bowl</text>
    <text x="0" y="80" class="ingredients" text-anchor="middle">White rice, black beans, chicken, cheese, lettuce, salsa</text>
    
    <!-- Macros for Bowl -->
    <g transform="translate(-90, 110)">
      <text x="0" y="0" class="macro-label">Calories:</text>
      <text x="75" y="0" class="macro-value">630</text>
      <text x="105" y="0" class="macro-unit">kcal</text>
      
      <text x="0" y="25" class="macro-label">Protein:</text>
      <text x="75" y="25" class="macro-value">40</text>
      <text x="95" y="25" class="macro-unit">g</text>
      
      <text x="0" y="50" class="macro-label">Carbs:</text>
      <text x="75" y="50" class="macro-value">68</text>
      <text x="95" y="50" class="macro-unit">g</text>
      
      <text x="0" y="75" class="macro-label">Fat:</text>
      <text x="75" y="75" class="macro-value">22</text>
      <text x="95" y="75" class="macro-unit">g</text>
    </g>
    
    <!-- Bar Chart for Bowl -->
    <g transform="translate(70, 115)">
      <rect x="0" y="0" width="80" height="15" class="calories-bar" />
      <rect x="0" y="25" width="60" height="15" class="protein-bar" />
      <rect x="0" y="50" width="68" height="15" class="carb-bar" />
      <rect x="0" y="75" width="44" height="15" class="fat-bar" />
    </g>
  </g>
  
  <!-- VS Text -->
  <text x="400" y="250" class="vs-text" text-anchor="middle">VS</text>
  
  <!-- Burrito Image -->
  <g transform="translate(600, 150)">
    <!-- Burrito Shape -->
    <rect x="-100" y="-35" width="200" height="70" rx="35" ry="35" class="burrito" />
    
    <!-- Burrito Contents (simplified) -->
    <rect x="-80" y="-25" width="160" height="50" rx="25" ry="25" fill="#f2d35c" /> <!-- Rice Base -->
    <rect x="-75" y="-20" width="150" height="40" rx="20" ry="20" fill="#8c5e3b" opacity="0.6" /> <!-- Beans -->
    <rect x="-70" y="-15" width="140" height="30" rx="15" ry="15" fill="#b25c3e" opacity="0.6" /> <!-- Protein -->
    <rect x="-65" y="-10" width="130" height="20" rx="10" ry="10" fill="#f89b4d" opacity="0.4" /> <!-- Cheese -->
    <rect x="-60" y="-5" width="120" height="10" rx="5" ry="5" fill="#73c16c" opacity="0.4" /> <!-- Lettuce -->
    
    <text x="0" y="60" class="item-title" text-anchor="middle">Burrito</text>
    <text x="0" y="80" class="ingredients" text-anchor="middle">Same ingredients + flour tortilla</text>
    
    <!-- Macros for Burrito -->
    <g transform="translate(-90, 110)">
      <text x="0" y="0" class="macro-label">Calories:</text>
      <text x="75" y="0" class="macro-value">930</text>
      <text x="105" y="0" class="macro-unit">kcal</text>
      
      <text x="0" y="25" class="macro-label">Protein:</text>
      <text x="75" y="25" class="macro-value">41</text>
      <text x="95" y="25" class="macro-unit">g</text>
      
      <text x="0" y="50" class="macro-label">Carbs:</text>
      <text x="75" y="50" class="macro-value">110</text>
      <text x="102" y="50" class="macro-unit">g</text>
      
      <text x="0" y="75" class="macro-label">Fat:</text>
      <text x="75" y="75" class="macro-value">40</text>
      <text x="95" y="75" class="macro-unit">g</text>
    </g>
    
    <!-- Bar Chart for Burrito -->
    <g transform="translate(70, 115)">
      <rect x="0" y="0" width="120" height="15" class="calories-bar" />
      <rect x="0" y="25" width="61" height="15" class="protein-bar" />
      <rect x="0" y="50" width="110" height="15" class="carb-bar" />
      <rect x="0" y="75" width="80" height="15" class="fat-bar" />
    </g>
  </g>
  
  <!-- Difference Callout -->
  <g transform="translate(400, 350)">
    <rect x="-200" y="0" width="400" height="100" rx="10" ry="10" class="legend-box" />
    <text x="0" y="25" class="item-title" text-anchor="middle">Key Differences</text>
    <text x="-180" y="55" class="legend-text">• Flour tortilla adds ~300 calories</text>
    <text x="-180" y="80" class="legend-text">• Burrito has +42g carbs from the tortilla</text>
    <text x="70" y="55" class="legend-text">• Burrito has +18g fat</text>
    <text x="70" y="80" class="legend-text">• Protein is similar in both options</text>
  </g>
  
  <!-- Legend -->
  <g transform="translate(400, 470)">
    <rect x="-10" y="-10" width="20" height="10" class="calories-bar" />
    <text x="20" y="0" class="legend-text">Calories</text>
    
    <rect x="90" y="-10" width="20" height="10" class="protein-bar" />
    <text x="120" y="0" class="legend-text">Protein</text>
    
    <rect x="190" y="-10" width="20" height="10" class="carb-bar" />
    <text x="220" y="0" class="legend-text">Carbs</text>
    
    <rect x="290" y="-10" width="20" height="10" class="fat-bar" />
    <text x="320" y="0" class="legend-text">Fat</text>
  </g>
</svg>
